// --- STATS BLOCK ---
function StatsBlock(props) {
  const skills = props.skills;
  const history = props.history;
  const completionCount = props.completionCount;
  const tasks = props.tasks;
  const timerData = props.timerData;
  const onSaveTimer = props.onSaveTimer;
  const decayState = props.decayState;
  const projects = props.projects || [];
  const challenges = props.challenges || {dtiys:[],thirty:[]};
  const [tab, setTab] = useState("radar");
  const [earnedDates, setEarnedDates] = useState({});

  // Calcul du statut d'inactivité pour l'affichage
  var lastDate = null;
  var daysSinceLast = null;
  if (history && history.length > 0) {
    var raw = history[0].date ? history[0].date.split(" ")[0] : null;
    if (raw) {
      var rawParts = raw.split("/").map(Number);
      lastDate = new Date(rawParts[2], rawParts[1]-1, rawParts[0]);
      var today0 = new Date(); today0.setHours(0,0,0,0);
      daysSinceLast = Math.floor((today0 - lastDate) / 86400000);
    }
  }

  useEffect(function() {
    storage.get("badge_dates").then(function(val) { if (val) setEarnedDates(val); });
  }, []);

  useEffect(function() {
    var updated = false;
    var next = {...earnedDates};
    var newlyUnlocked = [];
    BADGES.forEach(function(b) {
      if (!next[b.id] && b.check(history,completionCount,skills,tasks,timerData,projects,challenges)) {
        next[b.id] = new Date().toLocaleDateString("fr-FR",{day:"2-digit",month:"2-digit",year:"numeric"});
        newlyUnlocked.push(b);
        updated = true;
      }
    });
    if (updated) {
      setEarnedDates(next);
      storage.set("badge_dates", next);
      // Notifier via callback pour afficher les toasts dans App
      if (props.onBadgeUnlock) props.onBadgeUnlock(newlyUnlocked);
    }
  }, [history, completionCount, skills, tasks, timerData, projects, challenges]);

  var evaluated = BADGES.map(function(b) { return {...b, earned:b.check(history,completionCount,skills,tasks,timerData,projects,challenges), date:earnedDates[b.id]||null}; });
  var earnedCount = evaluated.filter(function(b) { return b.earned; }).length;
  var totalXp = skills.reduce(function(a,s) { return a+(s.level-1)*XP_PER_LEVEL+s.xp; }, 0);
  var totalDone = Object.values(completionCount).reduce(function(a,v) { return a+v; }, 0);
  var sortedSkills = skills.slice().sort(function(a,b) { return ((b.level-1)*100+b.xp)-((a.level-1)*100+a.xp); });
  var topSkill = sortedSkills[0];
  var streak = calcStreak(history);
  var weekStart = (function() { var d=new Date(); d.setDate(d.getDate()-((d.getDay()+6)%7)); d.setHours(0,0,0,0); return d; })();
  var sessionsThisWeek = Array.from(new Set(history.filter(function(e) {
    var p = e.date ? e.date.split(" ")[0] : null;
    if (!p) return false;
    var parts = p.split("/").map(Number);
    return new Date(parts[2],parts[1]-1,parts[0]) >= weekStart;
  }).map(function(e) { return e.date ? e.date.split(" ")[0] : null; }).filter(Boolean))).length;
  var GOAL = 3;

  function weekMsg() {
    if (sessionsThisWeek===0) return "Commence quand tu veux !";
    if (sessionsThisWeek===1) return "C'est parti ! Plus que 2 sessions.";
    if (sessionsThisWeek===2) return "Super ! Plus qu'une session.";
    return "🎉 Objectif atteint cette semaine !";
  }

  var block = {background:THEME.surface,backdropFilter:"blur(12px)",border:"0.5px solid "+THEME.border,borderRadius:18,padding:"1.1rem 1.2rem"};
  var tabIds = ["radar","heat","timer","progress","stats","badges"];
  var tabLabels = {radar:"📡 Radar",heat:"🔥 Activité",timer:"⏱ Timer",progress:"📈 Progression",stats:"📊 Stats",badges:"🏅 Badges "+earnedCount+"/"+BADGES.length};

  function ProgressionChart() {
    // Reconstitue l'XP total cumulé jour par jour depuis l'historique
    if (history.length===0) return <div style={{textAlign:"center",color:THEME.textMuted,fontSize:13,padding:"2rem 0"}}>Complète des tâches pour voir ta progression !</div>;

    // Grouper les gains par date
    var gainsByDate = {};
    history.forEach(function(e) {
      var d = e.date ? e.date.split(" ")[0] : null;
      if (!d) return;
      var xp = (e.gains||[]).reduce(function(a,g) { return a+g.xp; }, 0);
      gainsByDate[d] = (gainsByDate[d]||0) + xp;
    });

    // Trier les dates
    var sortedDates = Object.keys(gainsByDate).sort(function(a,b) {
      var pa=a.split("/").map(Number), pb=b.split("/").map(Number);
      return new Date(pa[2],pa[1]-1,pa[0]) - new Date(pb[2],pb[1]-1,pb[0]);
    });

    if (sortedDates.length < 2) return <div style={{textAlign:"center",color:THEME.textMuted,fontSize:13,padding:"2rem 0"}}>Continue à dessiner pour voir ta courbe !</div>;

    // Calculer XP cumulé
    var cumXp = 0;
    var points = sortedDates.map(function(d) {
      cumXp += gainsByDate[d];
      return {date:d, xp:cumXp};
    });

    var maxXp = points[points.length-1].xp;
    var W=320, H=120, PAD=10;
    var n = points.length;

    function px(i) { return PAD + (i/(n-1))*(W-PAD*2); }
    function py(xp) { return H - PAD - (xp/maxXp)*(H-PAD*2); }

    var pathD = points.map(function(p,i) { return (i===0?"M":"L")+px(i)+","+py(p.xp); }).join(" ");
    var areaD = pathD + " L"+px(n-1)+","+(H-PAD)+" L"+PAD+","+(H-PAD)+" Z";

    // Labels mois sur l'axe X (1 sur 4)
    var xLabels = points.filter(function(_,i) { return i===0 || i===n-1 || (n>4 && i%Math.max(1,Math.floor(n/4))===0); });

    return (
      <div>
        <svg viewBox={"0 0 "+W+" "+H} style={{width:"100%",display:"block"}}>
          {/* Grille */}
          {[0.25,0.5,0.75,1].map(function(v,i) {
            var y = H-PAD-(v*(H-PAD*2));
            return <line key={i} x1={PAD} y1={y} x2={W-PAD} y2={y} stroke={THEME.surfaceLight} strokeWidth="1"/>;
          })}
          {/* Aire */}
          <path d={areaD} fill="rgba(127,119,221,0.12)"/>
          {/* Ligne */}
          <path d={pathD} fill="none" stroke="#7F77DD" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
          {/* Point final */}
          <circle cx={px(n-1)} cy={py(points[n-1].xp)} r="4" fill="#7F77DD"/>
          {/* Labels axe Y */}
          {[0,Math.round(maxXp/2),maxXp].map(function(v,i) {
            return <text key={i} x={PAD-2} y={py(v)+1} textAnchor="end" fontSize="8" fill="#8E7FB0" dominantBaseline="middle">{v}</text>;
          })}
          {/* Labels axe X */}
          {xLabels.map(function(p,i) {
            var idx = points.indexOf(p);
            var parts = p.date.split("/");
            var label = parts[0]+"/"+parts[1];
            return <text key={i} x={px(idx)} y={H-2} textAnchor="middle" fontSize="8" fill="#8E7FB0">{label}</text>;
          })}
        </svg>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:THEME.textMuted,marginTop:6}}>
          <span>Premier dessin : {points[0].date}</span>
          <span style={{fontWeight:600,color:"#7F77DD"}}>{maxXp} XP total</span>
        </div>
      </div>
    );
  }

  function RadarChart() {
    var displayed = skills.filter(function(s) { return s.level > 0 || s.xp > 0 || true; }); // toutes les compétences
    var n = displayed.length;
    if (n < 3) return <div style={{textAlign:"center",color:THEME.textMuted,fontSize:13,padding:"2rem 0"}}>Ajoute au moins 3 compétences pour voir le radar.</div>;
    var cx = 145, cy = 145, r = 100;
    var maxVal = Math.max.apply(null, displayed.map(function(s) { return (s.level-1)*100+s.xp; }).concat([100]));

    function angle(i) { return (i/n)*2*Math.PI - Math.PI/2; }
    function pt(i, ratio) { return [cx + ratio*r*Math.cos(angle(i)), cy + ratio*r*Math.sin(angle(i))]; }
    function gridRing(ratio) { return displayed.map(function(_,i) { var p=pt(i,ratio); return p[0]+","+p[1]; }).join(" "); }

    var levels = [0.25, 0.5, 0.75, 1];
    var dataRatio = displayed.map(function(s) { return Math.max(0.04, ((s.level-1)*100+s.xp)/maxVal); });
    var dataPts = displayed.map(function(s,i) { var p=pt(i,dataRatio[i]); return p[0]+","+p[1]; }).join(" ");

    // Label positions with extra padding based on angle
    function labelPos(i) {
      var a = angle(i);
      var pad = 22;
      return [cx+(r+pad)*Math.cos(a), cy+(r+pad)*Math.sin(a)];
    }

    return (
      <div>
        <svg viewBox={"0 0 290 290"} style={{width:"100%",maxWidth:280,margin:"0 auto",display:"block"}}>
          <defs>
            <linearGradient id="radarFill" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stopColor={THEME.accent} stopOpacity="0.25"/>
              <stop offset="100%" stopColor={THEME.accentPink} stopOpacity="0.15"/>
            </linearGradient>
          </defs>

          {/* Toile d'araignée — anneaux */}
          {levels.map(function(lvl, gi) {
            return <polygon key={gi} points={gridRing(lvl)} fill={gi===3?THEME.accent+"06":"none"} stroke={THEME.border} strokeWidth={gi===3?"1.5":"1"} strokeDasharray={gi===3?"none":"3,3"}/>;
          })}

          {/* Axes radiaux */}
          {displayed.map(function(_,i) {
            var outer = pt(i, 1);
            return <line key={i} x1={cx} y1={cy} x2={outer[0]} y2={outer[1]} stroke={THEME.border} strokeWidth="1"/>;
          })}

          {/* Petits points sur les axes */}
          {displayed.map(function(_,i) {
            return levels.map(function(lvl, li) {
              var p = pt(i, lvl);
              return <circle key={i+"-"+li} cx={p[0]} cy={p[1]} r="2" fill={THEME.surfaceLight} stroke={THEME.border} strokeWidth="0.5"/>;
            });
          })}

          {/* Aire de données */}
          <polygon points={dataPts} fill="url(#radarFill)" stroke={THEME.accent} strokeWidth="2" strokeLinejoin="round"/>

          {/* Points de données numérotés */}
          {displayed.map(function(s,i) {
            var p = pt(i, dataRatio[i]);
            var outer = pt(i, 1.0);
            return (
              <g key={i}>
                {/* Numéro sur l'axe */}
                <circle cx={outer[0]} cy={outer[1]} r="8" fill={s.color} opacity="0.9"/>
                <text x={outer[0]} y={outer[1]} textAnchor="middle" dominantBaseline="middle" fontSize="8" fontWeight="700" fill="white">{i+1}</text>
                {/* Point de donnée */}
                <circle cx={p[0]} cy={p[1]} r="4.5" fill={s.color} stroke="white" strokeWidth="1.5" opacity="0.9"/>
              </g>
            );
          })}

          {/* Centre */}
          <circle cx={cx} cy={cy} r="3" fill={THEME.accent} opacity="0.5"/>
        </svg>

        {/* Légende numérotée — compacte */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:"3px 8px",marginTop:10}}>
          {displayed.map(function(s,i) {
            var total = (s.level-1)*100+s.xp;
            return (
              <div key={s.id} style={{display:"flex",alignItems:"center",gap:5,minWidth:0}}>
                <div style={{width:16,height:16,borderRadius:"50%",background:s.color,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                  <span style={{fontSize:8,fontWeight:700,color:"white"}}>{i+1}</span>
                </div>
                <div style={{minWidth:0,overflow:"hidden"}}>
                  <div style={{fontSize:10,fontWeight:500,color:THEME.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.name}</div>
                  <div style={{fontSize:9,color:THEME.textMuted}}>Niv.{s.level} · {total}xp</div>
                </div>
              </div>
            );
          })}
        </div>
      </div>
    );
  }

  function HeatMap() {
    var weeks=26, totalDays=weeks*7, today=new Date();
    var countByDate = {};
    history.forEach(function(e) { var d=e.date?e.date.split(" ")[0]:null; if(d) countByDate[d]=(countByDate[d]||0)+1; });
    var cells = [];
    var monthLabels = [];
    for (var i=totalDays-1;i>=0;i--) {
      var d=new Date(today); d.setDate(today.getDate()-i);
      var key=d.toLocaleDateString("fr-FR",{day:"2-digit",month:"2-digit",year:"numeric"});
      var count=countByDate[key]||0;
      var opacity=count===0?0:count===1?0.3:count===2?0.55:count===3?0.75:1;
      var col=Math.floor((totalDays-1-i)/7);
      var row=(totalDays-1-i)%7;
      // Ajouter label mois au début de chaque mois
      if (d.getDate()<=7 && row===0) {
        var mois=["Jan","Fév","Mar","Avr","Mai","Jun","Jul","Aoû","Sep","Oct","Nov","Déc"];
        monthLabels.push({col:col, label:mois[d.getMonth()]});
      }
      cells.push({key:key,count:count,opacity:opacity,col:col,row:row,title:key+" : "+count+" session"+(count>1?"s":"")});
    }
    var CELL=18, GAP=3, LEFT=22, TOP=22;
    var svgW = weeks*(CELL+GAP)+LEFT;
    var svgH = 7*(CELL+GAP)+TOP+10;
    return (
      <div style={{overflowX:"auto",paddingBottom:4}}>
        <svg width={svgW} height={svgH} style={{display:"block",minWidth:svgW}}>
          {/* Labels mois */}
          {monthLabels.map(function(m,i) {
            return <text key={i} x={LEFT+m.col*(CELL+GAP)} y={12} fontSize="9" fill="#C4B4E4" fontWeight="500">{m.label}</text>;
          })}
          {/* Labels jours */}
          {["L","","M","","V","","D"].map(function(d,i) {
            return d ? <text key={i} x={LEFT-6} y={TOP+i*(CELL+GAP)+CELL/2+1} textAnchor="end" fontSize="9" fill="#8E7FB0" dominantBaseline="middle">{d}</text> : null;
          })}
          {/* Cellules */}
          {cells.map(function(c,i) {
            return (
              <rect
                key={i}
                x={LEFT+c.col*(CELL+GAP)}
                y={TOP+c.row*(CELL+GAP)}
                width={CELL}
                height={CELL}
                rx="4"
                fill={c.count>0?"#7F77DD":THEME.surfaceLight}
                opacity={c.count>0?c.opacity:1}
              >
                <title>{c.title}</title>
              </rect>
            );
          })}
        </svg>
        <div style={{display:"flex",alignItems:"center",gap:5,marginTop:8}}>
          <span style={{fontSize:10,color:THEME.textMuted}}>Moins</span>
          {[0.15,0.35,0.55,0.75,1].map(function(o,i) { return <div key={i} style={{width:14,height:14,borderRadius:3,background:"#7F77DD",opacity:o}}/>; })}
          <span style={{fontSize:10,color:THEME.textMuted}}>Plus</span>
        </div>
      </div>
    );
  }

  return (
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <div style={block}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
          <div style={{fontSize:13,fontWeight:600,color:THEME.text}}>🎯 Objectif hebdomadaire</div>
          <span style={{fontSize:13,fontWeight:700,color:sessionsThisWeek>=GOAL?"#5a9e6f":"#7F77DD"}}>{sessionsThisWeek}/{GOAL}</span>
        </div>
        <div style={{height:8,background:"rgba(255,255,255,0.07)",borderRadius:99,overflow:"hidden",marginBottom:6}}>
          <div style={{height:"100%",width:Math.min(sessionsThisWeek/GOAL*100,100)+"%",background:sessionsThisWeek>=GOAL?"#5a9e6f":"#7F77DD",borderRadius:99,transition:"width 0.4s"}}/>
        </div>
        <div style={{fontSize:11,color:THEME.textMuted}}>{weekMsg()}</div>
      </div>

      {/* Statut déclin */}
      {daysSinceLast !== null && daysSinceLast >= 0 && (function() {
        var daysLeft = Math.max(0, DECAY_GRACE_DAYS - daysSinceLast);
        var inDecay = daysSinceLast > DECAY_GRACE_DAYS;
        var weeksOver = inDecay ? Math.floor((daysSinceLast - DECAY_GRACE_DAYS) / 7) : 0;
        var nextDecayIn = inDecay ? (7 - ((daysSinceLast - DECAY_GRACE_DAYS) % 7)) : null;
        var bgColor = inDecay ? THEME.danger+"08" : daysSinceLast >= 4 ? THEME.accentGold+"08" : THEME.accentGreen+"08";
        var borderColor = inDecay ? THEME.danger+"44" : daysSinceLast >= 4 ? THEME.accentGold+"44" : THEME.accentGreen+"44";
        var icon = inDecay ? "📉" : daysSinceLast >= 4 ? "⚠️" : "🌱";
        var msg = daysSinceLast === 0
          ? "Tu as dessiné aujourd'hui ! Tes XP sont totalement protégés."
          : inDecay
          ? "XP en déclin — "+weeksOver+" sem. d'inactivité (-"+(weeksOver*DECAY_XP_PER_WEEK)+" XP). Prochain -5 XP dans "+nextDecayIn+" j."
          : daysSinceLast >= 4
          ? "Dernier dessin il y a "+daysSinceLast+" j. Déclin XP dans "+daysLeft+" jour"+(daysLeft>1?"s":"")+" !"
          : "Dernier dessin il y a "+daysSinceLast+" jour"+(daysSinceLast>1?"s":"")+". XP protégés encore "+daysLeft+" j. 🌱";
        var textColor = inDecay ? THEME.danger : daysSinceLast >= 4 ? THEME.accentGold : THEME.accentGreen;
        return (
          <div style={{...block,background:bgColor,border:"1px solid "+borderColor,padding:"10px 14px"}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <span style={{fontSize:18}}>{icon}</span>
              <div style={{fontSize:12,color:textColor,lineHeight:1.4}}>{msg}</div>
            </div>
          </div>
        );
      })()}
      <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
        {tabIds.map(function(id) {
          var isActive = tab===id;
          return (
            <button key={id} onClick={function() { setTab(id); }} style={{padding:"5px 12px",borderRadius:20,fontSize:12,cursor:"pointer",border:isActive?"1px solid "+THEME.accent+"66":"0.5px solid "+THEME.border,background:isActive?THEME.filterActive:THEME.surfaceLight,color:isActive?THEME.accent:THEME.textSub,fontWeight:isActive?600:400,transition:"all 0.15s"}}>
              {tabLabels[id]}
            </button>
          );
        })}
      </div>
      {tab==="radar" && <div style={block}><RadarChart/></div>}
      {tab==="heat" && <div style={block}><HeatMap/></div>}
      {tab==="timer" && <TimerBlock timerData={timerData} onSave={onSaveTimer}/>}
      {tab==="progress" && (
        <div style={block}>
          <div style={{fontSize:12,fontWeight:600,color:THEME.textMuted,textTransform:"uppercase",letterSpacing:0.6,marginBottom:12}}>XP cumulé dans le temps</div>
          <ProgressionChart/>
        </div>
      )}
      {tab==="stats" && (
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:8}}>
            <div style={{...block,padding:"10px 12px"}}><div style={{fontSize:16,fontWeight:700,color:"#7F77DD"}}>{totalXp} XP</div><div style={{fontSize:11,color:THEME.textMuted,marginTop:2}}>XP total</div></div>
            <div style={{...block,padding:"10px 12px"}}><div style={{fontSize:16,fontWeight:700,color:"#1D9E75"}}>{totalDone}</div><div style={{fontSize:11,color:THEME.textMuted,marginTop:2}}>Sessions</div></div>
            <div style={{...block,padding:"10px 12px"}}><div style={{fontSize:16,fontWeight:700,color:"#E57C1B"}}>{streak} jour{streak>1?"s":""}</div><div style={{fontSize:11,color:THEME.textMuted,marginTop:2}}>Streak 🔥</div></div>
            <div style={{...block,padding:"10px 12px"}}><div style={{fontSize:16,fontWeight:700,color:topSkill?topSkill.color:THEME.textMuted}}>{topSkill?topSkill.name.split(" ")[0]:"-"}</div><div style={{fontSize:11,color:THEME.textMuted,marginTop:2}}>Comp. reine ⭐</div></div>
          </div>
          <div style={block}>
            <div style={{fontSize:11,fontWeight:600,color:THEME.textMuted,marginBottom:8}}>XP par compétence</div>
            {sortedSkills.map(function(sk) {
              var total = (sk.level-1)*100+sk.xp;
              var maxT = sortedSkills.reduce(function(a,s) { return Math.max(a,(s.level-1)*100+s.xp); }, 1);
              return (
                <div key={sk.id} style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                  <div style={{fontSize:11,color:THEME.textSub,width:90,flexShrink:0,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{sk.name}</div>
                  <div style={{flex:1,height:6,background:THEME.surfaceLight,borderRadius:99,overflow:"hidden"}}>
                    <div style={{height:"100%",width:(total/maxT*100)+"%",background:sk.color,borderRadius:99}}/>
                  </div>
                  <div style={{fontSize:10,color:THEME.textMuted,width:36,textAlign:"right",flexShrink:0}}>{total} XP</div>
                </div>
              );
            })}
          </div>
        </div>
      )}
      {tab==="badges" && (
        <div style={block}>
          <div style={{fontSize:11,color:THEME.textMuted,marginBottom:10}}>{earnedCount} badge{earnedCount>1?"s":""} sur {BADGES.length}</div>
          <BadgeGrid evaluated={evaluated}/>
        </div>
      )}
    </div>
  );
}

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.35)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200}} onClick={onClose}>

              return (
                <button key={opt.id} onClick={function() { setChoice(opt.id); setStep(opt.id==="skills"?"skills":"confirm"); }} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 14px",borderRadius:12,cursor:"pointer",textAlign:"left",border:opt.danger?"1px solid "+THEME.accentPink+"44":"1px solid "+THEME.border,background:opt.danger?THEME.accentPink+"10":THEME.surfaceLight}}>
                  <div>
                    <div style={{fontSize:13,fontWeight:600,color:opt.danger?THEME.accentPink:THEME.text}}>{opt.label}</div>

                  </div>

        {step==="skills" && (
          <div>
            <div style={{fontSize:12,color:THEME.textMuted,marginBottom:10}}>Sélectionnez les compétences :</div>
            <div style={{display:"flex",flexDirection:"column",gap:7,marginBottom:14,maxHeight:320,overflowY:"auto"}}>
              {skills.map(function(sk) {
                return (
                  <div key={sk.id} onClick={function() { toggle(sk.id); }} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 12px",borderRadius:10,cursor:"pointer",border:sel.includes(sk.id)?"1px solid "+sk.color+"88":"1px solid "+THEME.border,background:sel.includes(sk.id)?sk.color+"12":THEME.surfaceLight}}>
                    <div style={{width:28,height:28,borderRadius:"50%",background:sk.color+"18",border:"1px solid "+sk.color+"33",display:"flex",alignItems:"center",justifyContent:"center",color:sk.color,flexShrink:0}}><SkillIcon id={sk.id} emoji={sk.emoji} size={14}/></div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:13,fontWeight:500,color:THEME.text}}>{sk.name}</div>
                      <div style={{fontSize:11,color:THEME.textMuted}}>Niv. {sk.level} - {sk.xp}/100 XP</div>
                    </div>
                    <div style={{width:18,height:18,borderRadius:"50%",border:"2px solid "+(sel.includes(sk.id)?sk.color:THEME.border),background:sel.includes(sk.id)?sk.color:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                      {sel.includes(sk.id) && <span style={{color:"#fff",fontSize:11}}>✓</span>}

            </div>

              <button onClick={function() { if(sel.length>0) setStep("confirm"); }} style={{flex:2,padding:"8px",borderRadius:10,cursor:sel.length>0?"pointer":"default",border:"1px solid "+THEME.accentPink+"44",background:sel.length>0?THEME.accentPink+"12":THEME.surfaceLight,color:sel.length>0?THEME.accentPink:THEME.textMuted,fontSize:13,fontWeight:500,opacity:sel.length>0?1:0.5}}>Continuer{sel.length>0?" ("+sel.length+")":""}</button>
            </div>

        )}
        {step==="confirm" && (
          <div>
            <div style={{background:THEME.accentPink+"10",border:"1px solid "+THEME.accentPink+"44",borderRadius:12,padding:"12px 14px",marginBottom:14}}>
              <div style={{fontSize:13,fontWeight:600,color:THEME.accentPink,marginBottom:4}}>Confirmer</div>
              <div style={{fontSize:12,color:THEME.textMuted,lineHeight:1.5}}>
                {choice==="all" && "Toute ta progression sera effacée."}
                {choice==="tasks" && "L'historique et les tâches seront effacés."}
                {choice==="skills" && ("Compétences remises à Niv.1 : "+skills.filter(function(s) { return sel.includes(s.id); }).map(function(s) { return s.name; }).join(", ")+".")}
              </div>
            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={function() { setStep(choice==="skills"?"skills":"choose"); }} style={{flex:1,padding:"8px",borderRadius:10,cursor:"pointer",border:"1px solid rgba(255,255,255,0.10)",background:"transparent",color:THEME.textMuted,fontSize:13}}>Retour</button>
              <button onClick={confirm} style={{flex:2,padding:"8px",borderRadius:10,cursor:"pointer",border:"1px solid "+THEME.accentPink+"55",background:THEME.accentPink+"18",color:THEME.accentPink,fontSize:13,fontWeight:600}}>Oui, confirmer</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// --- GROS PROJETS ---
function ProjectCard(props) {
  const p = props.project;
  const skills = props.skills;
  const onUpdate = props.onUpdate;
  const onDelete = props.onDelete;
  const onStepXp = props.onStepXp;   // (projectId, stepId, wasAlreadyDone) => void
  const onEdit = props.onEdit;
  const onBonusXp = props.onBonusXp; // (projectId) => void
  const onBonusXpRemove = props.onBonusXpRemove;
  const [expanded, setExpanded] = useState(false);
  const [newStep, setNewStep] = useState("");
  const [editingStep, setEditingStep] = useState(null); // {id, label}
  const [confirmDelete, setConfirmDelete] = useState(false);

  var done = p.steps.filter(function(s) { return s.done; }).length;
  var total = p.steps.length;
  var pct = total === 0 ? 0 : Math.round(done / total * 100);
  var wasComplete = done === total && total > 0;

  var today = new Date();
  var daysLeft = null;
  var isOverdue = false;
  if (p.deadline) {
    var parts = p.deadline.split("-").map(Number);
    var dl = new Date(parts[0], parts[1]-1, parts[2]);
    daysLeft = Math.ceil((dl - today) / 86400000);
    isOverdue = daysLeft < 0;
  }

  var statusColors = {actif:THEME.accent, pause:THEME.accentGold, termine:THEME.accentGreen};
  var statusLabels = {actif:"En cours", pause:"⏸ En pause", termine:"✓ Terminé"};
  var statusColor = statusColors[p.status] || THEME.textMuted;

  function setStatus(s) { onUpdate(p.id, {status:s}); }

  // XP par étape et bonus fin
  var xpPerStep = p.xpPerStep || 5;
  var xpBonus = p.xpBonus || 20;
  var linkedSkills = p.linkedSkills || [];

  function toggleStep(sid) {
    var step = p.steps.find(function(s) { return s.id===sid; });
    var wasDone = step ? step.done : false;
    var newSteps = p.steps.map(function(s) { return s.id===sid ? {...s,done:!s.done} : s; });
    var newDone = newSteps.filter(function(s) { return s.done; }).length;
    var nowComplete = newDone === total && total > 0;
    onUpdate(p.id, {steps: newSteps});
    if (!wasDone) onStepXp(p.id, sid, linkedSkills, xpPerStep);
    if (nowComplete && !wasComplete) onBonusXp(p.id, linkedSkills, xpBonus);
    if (!nowComplete && wasComplete && onBonusXpRemove) onBonusXpRemove(p.id, linkedSkills, xpBonus);
  }

  function addStep() {
    if (!newStep.trim()) return;
    onUpdate(p.id, {steps: [...p.steps, {id:Date.now(), label:newStep.trim(), done:false}]});
    setNewStep("");
  }
  function deleteStep(sid) {
    onUpdate(p.id, {steps: p.steps.filter(function(s) { return s.id!==sid; })});
  }
  function moveStep(idx, dir) {
    var steps = p.steps.slice();
    var target = idx + dir;
    if (target < 0 || target >= steps.length) return;
    var tmp = steps[idx]; steps[idx] = steps[target]; steps[target] = tmp;
    onUpdate(p.id, {steps: steps});
  }
  function saveEditStep() {
    if (!editingStep || !editingStep.label.trim()) { setEditingStep(null); return; }
    onUpdate(p.id, {steps: p.steps.map(function(s) { return s.id===editingStep.id ? {...s, label:editingStep.label.trim()} : s; })});
    setEditingStep(null);
  }

  var barColor = pct===100 ? THEME.accentGreen : p.status==="pause" ? THEME.accentGold : THEME.accent;
  var xpLabel = linkedSkills.length > 0
    ? linkedSkills.map(function(ls) {
        var sk = (skills||[]).find(function(s) { return s.id===ls.skillId; });
        return sk ? sk.name : "";
      }).filter(Boolean).join(", ")
    : "Aucune compétence liée";

  return (
    <div style={{background:THEME.surfaceCard,backdropFilter:"blur(8px)",border:"0.5px solid rgba(255,255,255,0.85)",borderRadius:18,padding:"1rem 1.1rem",opacity:p.status==="termine"?0.75:1,position:"relative"}}>
      {/* Modale confirmation suppression */}
      {confirmDelete && (
        <div style={{position:"absolute",inset:0,borderRadius:18,background:THEME.modalBg,backdropFilter:"blur(10px)",zIndex:10,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:12,padding:"1.2rem"}}>
          <div style={{fontSize:20}}>🗑️</div>
          <div style={{fontSize:13,fontWeight:600,color:THEME.text,textAlign:"center"}}>Supprimer ce projet ?</div>
          <div style={{fontSize:11,color:THEME.textMuted,textAlign:"center",lineHeight:1.5}}>"{p.name}"<br/>Cette action est irréversible.</div>
          <div style={{display:"flex",gap:8,marginTop:4}}>
            <button onClick={function() { setConfirmDelete(false); }} style={{padding:"7px 16px",borderRadius:10,cursor:"pointer",border:"1px solid "+THEME.border,background:THEME.surfaceLight,color:THEME.textMuted,fontSize:13}}>Annuler</button>
            <button onClick={function() { onDelete(p.id); setConfirmDelete(false); }} style={{padding:"7px 16px",borderRadius:10,cursor:"pointer",border:"1px solid "+THEME.accentPink+"55",background:THEME.accentPink+"18",color:THEME.accentPink,fontSize:13,fontWeight:600}}>Supprimer</button>
          </div>
        </div>
      )}
      {/* Header */}
      <div style={{display:"flex",alignItems:"flex-start",gap:8,marginBottom:8}}>
        <div style={{width:28,height:28,borderRadius:8,background:statusColor+"18",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontWeight:700,fontSize:13,color:statusColor,border:"1px solid "+statusColor+"33"}}>
          {p.priority}
        </div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:14,fontWeight:600,color:THEME.text,lineHeight:1.3}}>{p.name}</div>
          <div style={{display:"flex",gap:4,flexWrap:"wrap",marginTop:4,alignItems:"center"}}>
            {["actif","pause","termine"].map(function(s) {
              var sc = statusColors[s];
              var active = p.status===s;
              return (
                <button key={s} onClick={function(){setStatus(s);}} style={{fontSize:10,padding:"2px 8px",borderRadius:20,cursor:"pointer",border:"1px solid "+(active?sc:THEME.border),background:active?sc+"18":THEME.surfaceLight,color:active?sc:THEME.textMuted,fontWeight:active?600:400}}>
                  {statusLabels[s]}
                </button>
              );
            })}
          </div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:3,alignItems:"center"}}>
            {p.startDate && <span style={{fontSize:10,color:THEME.textMuted}}>Début : {p.startDate}</span>}
            {daysLeft !== null && (
              <span style={{fontSize:10,fontWeight:500,color:isOverdue?THEME.danger:daysLeft<=3?THEME.accentGold:THEME.textMuted,background:isOverdue?THEME.danger+"12":daysLeft<=3?THEME.accentGold+"12":THEME.surfaceLight,borderRadius:20,padding:"1px 8px"}}>
                {isOverdue ? "⚠ "+Math.abs(daysLeft)+"j de retard" : daysLeft===0 ? "⚡ Aujourd'hui !" : daysLeft+"j restants"}
              </span>
            )}
          </div>
        </div>
        <div style={{display:"flex",gap:4,flexShrink:0,alignItems:"center"}}>
          <button onClick={function() { setExpanded(function(v) { return !v; }); }} style={{border:"none",background:"none",cursor:"pointer",fontSize:14,color:THEME.textMuted,padding:"2px"}}>{expanded?"▲":"▼"}</button>
          <button onClick={function() { onEdit(p); }} title="Modifier le projet" style={{border:"none",background:"none",cursor:"pointer",fontSize:13,color:THEME.textMuted,padding:"2px",opacity:0.7}}>✏️</button>
          <button onClick={function() { setConfirmDelete(true); }} style={{border:"none",background:"none",cursor:"pointer",fontSize:14,color:THEME.textMuted,padding:"2px",opacity:0.7}}>✕</button>
        </div>
      </div>

      {/* XP badges */}
      {linkedSkills.length > 0 && (
        <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:8}}>
          {linkedSkills.map(function(ls) {
            var sk = (skills||[]).find(function(s) { return s.id===ls.skillId; });
            if (!sk) return null;
            return (
              <span key={ls.skillId} style={{fontSize:10,background:sk.color+"18",border:"1px solid "+sk.color+"44",borderRadius:20,padding:"2px 8px",color:sk.color,fontWeight:500}}>
                +{xpPerStep} / étape • +{xpBonus} fin — {sk.name}
              </span>
            );
          })}
        </div>
      )}

      {/* Progress bar */}
      <div style={{marginBottom:expanded?10:0}}>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:THEME.textMuted,marginBottom:3}}>
          <span>{done}/{total} étapes</span>
          <span style={{fontWeight:600,color:barColor}}>{pct}%</span>
        </div>
        <div style={{height:6,background:"rgba(255,255,255,0.07)",borderRadius:99,overflow:"hidden"}}>
          <div style={{height:"100%",width:pct+"%",background:barColor,borderRadius:99,transition:"width 0.4s"}}/>
        </div>
      </div>

      {/* Steps */}
      {expanded && (
        <div style={{marginTop:10}}>
          {p.description && <div style={{fontSize:12,color:THEME.textMuted,fontStyle:"italic",marginBottom:8,lineHeight:1.5}}>{p.description}</div>}
          <div style={{display:"flex",flexDirection:"column",gap:5,marginBottom:8}}>
            {p.steps.map(function(step, idx) {
              var isEditing = editingStep && editingStep.id === step.id;
              return (
                <div key={step.id} style={{display:"flex",alignItems:"center",gap:6,padding:"6px 8px",borderRadius:8,background:step.done?"rgba(200,240,210,0.4)":THEME.surfaceCard,border:"0.5px solid "+(step.done?"rgba(100,180,120,0.3)":"rgba(255,255,255,0.07)")}}>
                  <button onClick={function() { toggleStep(step.id); }} style={{width:18,height:18,borderRadius:"50%",border:"2px solid "+(step.done?"#1D9E75":"#ddd"),background:step.done?"#1D9E75":"transparent",color:"#fff",fontSize:10,cursor:"pointer",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>{step.done?"✓":""}</button>
                  <span style={{fontSize:10,color:THEME.textMuted,width:16,flexShrink:0,textAlign:"center"}}>{idx+1}.</span>
                  {isEditing ? (
                    <input
                      autoFocus
                      value={editingStep.label}
                      onChange={function(e) { setEditingStep({id:step.id, label:e.target.value}); }}
                      onKeyDown={function(e) { if(e.key==="Enter") saveEditStep(); if(e.key==="Escape") setEditingStep(null); }}
                      onBlur={saveEditStep}
                      style={{flex:1,fontSize:12,padding:"2px 6px",borderRadius:6,border:"1px solid "+THEME.accent+"55",background:THEME.inputBg,color:THEME.text}}
                    />
                  ) : (
                    <span onClick={function() { if(!step.done) setEditingStep({id:step.id, label:step.label}); }} style={{flex:1,fontSize:13,color:step.done?"#aaa":"#2a2a2a",textDecoration:step.done?"line-through":"none",cursor:step.done?"default":"text"}}>{step.label}</span>
                  )}
                  {linkedSkills.length > 0 && !step.done && (
                    <span style={{fontSize:9,color:"#7F77DD",background:"#7F77DD10",borderRadius:20,padding:"1px 6px",flexShrink:0}}>+{xpPerStep} XP</span>
                  )}
                  {!step.done && (
                    <div style={{display:"flex",flexDirection:"column",gap:1,flexShrink:0}}>
                      <button onClick={function() { moveStep(idx, -1); }} disabled={idx===0} style={{border:"none",background:"none",cursor:idx===0?"default":"pointer",fontSize:8,color:idx===0?"#ccc":THEME.textMuted,padding:"0 2px",lineHeight:1}}>▲</button>
                      <button onClick={function() { moveStep(idx, 1); }} disabled={idx===p.steps.length-1} style={{border:"none",background:"none",cursor:idx===p.steps.length-1?"default":"pointer",fontSize:8,color:idx===p.steps.length-1?"#ccc":THEME.textMuted,padding:"0 2px",lineHeight:1}}>▼</button>
                    </div>
                  )}
                  <button onClick={function() { deleteStep(step.id); }} style={{border:"none",background:"none",cursor:"pointer",fontSize:11,color:"#ddd",padding:"0 2px"}}>✕</button>
                </div>
              );
            })}
          </div>
          {pct===100 && (
            <div style={{textAlign:"center",fontSize:12,color:"#1D9E75",fontWeight:500,marginBottom:8}}>
              🎉 Projet terminé ! {linkedSkills.length>0 ? "+"+xpBonus+" XP bonus appliqué ✓" : ""}
            </div>
          )}
          <div style={{display:"flex",gap:6}}>
            <input value={newStep} onChange={function(e) { setNewStep(e.target.value); }} onKeyDown={function(e) { if(e.key==="Enter") addStep(); }} placeholder="Nouvelle étape..." style={{flex:1,padding:"6px 10px",borderRadius:10,fontSize:12,border:"1px solid rgba(255,255,255,0.12)",background:THEME.surfaceLight}}/>
            <button onClick={addStep} style={{padding:"6px 12px",borderRadius:10,fontSize:12,cursor:"pointer",border:"1px solid #7F77DD44",background:"#7F77DD12",color:"#7F77DD",fontWeight:500}}>+ Ajouter</button>
          </div>
        </div>
      )}
    </div>
  );
}

function ProjectsPage(props) {
  const projects = props.projects;
  const skills = props.skills;
  const onChange = props.onChange;
  const onXpGain = props.onXpGain; // (gains:[{skillId,xp}], label:string) => void
  const onXpRemove = props.onXpRemove;
  const onEdit = props.onEdit; // remonté dans ArtTrackerApp pour fix position:fixed Android

  const [showAdd, setShowAdd] = useState(false);
  const [form, setForm] = useState({name:"",description:"",priority:1,startDate:new Date().toISOString().slice(0,10),deadline:"",steps:[],linkedSkills:[],xpPerStep:5,xpBonus:20});
  const [stepInput, setStepInput] = useState("");
  const [filterStatus, setFilterStatus] = useState("tous");
  // États édition supprimés — remontés dans ArtTrackerApp (fix position:fixed Android)

  var block = {background:THEME.surface,backdropFilter:"blur(12px)",border:"0.5px solid "+THEME.border,borderRadius:18,padding:"1.1rem 1.2rem"};
  var inp = {padding:"7px 10px",borderRadius:10,fontSize:13,border:"1px solid "+THEME.borderLight,background:THEME.inputBg,color:THEME.text,width:"100%",boxSizing:"border-box"};

  function toggleFormSkill(skillId) {
    setForm(function(f) {
      var has = f.linkedSkills.find(function(ls) { return ls.skillId===skillId; });
      var next = has
        ? f.linkedSkills.filter(function(ls) { return ls.skillId!==skillId; })
        : [...f.linkedSkills, {skillId:skillId}];
      return {...f, linkedSkills:next};
    });
  }

  function addStepToForm() {
    if (!stepInput.trim()) return;
    setForm(function(f) { return {...f, steps:[...f.steps, {id:Date.now(), label:stepInput.trim(), done:false}]}; });
    setStepInput("");
  }
  function removeFormStep(id) { setForm(function(f) { return {...f, steps:f.steps.filter(function(s) { return s.id!==id; })}; }); }

  function createProject() {
    if (!form.name.trim()) return;
    var proj = {
      id: Date.now(),
      name: form.name.trim(),
      description: form.description.trim(),
      priority: form.priority,
      startDate: form.startDate ? new Date(form.startDate).toLocaleDateString("fr-FR") : "",
      deadline: form.deadline || null,
      status: "actif",
      steps: form.steps,
      linkedSkills: form.linkedSkills,
      xpPerStep: form.xpPerStep,
      xpBonus: form.xpBonus,
    };
    onChange([...projects, proj]);
    setForm({name:"",description:"",priority:1,startDate:new Date().toISOString().slice(0,10),deadline:"",steps:[],linkedSkills:[],xpPerStep:5,xpBonus:20});
    setShowAdd(false);
  }

  function updateProject(id, patch) {
    onChange(projects.map(function(p) { return p.id===id ? {...p,...patch} : p; }));
  }
  function deleteProject(id) {
    onChange(projects.filter(function(p) { return p.id!==id; }));
  }

  // XP callbacks
  function handleStepXp(projId, stepId, linkedSkills, xpPerStep) {
    if (!linkedSkills || linkedSkills.length===0) return;
    var xpEach = Math.max(1, xpPerStep); // chaque compétence reçoit le montant complet
    var gains = linkedSkills.map(function(ls) { return {skillId:ls.skillId, xp:xpEach}; });
    var proj = projects.find(function(p) { return p.id===projId; });
    onXpGain(gains, "📂 "+(proj?proj.name:"Projet")+" — étape");
  }
  function handleBonusXp(projId, linkedSkills, xpBonus) {
    if (!linkedSkills || linkedSkills.length===0) return;
    var xpEach = Math.max(1, xpBonus);
    var gains = linkedSkills.map(function(ls) { return {skillId:ls.skillId, xp:xpEach}; });
    var proj = projects.find(function(p) { return p.id===projId; });
    onXpGain(gains, "🎉 "+(proj?proj.name:"Projet")+" — TERMINÉ !");
  }
  function handleBonusXpRemove(projId, linkedSkills, xpBonus) {
    if (!linkedSkills || linkedSkills.length===0 || !onXpRemove) return;
    var xpEach = Math.max(1, xpBonus);
    var gains = linkedSkills.map(function(ls) { return {skillId:ls.skillId, xp:xpEach}; });
    onXpRemove(gains);
  }

  var filtered = projects.filter(function(p) {
    if (filterStatus==="tous") return true;
    return p.status===filterStatus;
  }).sort(function(a,b) { return a.priority - b.priority; });

  var actifCount = projects.filter(function(p) { return p.status==="actif"; }).length;
  var pauseCount = projects.filter(function(p) { return p.status==="pause"; }).length;
  var termineCount = projects.filter(function(p) { return p.status==="termine"; }).length;

  return (
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      {/* Summary */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
        {[{label:"En cours",val:actifCount,color:"#7F77DD"},{label:"En pause",val:pauseCount,color:"#BA7517"},{label:"Terminés",val:termineCount,color:"#1D9E75"}].map(function(s) {
          return (
            <div key={s.label} style={{...block,padding:"8px 10px",textAlign:"center"}}>
              <div style={{fontSize:18,fontWeight:700,color:s.color}}>{s.val}</div>
              <div style={{fontSize:10,color:THEME.textMuted}}>{s.label}</div>
            </div>
          );
        })}
      </div>

      {/* Filtres */}
      <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
        {[{id:"tous",label:"Tous"},{id:"actif",label:"En cours"},{id:"pause",label:"En pause"},{id:"termine",label:"Terminés"}].map(function(f) {
          return <button key={f.id} onClick={function() { setFilterStatus(f.id); }} style={{padding:"3px 12px",borderRadius:20,fontSize:12,cursor:"pointer",border:filterStatus===f.id?"1px solid "+THEME.accent+"66":THEME.border,background:filterStatus===f.id?THEME.filterActive:THEME.surfaceLight,color:filterStatus===f.id?THEME.accent:THEME.textSub,fontWeight:filterStatus===f.id?600:400}}>{f.label}</button>;
        })}
      </div>

      {/* Liste */}
      {filtered.length===0 && <div style={{...block,textAlign:"center",color:THEME.textMuted,fontSize:13}}>Aucun projet ici.</div>}
      {filtered.map(function(p) {
        return <ProjectCard key={p.id} project={p} skills={skills} onUpdate={updateProject} onDelete={deleteProject} onEdit={onEdit} onStepXp={handleStepXp} onBonusXp={handleBonusXp} onBonusXpRemove={handleBonusXpRemove}/>;
      })}

      {/* Formulaire ajout */}
      {!showAdd ? (
        <button onClick={function() { setShowAdd(true); }} style={{width:"100%",padding:"10px",borderRadius:14,cursor:"pointer",border:"1px dashed rgba(255,255,255,0.18)",background:"transparent",color:THEME.textMuted,fontSize:13}}>+ Nouveau projet</button>
      ) : (
        <div style={{...block,display:"flex",flexDirection:"column",gap:10}}>
          <div style={{fontSize:14,fontWeight:600,color:THEME.text}}>🗂 Nouveau projet</div>
          <input value={form.name} onChange={function(e) { setForm(function(f) { return {...f,name:e.target.value}; }); }} placeholder="Nom du projet..." style={inp}/>
          <textarea value={form.description} onChange={function(e) { setForm(function(f) { return {...f,description:e.target.value}; }); }} placeholder="Description (optionnel)..." rows={2} style={{...inp,resize:"vertical",fontFamily:"inherit"}}/>

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
            <div>
              <div style={{fontSize:11,color:THEME.textMuted,marginBottom:3}}>Priorité</div>
              <input type="number" min={1} max={9} value={form.priority} onChange={function(e) { setForm(function(f) { return {...f,priority:Number(e.target.value)}; }); }} style={{...inp,textAlign:"center"}}/>
            </div>
            <div>
              <div style={{fontSize:11,color:THEME.textMuted,marginBottom:3}}>Date début</div>
              <input type="date" value={form.startDate} onChange={function(e) { setForm(function(f) { return {...f,startDate:e.target.value}; }); }} style={inp}/>
            </div>
            <div>
              <div style={{fontSize:11,color:THEME.textMuted,marginBottom:3}}>Date limite</div>
              <input type="date" value={form.deadline} onChange={function(e) { setForm(function(f) { return {...f,deadline:e.target.value}; }); }} style={inp}/>
            </div>
          </div>

          {/* Compétences liées */}
          <div>
            <div style={{fontSize:11,color:THEME.textMuted,marginBottom:6}}>Compétences liées <span style={{color:THEME.textMuted}}>(XP partagé entre toutes)</span></div>
            <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
              {(skills||[]).map(function(sk) {
                var active = !!form.linkedSkills.find(function(ls) { return ls.skillId===sk.id; });
                return (
                  <button key={sk.id} onClick={function() { toggleFormSkill(sk.id); }} style={{padding:"3px 10px",borderRadius:20,fontSize:11,cursor:"pointer",border:active?"1px solid "+sk.color:"1px solid #eee",background:active?sk.color+"18":THEME.surfaceCard,color:active?sk.color:THEME.textMuted,fontWeight:active?600:400}}>
                    {active?"✓ ":""}{sk.name}
                  </button>
                );
              })}
            </div>
          </div>

          {/* XP config */}
          {form.linkedSkills.length > 0 && (
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,padding:"10px",borderRadius:10,background:"rgba(127,119,221,0.06)",border:"1px solid #7F77DD22"}}>
              <div>
                <div style={{fontSize:11,color:"#7F77DD",marginBottom:3}}>XP par étape cochée</div>
                <input type="number" min={1} max={50} value={form.xpPerStep} onChange={function(e) { setForm(function(f) { return {...f,xpPerStep:Number(e.target.value)}; }); }} style={{...inp,textAlign:"center"}}/>
              </div>
              <div>
                <div style={{fontSize:11,color:"#1D9E75",marginBottom:3}}>Bonus XP à la fin</div>
                <input type="number" min={0} max={200} value={form.xpBonus} onChange={function(e) { setForm(function(f) { return {...f,xpBonus:Number(e.target.value)}; }); }} style={{...inp,textAlign:"center"}}/>
              </div>
            </div>
          )}

          {/* Étapes */}
          <div>
            <div style={{fontSize:11,color:THEME.textMuted,marginBottom:5}}>Étapes</div>
            <div style={{display:"flex",flexDirection:"column",gap:4,marginBottom:6}}>
              {form.steps.map(function(s, idx) {
                return (
                  <div key={s.id} style={{display:"flex",alignItems:"center",gap:6,padding:"5px 8px",borderRadius:8,background:THEME.surfaceCard,border:"0.5px solid rgba(255,255,255,0.08)"}}>
                    <span style={{fontSize:11,color:THEME.textMuted,width:18}}>{idx+1}.</span>
                    <span style={{flex:1,fontSize:12,color:THEME.text}}>{s.label}</span>
                    <button onClick={function() { removeFormStep(s.id); }} style={{border:"none",background:"none",cursor:"pointer",fontSize:11,color:"#ddd"}}>✕</button>
                  </div>
                );
              })}
            </div>
            <div style={{display:"flex",gap:6}}>
              <input value={stepInput} onChange={function(e) { setStepInput(e.target.value); }} onKeyDown={function(e) { if(e.key==="Enter") addStepToForm(); }} placeholder="Ajouter une étape..." style={{...inp,flex:1}}/>
              <button onClick={addStepToForm} style={{padding:"7px 12px",borderRadius:10,fontSize:12,cursor:"pointer",border:"1px solid #7F77DD44",background:"#7F77DD12",color:"#7F77DD",whiteSpace:"nowrap"}}>+ Ajouter</button>
            </div>
          </div>

          <div style={{display:"flex",gap:8}}>
            <button onClick={createProject} style={{flex:1,padding:"8px",borderRadius:10,cursor:"pointer",border:"1px solid #7F77DD44",background:"#7F77DD",color:"#fff",fontSize:13,fontWeight:600}}>Créer le projet</button>
            <button onClick={function() { setShowAdd(false); }} style={{padding:"8px 14px",borderRadius:10,cursor:"pointer",border:"1px solid rgba(255,255,255,0.10)",background:"transparent",color:THEME.textMuted,fontSize:13}}>Annuler</button>
          </div>
        </div>
      )}
    </div>
  );
}

// --- BANQUE DE GÉNÉRATION LOCALE ---
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function pickN(arr, n) {
  var copy = arr.slice(); var res = [];
  for (var i = 0; i < Math.min(n, copy.length); i++) {
    var idx = Math.floor(Math.random() * copy.length);
    res.push(copy.splice(idx, 1)[0]);
  }
  return res;
}

      {name:"Étude de mains en 5 positions", desc:"Dessine la même main ouverte, fermée, qui pointe, de profil et de dos. Commence par les formes géométriques simples avant d'affiner les doigts."},
      {name:"Portraits de 3/4 — construction", desc:"Trace la sphère du crâne, le plan de la mâchoire, puis place les traits avec les lignes de construction. Fais-en 3 consécutifs pour gagner en fluidité."},
      {name:"Poses dynamiques — ligne d'action", desc:"Trace d'abord une seule courbe d'action, puis construis le personnage autour. L'objectif c'est que la pose soit lisible même réduite à 5cm."},
      {name:"Étude de pieds sous 3 angles", desc:"Pied de face, de côté, de dos. Commence par un bloc rectangulaire avant d'arrondir. Beaucoup de gens évitent les pieds — c'est le moment de s'y coller."},
      {name:"Expressions faciales x6", desc:"Joie, tristesse, colère, dégoût, surprise, peur. Garde le même visage de base et change uniquement les sourcils, les yeux et la bouche."},
      {name:"Corps en 7 têtes — proportions", desc:"Empile 7 rectangles de la hauteur d'une tête. Place les articulations aux bons niveaux : épaules à 1.5, coudes à 3, hanches à 4, genoux à 5.5."},
      {name:"Torse masculin/féminin — différences", desc:"Dessine les deux faces du même torse en comparatif. Focus sur la largeur des épaules vs hanches, la cage thoracique et la taille."},
      {name:"Étude de dos — colonne et omoplates", desc:"Le dos est souvent négligé. Dessine-le de dos, de 3/4 avec le bras levé pour voir les omoplates en mouvement."},
      {name:"Oreilles sous 3 angles", desc:"Frontale, de profil, légèrement de dessous. Commence par la forme en C avant d'ajouter le tragus, l'hélix et l'anthélix."},
      {name:"Mâchoire et crâne — structure osseuse simplifiée", desc:"Pas besoin d'être médical. Schématise le crâne en sphère + boîte pour la mâchoire. Fais 5 variations de forme : carré, ovale, triangulaire, rond, en losange."},
    ],
    "Théorie des couleurs": [
      {name:"Palette monochrome — 5 valeurs", desc:"Prends une seule teinte et crée 5 variations : deux foncées, une neutre, deux claires. Utilise-les pour faire une sphère ou un cube simple avec ombres et lumières."},
      {name:"Couleurs chaudes vs froides — même scène", desc:"Dessine une scène simple deux fois. Une version avec une dominante chaude (oranges, rouges), une avec une dominante froide (bleus, verts). Compare l'ambiance."},
      {name:"Couleurs complémentaires — tension visuelle", desc:"Choisis deux complémentaires (bleu/orange, violet/jaune, rouge/vert). Utilise l'une pour le sujet, l'autre pour le fond. Joue avec les proportions."},
      {name:"Température de la lumière", desc:"Dessine le même objet éclairé par une lumière chaude (soleil, bougie) et une froide (lune, LED). Les ombres portées changent aussi de température."},
      {name:"Palette limitée à 3 couleurs", desc:"Choisis 3 couleurs non-consécutives sur la roue chromatique. Tu n'as le droit qu'à ces 3 couleurs + blanc et noir pour toute l'illustration."},
      {name:"Valeurs en niveaux de gris", desc:"Construis une composition en 5 valeurs de gris uniquement (pas de traits). L'objectif est que l'image soit lisible et contrastée même sans couleur."},
      {name:"Ambiance jour vs nuit — même lieu", desc:"Dessine la même pièce ou le même paysage en version jour et nuit. La palette change complètement — les ombres sont plus longues, les sources de lumière différentes."},
      {name:"Couleurs sales vs pures", desc:"Dessine deux versions du même sujet. Une avec des couleurs vives et saturées, une avec des couleurs désaturées et mélangées à du gris. Compare l'effet."},
    ],
    "Composition": [
      {name:"Règle des tiers — placement du sujet", desc:"Divise ton format en 9 cases. Place ton sujet sur l'une des 4 intersections. Évite de centrer. Fais 3 miniatures avec la même scène et 3 placements différents."},
      {name:"Format vertical vs horizontal", desc:"Dessine le même sujet en portrait et en paysage. Observe comment l'espace négatif change l'ambiance et l'équilibre visuel."},
      {name:"Lignes directrices", desc:"Crée une image où les éléments (routes, bras, regards, ombres) guident l'œil vers un point focal. Teste avec des flèches d'abord, puis avec le dessin."},
      {name:"Espace négatif actif", desc:"L'espace vide autour de ton sujet doit avoir une forme intéressante. Dessine d'abord la silhouette, puis remplis le fond pour que les deux formes soient agréables."},
      {name:"Composition en triangle", desc:"Place tes 3 éléments principaux sur les sommets d'un triangle imaginaire. Ça stabilise la composition et guide l'œil naturellement."},
      {name:"Premier plan, milieu, arrière-plan", desc:"Crée une scène avec 3 plans distincts. Le premier plan est foncé et détaillé, le milieu est le sujet principal, l'arrière-plan est clair et flou."},
      {name:"Miniatures de composition x6", desc:"Fais 6 miniatures en 5 minutes chacune pour la même scène. Explore 6 cadres différents. Aucun détail — juste les masses et l'équilibre."},
    ],
    "Lumière et Ombres": [
      {name:"Source de lumière unique — sphère et cube", desc:"Place ta source de lumière en haut à gauche. Dessine une sphère et un cube avec ombre propre, ombre portée et lumière réfléchie (la petite lueur en bas de la sphère)."},
      {name:"Contre-jour", desc:"Le sujet est devant la source de lumière. Résultat : silhouette sombre avec un halo lumineux sur les bords. Essaie avec un personnage devant une fenêtre."},
      {name:"Lumière artificielle colorée", desc:"Dessine un visage éclairé par une bougie (lumière orange, chaude) et par un écran (lumière bleue, froide). Les ombres changent aussi de couleur."},
      {name:"3 sources de lumière — complexité", desc:"Principale (forte, directionnelle), secondaire (plus douce, vient du côté opposé), ambiante (vient de partout, très douce). Applique les 3 sur un objet simple."},
      {name:"Valeurs sans contours", desc:"Dessine uniquement avec des valeurs, pas de traits. Commence par le fond, puis ajoute les zones sombres, puis les zones claires. Aucune ligne de contour."},
      {name:"Ombres portées — formes complexes", desc:"Une sphère sur un cube, un cube sur un cylindre. Les ombres portées suivent la forme de la surface sur laquelle elles tombent. Dessine les formes d'ombre précisément."},
      {name:"Éclairage dramatique — clair-obscur", desc:"80% de l'image dans l'ombre, 20% très éclairé. Un seul point lumineux fort. Inspire-toi du style de Caravage. Idéal pour un visage ou une main tendue vers la lumière."},
    ],
    "Aquarelle/Peinture": [
      {name:"Lavis progressif — humide sur humide", desc:"Mouille entièrement ta feuille. Pose une couleur diluée et laisse-la se répandre. Ajoute une deuxième couleur avant que la première sèche et observe le fondu naturel."},
      {name:"Réserves blanches", desc:"En aquarelle le blanc c'est le papier. Planifie tes zones de lumière avant de commencer et protège-les. Travaille du clair vers le foncé."},
      {name:"Textures au sel", desc:"Après avoir posé un lavis humide, saupoudre du sel de cuisine. Observe le résultat en séchant. Parfait pour simuler des textures organiques comme l'écorce ou la pierre."},
      {name:"Dégrade de couleur — 3 passages", desc:"Premier passage léger et pâle. Deuxième passage quand le premier est sec, plus concentré, sur 2/3 de la zone. Troisième passage uniquement sur 1/3 pour les zones sombres."},
      {name:"Encre + aquarelle — résistance", desc:"Fais d'abord ton dessin à l'encre imperméable. Laisse sécher. Puis applique des lavis d'aquarelle par-dessus. L'encre résiste, l'aquarelle colore."},
      {name:"Monochrome — toute une image en une couleur", desc:"Choisis une seule couleur et dilue-la à différentes concentrations pour créer toutes tes valeurs. Parfait pour travailler la lumière sans se perdre dans les couleurs."},
      {name:"Feuillage et végétation — aplats et détails", desc:"D'abord des aplats larges pour les masses de verdure. Quand c'est sec, ajoute les détails des feuilles individuelles uniquement là où l'œil accroche."},
    ],
    "Character Design": [
      {name:"Silhouette lisible — test à 5cm", desc:"Dessine ton personnage en silhouette noire. Réduis-le à 5cm de hauteur. Il doit encore être reconnaissable et son attitude doit être claire."},
      {name:"3 designs pour un même perso", desc:"Prends un archétype (sorcière, guerrier, voleur). Crée 3 versions très différentes en gardant le même concept. Joue sur les proportions, les formes, les silhouettes."},
      {name:"Design de tenue — fonctionnalité et style", desc:"La tenue doit avoir du sens pour le personnage. Un mage en talons hauts ça se justifie ou pas ? Dessine la tenue complète avec les accessoires et explique leur utilité."},
      {name:"Expressions pour un même perso x5", desc:"Garde exactement les mêmes proportions de visage mais change les expressions : neutre, joyeux, en colère, triste, dédaigneux. Le style doit rester cohérent."},
      {name:"Fiche de personnage complète", desc:"Silhouette frontale et de dos, gros plan sur le visage, détails des accessoires clés, palette de couleurs officielle (max 5 couleurs). Tout sur une seule page."},
      {name:"Personnage dans son environnement", desc:"Place ton personnage dans un décor qui lui correspond. Il doit interagir avec quelque chose. L'environnement doit en dire autant sur lui que son design."},
      {name:"Types de corps — variations", desc:"Prends un archétype et dessine-le en 4 morphologies différentes. Même personnage, même costume, mais les proportions et les formes du corps changent radicalement."},
    ],
    "Lineart / Encrage": [
      {name:"Variation d'épaisseur — poids du trait", desc:"Les contours extérieurs sont épais, les détails intérieurs fins, les zones dans l'ombre plus épaisses. Fais un même dessin deux fois : une fois sans variation, une fois avec."},
      {name:"Hatching et cross-hatching", desc:"Utilise des séries de lignes parallèles pour créer les valeurs, sans gris ni couleur. Plus les lignes sont serrées, plus la zone est sombre. Fais un objet sphérique uniquement avec des hachures."},
      {name:"Encrage sans esquisse au crayon", desc:"Trace directement à l'encre. Tu n'as pas le droit d'effacer. L'objectif c'est de gagner en confiance et en fluidité. Les erreurs font partie du résultat."},
      {name:"Stippling — texture en pointillés", desc:"Crée des valeurs uniquement avec des points. Plus de points = plus sombre. Aucune ligne. Idéal pour les textures organiques comme la peau, la pierre ou les fruits."},
      {name:"Textures à l'encre — 5 matières", desc:"Remplis 5 rectangles avec des textures différentes à l'encre : bois, tissu, métal, fourrure, pierre. Chacune doit être clairement reconnaissable."},
      {name:"Contours expressifs", desc:"Dessine le même sujet avec 3 types de traits : nerveux et rapide, lent et précis, épais et gras. Compare les personnalités que chaque style crée."},
    ],
    "Perspective": [
      {name:"Cube en perspective 1 point de fuite", desc:"Place ton point de fuite au centre de l'horizon. Dessine 5 cubes à différentes positions : au-dessus, en dessous, à gauche, à droite de ton point de fuite."},
      {name:"Chambre en perspective 2 points de fuite", desc:"Dessine l'intérieur d'une pièce avec 2 points de fuite sur la ligne d'horizon. Ajoute un meuble simple, une fenêtre et une porte."},
      {name:"Perspective atmosphérique", desc:"Plus c'est loin, plus c'est pâle, flou et bleuté. Dessine un paysage avec 4 plans. Chaque plan doit être plus clair et moins détaillé que le précédent."},
      {name:"Personnage en raccourci", desc:"Dessine un bras ou une jambe qui pointe vers toi. Le raccourci (foreshortening) est une des choses les plus difficiles en anatomie. Commence par des cylindres."},
    ],
    "Backgrounds": [
      {name:"Intérieur cosy — sources de lumière", desc:"Une pièce avec au moins 2 sources de lumière différentes (fenêtre + lampe). Les objets ont des ombres cohérentes avec chaque source. Pas besoin de tout détailler."},
      {name:"Végétation — masses et détails sélectifs", desc:"D'abord les grandes masses sombres de feuillage. Puis les zones éclairées. Enfin quelques feuilles individuelles uniquement là où l'œil accroche naturellement."},
      {name:"Architecture fantastique", desc:"Combine des éléments architecturaux réels (arcs, colonnes, dômes) avec des éléments organiques (racines, cristaux, lianes). La gravité peut être approximative."},
      {name:"Paysage avec profondeur", desc:"3 plans distincts. Premier plan sombre et détaillé. Milieu : ton sujet principal. Arrière-plan : clair, flou, peu de détails. Utilise la couleur et les valeurs pour créer la profondeur."},
      {name:"Scène nocturne — sources lumineuses multiples", desc:"Nuit = ambiance sombre globale mais avec des sources de lumière précises (lune, fenêtres, lanternes). Chaque source a sa couleur et sa portée."},
      {name:"Ruines envahies par la végétation", desc:"Des murs effondrés, des colonnes brisées, des racines qui envahissent tout. Travaille le contraste entre les lignes dures de l'architecture et les formes organiques des plantes."},
    ],
    "Style personnel": [
      {name:"Même sujet en 3 styles différents", desc:"Choisis un sujet simple (champignon, visage, fleur). Dessine-le en réaliste, en cartoon très stylisé, et dans ton style personnel actuel. Compare les 3."},
      {name:"Analyse d'un artiste que tu admires", desc:"Prends une illustration que tu aimes. Identifie : la palette (max 5 couleurs ?), la façon dont les contours sont faits, la simplification des formes. Maintenant copie-la intentionnellement."},
      {name:"Série cohérente — 3 illustrations", desc:"3 illustrations différentes mais qui forment clairement une série. Même palette, même style de trait, même ambiance. C'est ce qui crée un portfolio cohérent."},
      {name:"Redesign d'un perso existant dans ton style", desc:"Prends un personnage connu et redesigne-le complètement dans ton univers visuel. Garde l'essence du personnage mais fais-en quelque chose de tien."},
    ],
    "Illustration vectorielle": [
      {name:"Formes géométriques — composition minimaliste", desc:"Utilise uniquement des cercles, rectangles et triangles. Crée une scène reconnaissable (paysage, visage, animal) avec le minimum de formes possible."},
      {name:"Flat design — illustration sans ombres", desc:"Couleurs plates, pas d'ombre, pas de dégradé. L'information de profondeur vient uniquement de la superposition des formes et des couleurs."},
      {name:"Icônes cohérentes — série de 6", desc:"Crée 6 icônes sur le même thème (nature, outils, météo...). Même épaisseur de trait, même style, même taille. La cohérence est plus importante que chaque icône individuelle."},
      {name:"Portrait en formes géométriques", desc:"Décompose un visage en formes géométriques pures. Chaque zone (front, nez, joues, menton) devient une forme simple. Utilise la couleur pour différencier les plans."},
    ],
    "3D Modeling": [
      {name:"Modélise un objet du quotidien", desc:"Choisis un objet simple autour de toi (tasse, bouteille, chaussure). Modélise-le dans Blender en low poly, applique un matériau de base et fais un rendu simple."},
      {name:"Scène nature morte low poly", desc:"Arrange 3 à 5 objets simples sur une table. Travaille la composition et l'éclairage autant que la modélisation. Une bonne lumière compense des formes simples."},
      {name:"Personnage low poly original", desc:"Crée un personnage de ton invention en gardant un maximum de 1500 faces. Silhouette reconnaissable, proportions cohérentes, matériaux distincts pour chaque zone."},
      {name:"Architecture fantastique low poly", desc:"Une tour, une cabane magique, un temple ruiné. Structure simple mais avec du caractère. Ajoute des détails décoratifs géométriques (créneaux, fenêtres en ogive, etc)."},
      {name:"Créature Blender — forme organique", desc:"Parte d'une sphère et sculpt ou modélise une créature simple. Pas besoin de topologie parfaite — l'objectif c'est l'expressivité de la silhouette."},
    ],
    "Narration visuelle": [
      {name:"Séquence de 4 cases — sans texte", desc:"Raconte une micro-histoire en 4 cases sans aucun mot. Les émotions, les actions et la conclusion doivent être compréhensibles uniquement par l'image."},
      {name:"Planche muette — entrée dans un lieu", desc:"Montre un personnage qui entre dans un endroit nouveau. 4 à 6 cases. Joue sur les cadrages : plan large pour le lieu, plan moyen pour l'entrée, gros plan pour la réaction."},
    ],
    "Digital Art": [
      {name:"Brush test — 5 textures différentes", desc:"Teste 5 brosses différentes sur un fond neutre. Pour chacune : trace des lignes droites, courbes, fais des ronds remplis et des aplats. Note ce que chaque brosse fait bien."},
      {name:"Sous-peinture grisée + couleur par-dessus", desc:"D'abord une sous-peinture complète en niveaux de gris. Puis ajoute des calques de couleur par-dessus en mode 'Couleur' ou 'Incrustation'. C'est la technique des maîtres numérique."},
    ],
    "Pixel Art": [
      {name:"Sprite 16x16 — personnage simple", desc:"Limite-toi à une grille 16x16 pixels. Crée un petit personnage reconnaissable avec 4 couleurs maximum. Chaque pixel compte."},
      {name:"Tile de sol — seamless", desc:"Crée un tile de 32x32 qui se répète sans couture visible. Test : place-le 4 fois en 2x2. Les bords doivent se connecter parfaitement."},
    ],
    "Narration visuelle": [
      {name:"Séquence muette en 4 cases", desc:"Raconte une micro-histoire sans aucun mot. Choisis un sujet simple : quelqu'un trouve quelque chose, rate quelque chose, rencontre quelqu'un. La clarté prime."},
      {name:"Avant / Après — 2 cases", desc:"Case 1 : une situation. Case 2 : le résultat. L'action se passe entre les deux dans la tête du lecteur. L'ellipse est l'outil le plus puissant de la BD."},
      {name:"4 cadrages — même moment", desc:"La même scène vue de face, de dos, de dessus et de dessous. Observe comment la même information prend une valeur émotionnelle complètement différente selon le point de vue."},
      {name:"Page complète — scène complexe", desc:"Une seule grande illustration qui raconte une situation avec plusieurs personnages. Pas de cases — une seule image doit tout dire. Travaille les regards, les postures, la composition."},
    ],
    "Pixel Art": [
      {name:"Sprite 16x16 — objet iconique", desc:"Choisis un objet simple (champignon, épée, potion) et dessine-le en 16x16 avec 4 couleurs max. Commence par la silhouette noire, puis remplis les zones de couleur."},
      {name:"Personnage 32x32", desc:"Un petit personnage en 32x32 pixels. Silhouette claire, détails essentiels seulement. Teste-le sur fond blanc et fond noir."},
      {name:"Tile seamless 16x16", desc:"Un tile de sol ou de mur qui se répète sans couture. Place-le en 2x2 pour tester les raccords. Les bords gauche/droite et haut/bas doivent se connecter."},
      {name:"Animation 4 frames", desc:"Un objet ou personnage qui bouge en boucle en 4 frames. Mouvement subtil : respiration, lumière qui clignote, eau qui ondule. La boucle doit être imperceptible."},
    ],
    "Animation": [
      {name:"Cycle de marche — 4 frames clés", desc:"Contact, passage, levée, abaissement. 4 poses suffisent pour un cycle de marche convaincant. Dessine les 4 poses sur des calques séparés."},
      {name:"Bounce ball — 6 frames", desc:"La balle rebondissante est la base de l'animation. Elle s'écrase à l'impact (squash) et s'étire dans le mouvement (stretch). 6 frames minimum pour un cycle."},
    ],
  },

  contraintes: {

      "avec une palette de 3 couleurs maximum",
      "en commençant par les formes géométriques simples uniquement",
      "en format carré uniquement",
      "en noir et blanc — aucune couleur",
    ],
    Moyen: [
      "en 20 minutes — planifie 5 min, dessine 15 min",
      "avec une palette de 2 couleurs complémentaires uniquement",
      "sans aucune ligne de contour — uniquement des valeurs et des couleurs",
      "en utilisant uniquement ta main non-dominante",
      "en format très allongé (1:3 minimum)",
      "en commençant par le fond et en allant vers le sujet",
    ],
    Difficile: [

      "avec une seule couleur + le noir + le blanc uniquement",
      "sans esquisse préalable — directement à l'encre ou à la couleur",
      "en format miniature (pas plus grand que 5x5cm)",
      "en travaillant du plus foncé au plus clair uniquement",
      "avec un seul outil — pas de changement de brosse/outil autorisé",
    ],
