function getArtLevelInfo(lv) {
  var info = ART_LEVEL_TITLES.find(function(t) { return lv >= t.min && lv <= t.max; });
  return info || ART_LEVEL_TITLES[ART_LEVEL_TITLES.length - 1];
}

// Retourne le nombre de pénalités dues depuis la dernière date d'activité
// decayState = { lastActivityDate: "DD/MM/YYYY", appliedWeeks: number }
// allDates = toutes les dates d'activité (tâches + DTIYS + projets + 30days + formations)
function calcDecayPenalties(history, decayState, allDates) {
  // Trouver la date la plus récente parmi toutes les activités
  var lastDate = null;
  var lastDateStr = null;

  var dates = [];
  // Depuis l'historique (tâches complétées)
  if (history && history.length > 0 && history[0].date) {
    dates.push(history[0].date.split(" ")[0]);
  }
  // Depuis les activités supplémentaires (DTIYS, projets, 30days, formations)
  if (allDates && allDates.length > 0) {
    allDates.forEach(function(d) { if (d) dates.push(d); });
  }

  dates.forEach(function(raw) {
    if (!raw) return;
    var p = raw.split("/").map(Number);
    var d = new Date(p[2], p[1]-1, p[0]);
    if (!lastDate || d > lastDate) { lastDate = d; lastDateStr = raw; }
  });

  if (!lastDate) return { penalties: 0, newState: decayState };

  var today = new Date(); today.setHours(0,0,0,0);
  var daysSinceLast = Math.floor((today - lastDate) / 86400000);

  if (daysSinceLast <= DECAY_GRACE_DAYS) {
    return { penalties: 0, newState: { lastActivityDate: lastDateStr, appliedWeeks: 0 } };
  }

  var weeksOver = Math.floor((daysSinceLast - DECAY_GRACE_DAYS) / 7);
  var alreadyApplied = decayState ? (decayState.appliedWeeks || 0) : 0;

  if (decayState && decayState.lastActivityDate && decayState.lastActivityDate !== lastDateStr) {
    alreadyApplied = 0;
  }

  var newPenalties = Math.max(0, weeksOver - alreadyApplied);
  return {
    penalties: newPenalties,
    newState: { lastActivityDate: lastDateStr, appliedWeeks: alreadyApplied + newPenalties }
  };
}

// Utilitaires Supabase REST
async function supaFetch(path, method, body) {
  var userId = supaAuth.userId;
  if (!userId) return null;
  var token = supaAuth.token;
  var headers = {
    "Content-Type": "application/json",
    "apikey": SUPA_KEY,
    "Authorization": "Bearer " + token,
  };
  if (method === "POST") {
    headers["Prefer"] = "resolution=merge-duplicates,return=minimal";
    path = path + "?on_conflict=user_id,key";
  }
  var res = await fetch(SUPA_URL + "/rest/v1" + path, {
    method: method || "GET",
    headers: headers,
    body: body ? JSON.stringify(body) : undefined,
  });
  if (!res.ok) return null;
  var text = await res.text();
  return text ? JSON.parse(text) : null;
}

// État d'auth global — restauré de façon synchrone au démarrage
var supaAuth = (function() {
  try {
    var saved = localStorage.getItem("lilith_auth");
    if (saved) {
      var parsed = JSON.parse(saved);
      return { userId: parsed.userId, token: parsed.token };
    }
  } catch(e) {}
  return { userId: null, token: null };
})();

// --- STORAGE WRAPPER (Supabase + localStorage fallback) ---
const storage = {
  get: async function(key) {
    // Supabase en priorité si connecté
    if (supaAuth.userId) {
      try {
        var rows = await supaFetch("/saves?user_id=eq." + supaAuth.userId + "&key=eq." + encodeURIComponent(key) + "&select=value", "GET");
        if (rows && rows.length > 0) return rows[0].value;
      } catch(e) {}
    }
    // Fallback localStorage
    try { var v = localStorage.getItem(key); return v ? JSON.parse(v) : null; } catch(e) { return null; }
  },
  set: async function(key, val) {
    // localStorage toujours (backup local)
    try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) {}
    // Supabase si connecté
    if (supaAuth.userId) {
      try {
        await supaFetch("/saves", "POST", { user_id: supaAuth.userId, key: key, value: val, updated_at: new Date().toISOString() });
      } catch(e) {}
    }
  },
};

  var json = JSON.stringify(data, null, 2);
  var file = new File([json], filename, { type: "application/json" });
  if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
    try {
      await navigator.share({ files: [file], title: "Lilith Studio — Sauvegarde" });
      if (onSuccess) onSuccess();
      return;
    } catch(e) {
      if (e.name === "AbortError") return;
    }
  }
  // Desktop fallback
  var blob = new Blob([json], { type: "application/json" });
  var url = URL.createObjectURL(blob);
  var a = document.createElement("a");
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
  if (onSuccess) onSuccess();
}

// --- CUSTOM SELECT ---
function CustomSelect(props) {
  const value = props.value;
  const onChange = props.onChange;
  const options = props.options; // [{value, label}]
  const placeholder = props.placeholder || "Choisir...";
  const style = props.style || {};

  const [open, setOpen] = useState(false);
  const ref = React.useRef(null);

  // Fermer si clic extérieur
  useEffect(function() {
    function handleClick(e) { if (ref.current && !ref.current.contains(e.target)) setOpen(false); }
    document.addEventListener("mousedown", handleClick);
    return function() { document.removeEventListener("mousedown", handleClick); };
  }, []);

  var selected = options.find(function(o) { return o.value===value; });
  var label = selected ? selected.label : placeholder;

  return (
    <div ref={ref} style={{position:"relative", ...style}}>
      {/* Trigger */}
      <button
        onClick={function(){setOpen(function(v){return !v;});}}
        style={{width:"100%",padding:"8px 32px 8px 12px",borderRadius:10,border:"1px solid "+(open?THEME.accent:THEME.border),background:open?THEME.filterActive:THEME.surfaceLight,color:value?THEME.text:THEME.textMuted,fontSize:13,cursor:"pointer",textAlign:"left",position:"relative",fontFamily:"'Inter',sans-serif",fontWeight:500,transition:"all 0.15s"}}
      >
        {label}
        <span style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%) rotate("+(open?"180deg":"0deg")+")",fontSize:10,color:THEME.textMuted,transition:"transform 0.2s"}}>▼</span>
      </button>

      {/* Dropdown */}
      {open && (
        <div style={{position:"absolute",top:"calc(100% + 4px)",left:0,right:0,background:THEME.modalBg,border:"1px solid "+THEME.accent+"44",borderRadius:12,boxShadow:"0 8px 24px rgba(0,0,0,0.12)",zIndex:500,maxHeight:240,overflowY:"auto",padding:"4px"}}>
          {options.map(function(o) {
            var isActive = o.value===value;
            return (
              <button key={o.value} onClick={function(){onChange(o.value);setOpen(false);}}
                style={{width:"100%",padding:"8px 12px",borderRadius:8,border:"none",background:isActive?THEME.filterActive:"transparent",color:isActive?THEME.accent:THEME.text,fontSize:13,cursor:"pointer",textAlign:"left",fontFamily:"'Inter',sans-serif",fontWeight:isActive?600:400,display:"flex",alignItems:"center",gap:8,transition:"background 0.1s"}}
              >
                {isActive && <span style={{fontSize:10,color:THEME.accent}}>✓</span>}
                {!isActive && <span style={{width:14}}/>}
                {o.label}
              </button>
            );
          })}
        </div>
      )}
    </div>
  );
}

// --- TASK CARD ---
function TaskCard(props) {
  const task = props.task;
  const skills = props.skills;
  const completions = props.completions;
  const onComplete = props.onComplete;
  const onEdit = props.onEdit;
  const isFav = props.isFav;
  const onToggleFav = props.onToggleFav;

  const [checkedOpts, setCheckedOpts] = useState({});
  const [expanded, setExpanded] = useState(false);
  const [note, setNote] = useState("");
  const isDone = completions > 0;
  const required = task.rewards.filter(function(r) { return !r.optional; });
  const optional = task.rewards.filter(function(r) { return r.optional; });
  const desc = DESCS[task.id];
  const diff = DIFF[task.id];

  function getGains() {
    var lines = [];
    required.forEach(function(r) {
      var sk = skills.find(function(s) { return s.id === r.skillId; });
      if (sk) lines.push({skill:sk,xp:r.xp});
    });
    optional.forEach(function(r, i) {
      if (checkedOpts[i]) {
        var sk = skills.find(function(s) { return s.id === r.skillId; });
        if (sk) lines.push({skill:sk,xp:r.xp});
      }
    });
    return lines;
  }

  function gainLabel() {
    var g = getGains();
    if (g.length === 0) return "cocher des options";
    return g.map(function(x) { return "+"+x.xp+" "+x.skill.name; }).join(" / ");
  }

  var isCustomTask = !DEFAULT_TASKS.find(function(t) { return t.id === task.id; });
  var cardBg = isDone ? THEME.cardDone : THEME.surfaceCard;
  var cardBorder = isDone ? THEME.cardDoneBorder : isCustomTask ? THEME.accent+"33" : THEME.border;

  return (
    <div style={{background:cardBg,border:"0.5px solid "+cardBorder,borderRadius:14,padding:"0.85rem 1rem"}}>
      <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:8,marginBottom:desc?3:7}}>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",alignItems:"center",gap:5,flexWrap:"wrap"}}>
            <span style={{fontSize:10,color:THEME.textMuted,background:THEME.surfaceLight,borderRadius:20,padding:"1px 8px"}}>{task.theme}</span>
            {isCustomTask && <span style={{fontSize:10,color:THEME.accent,background:THEME.accent+"12",borderRadius:20,padding:"1px 7px",fontWeight:500}}>✦ perso</span>}
            {diff && <span style={{fontSize:10,fontWeight:500,color:DIFF_COLOR[diff],background:DIFF_COLOR[diff]+"15",borderRadius:20,padding:"1px 7px"}}>{diff}</span>}
            {isDone && <span style={{fontSize:10,color:"#5a9e6f",fontWeight:600,background:"rgba(100,180,120,0.15)",borderRadius:20,padding:"1px 7px"}}>{"✓ x"+completions}</span>}
          </div>
          <div style={{fontSize:13,fontWeight:500,color:THEME.text,marginTop:4}}>{task.name}</div>
        </div>
        <div style={{display:"flex",gap:4,flexShrink:0,alignItems:"center"}}>
          <button onClick={function() { onToggleFav(task.id); }} style={{border:"none",background:"none",cursor:"pointer",fontSize:15,padding:"0 1px",color:isFav?"#7F77DD":"#ddd"}}>{isFav?"♥":"♡"}</button>
          {desc && <button onClick={function() { setExpanded(function(v) { return !v; }); }} style={{border:"none",background:"none",cursor:"pointer",fontSize:13,color:THEME.textMuted,padding:"0 1px"}}>{expanded?"▲":"▼"}</button>}
          <button onClick={function() { onEdit(task); }} style={{border:"none",background:"none",cursor:"pointer",fontSize:13,color:THEME.textMuted,padding:"0 1px"}}>✏️</button>
        </div>
      </div>
      {desc && expanded && <div style={{fontSize:11,color:THEME.textMuted,fontStyle:"italic",marginBottom:7,lineHeight:1.5}}>{desc}</div>}
      <div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:optional.length?7:9}}>
        {required.map(function(r, i) {
          var sk = skills.find(function(s) { return s.id === r.skillId; });
          if (!sk) return null;
          return <SkillBadge key={i} skill={sk} xpGain={r.xp} optional={false}/>;
        })}
      </div>
      {optional.length > 0 && (
        <div style={{marginBottom:9}}>
          <div style={{fontSize:10,color:THEME.textMuted,marginBottom:4}}>Options bonus :</div>
          {optional.map(function(r, i) {
            var sk = skills.find(function(s) { return s.id === r.skillId; });
            if (!sk) return null;
            return (
              <label key={i} style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer",marginBottom:3}}>
                <input type="checkbox" checked={!!checkedOpts[i]} onChange={function() { setCheckedOpts(function(p) { return {...p,[i]:!p[i]}; }); }} style={{accentColor:sk.color}}/>
                <SkillBadge skill={sk} xpGain={r.xp} optional={true}/>
                <span style={{fontSize:11,color:THEME.textMuted}}>{r.label}</span>
              </label>
            );
          })}
        </div>
      )}
      <textarea value={note} onChange={function(e){setNote(e.target.value);}} placeholder="Note optionnelle... (comment ça s'est passé ?)" rows={1} style={{width:"100%",padding:"6px 10px",borderRadius:10,border:"1px solid "+THEME.border,fontSize:11,color:THEME.textSub,resize:"none",fontFamily:"inherit",boxSizing:"border-box",background:THEME.inputBg,marginBottom:6,outline:"none"}}/>
      <button onClick={function() { onComplete(task, checkedOpts, note); setCheckedOpts({}); setNote(""); }} style={{width:"100%",padding:"6px",borderRadius:10,border:"1px solid "+(isDone?THEME.accentGreen+"44":THEME.borderLight),background:isDone?"rgba(110,231,183,0.1)":THEME.surfaceLight,color:isDone?THEME.accentGreen:THEME.text,fontSize:12,cursor:"pointer",fontWeight:500}}>
        ✓ {gainLabel()}
      </button>
    </div>
  );
}

function HistoryEntry(props) {
  const entry = props.entry;
  const task = props.task;
  const skills = props.skills;
  const onAddBonus = props.onAddBonus;
  const onEditDate = props.onEditDate;
  const onRemove = props.onRemove;
  const gallery = props.gallery || [];
  const onGoToGallery = props.onGoToGallery;
  var linkedImages = entry.taskId ? gallery.filter(function(img){return img.taskId === entry.taskId;}) : [];

  var isLibre = !!entry.isLibre;
  var unclaimed = (!isLibre && task) ? task.rewards.filter(function(r, i) { return r.optional && !(entry.claimedOptionals || []).includes(i); }) : [];
  const [checked, setChecked] = useState({});
  const [open, setOpen] = useState(false);
  const [editingDate, setEditingDate] = useState(false);
  const [newDate, setNewDate] = useState("");
  const [confirmDelete, setConfirmDelete] = useState(false);

  function startEditDate() {
    // Convertir DD/MM/YYYY HH:MM en YYYY-MM-DD pour l'input date
    var parts = entry.date ? entry.date.split(" ")[0].split("/") : [];
    if (parts.length === 3) {
      setNewDate(parts[2]+"-"+parts[1]+"-"+parts[0]);
    }
    setEditingDate(true);
  }
  function saveDate() {
    if (newDate && onEditDate) {
      var parts = newDate.split("-");
      var formatted = parts[2]+"/"+parts[1]+"/"+parts[0];
      var timePart = entry.date ? entry.date.split(" ")[1] : "00:00";
      onEditDate(entry.id, formatted+" "+(timePart||"00:00"));
    }
    setEditingDate(false);
  }

  function claim() {
    var toAdd = [];
    unclaimed.forEach(function(r, i) {
      if (checked[i]) toAdd.push({rewardIndex:task.rewards.indexOf(r),skillId:r.skillId,xp:r.xp});
    });
    if (toAdd.length === 0) return;
    onAddBonus(entry.id, toAdd);
    setChecked({});
    setOpen(false);
  }

  var cardBg = isLibre ? "rgba(167,139,250,0.08)" : THEME.surfaceCard;
  var cardBorder = isLibre ? THEME.accent+"22" : THEME.border;

  return (
    <div style={{background:cardBg,borderRadius:10,padding:"8px 10px",border:"0.5px solid "+cardBorder}}>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
            {isLibre && <span style={{fontSize:9,color:THEME.accent,background:THEME.accent+"18",borderRadius:20,padding:"1px 7px",fontWeight:600,flexShrink:0}}>{entry.libreType||"Libre"}</span>}
            <div style={{fontSize:13,fontWeight:500,color:THEME.text,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{entry.taskName}</div>
          </div>
          {entry.note && <div style={{fontSize:11,color:THEME.textMuted,fontStyle:"italic",marginTop:2,lineHeight:1.4}}>"{entry.note}"</div>}
          <div style={{display:"flex",flexWrap:"wrap",gap:4,marginTop:4}}>
            {entry.gains.map(function(g, i) {
              return <span key={i} style={{fontSize:10,background:g.color+"22",border:"1px solid "+g.color+"44",borderRadius:20,padding:"1px 7px",color:g.color,fontWeight:500}}>+{g.xp} {g.name}</span>;
            })}
          </div>
          {linkedImages.length > 0 && (

                <button onClick={function() { setConfirmDelete(false); }} style={{fontSize:10,padding:"2px 7px",borderRadius:20,border:"1px solid "+THEME.border,background:"transparent",color:THEME.textMuted,cursor:"pointer"}}>Non</button>

}

// --- TASK EDITOR ---
function TaskEditor(props) {
  const task = props.task;
  const skills = props.skills;
  const themes = props.themes;
  const onSave = props.onSave;
  const onDelete = props.onDelete;
  const onClose = props.onClose;
  const onAddTheme = props.onAddTheme;

  const blank = {skillId:skills[0]?skills[0].id:1,xp:10,optional:false,label:""};
  const [name, setName] = useState(task ? task.name : "");
  const [desc, setDesc] = useState(task ? (DESCS[task.id] || "") : "");
  const [theme, setTheme] = useState(task ? task.theme : themes[0]);
  const [rewards, setRewards] = useState(task ? task.rewards.filter(function(r) { return r.skillId !== 14 && r.skillId !== 15; }).map(function(r) { return {...r}; }) : [{...blank}]);
  const [newTheme, setNewTheme] = useState("");
  const [showNewTheme, setShowNewTheme] = useState(false);
  const [difficulty, setDifficulty] = useState(task ? (task.difficulty || "") : "");

  function setR(i, k, v) { setRewards(function(p) { return p.map(function(r, j) { return j === i ? {...r,[k]:v} : r; }); }); }

  function addTheme() {
    if (!newTheme.trim()) return;
    onAddTheme(newTheme.trim());
    setTheme(newTheme.trim());
    setNewTheme("");
    setShowNewTheme(false);
  }

  function handleSave() {
    if (!name.trim()) return;
    var saved = {id:task?task.id:Date.now(),name:name.trim(),theme:theme,rewards:rewards,difficulty:difficulty||null};
    if (desc.trim()) DESCS[saved.id] = desc.trim();
    onSave(saved);
  }

  var inp = {padding:"7px 10px",borderRadius:10,fontSize:13,border:"1px solid "+THEME.borderLight,background:THEME.inputBg,color:THEME.text};

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.35)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100}} onClick={onClose}>
      <div onClick={function(e) { e.stopPropagation(); }} style={{background:THEME.modalBg,border:"0.5px solid "+THEME.borderLight,borderRadius:18,padding:"1.5rem",width:"min(520px,93vw)",maxHeight:"85vh",overflowY:"auto"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"1rem"}}>
          <div style={{fontSize:15,fontWeight:600,color:THEME.text,fontFamily:"'Playfair Display',serif"}}>{task?"Modifier":"Nouvelle tache"}</div>
          <button onClick={onClose} style={{border:"none",background:"none",fontSize:18,cursor:"pointer",color:THEME.textMuted}}>✕</button>
        </div>
        <input value={name} onChange={function(e) { setName(e.target.value); }} placeholder="Nom..." style={{...inp,width:"100%",marginBottom:8,boxSizing:"border-box"}}/>
        <textarea value={desc} onChange={function(e) { setDesc(e.target.value); }} placeholder="Description (optionnel)..." rows={2} style={{...inp,width:"100%",marginBottom:8,boxSizing:"border-box",resize:"vertical",fontFamily:"inherit"}}/>
        <div style={{display:"flex",gap:6,marginBottom:showNewTheme?6:"1rem"}}>
          <CustomSelect
            value={theme}
            onChange={setTheme}
            options={themes.map(function(t){return {value:t,label:t};})}
            style={{flex:1}}
          />
          <button onClick={function() { setShowNewTheme(function(v) { return !v; }); }} style={{padding:"8px 12px",borderRadius:10,cursor:"pointer",border:"1px solid "+THEME.border,background:THEME.surfaceLight,color:THEME.textSub,fontSize:13}}>+ Cat</button>
        </div>
        <div style={{marginBottom:"1rem"}}>
          <CustomSelect
            value={difficulty}
            onChange={setDifficulty}
            options={[
              {value:"",      label:"— Difficulté (optionnel) —"},
              {value:"facile",  label:"🟢 Facile"},
              {value:"moyen",   label:"🟡 Moyen"},
              {value:"difficile",label:"🔴 Difficile"},
              {value:"expert",  label:"⚫ Expert"},
            ]}
          />
        </div>
        {showNewTheme && (
          <div style={{display:"flex",gap:6,marginBottom:"1rem"}}>
            <input value={newTheme} onChange={function(e) { setNewTheme(e.target.value); }} placeholder="Nom..." style={{...inp,flex:1}}/>
            <button onClick={addTheme} style={{padding:"8px 12px",borderRadius:10,cursor:"pointer",border:"1px solid "+THEME.accent+"44",background:THEME.accent,color:"#fff",fontSize:13,fontWeight:600}}>OK</button>
          </div>
        )}
        <div style={{fontSize:12,fontWeight:600,color:THEME.textMuted,marginBottom:7}}>Gains XP</div>
        {rewards.map(function(r, i) {
          return (
            <div key={i} style={{background:THEME.surfaceLight,borderRadius:10,padding:10,marginBottom:7,border:"1px solid "+THEME.border}}>
              <div style={{display:"flex",gap:6,marginBottom:r.optional?6:0,alignItems:"center"}}>
                <div style={{flex:2}}>
                  <CustomSelect
                    value={String(r.skillId)}
                    onChange={function(v){setR(i,"skillId",Number(v));}}
                    options={skills.map(function(s){return {value:String(s.id),label:(s.emoji||"")+s.name};})}
                  />
                </div>
                <input type="number" min={1} max={100} value={r.xp} onChange={function(e) { setR(i,"xp",Number(e.target.value)); }} style={{...inp,width:55}}/>
                <label style={{display:"flex",alignItems:"center",gap:4,fontSize:12,color:THEME.textMuted,cursor:"pointer"}}>
                  <input type="checkbox" checked={r.optional} onChange={function(e) { setR(i,"optional",e.target.checked); }}/>Opt.
                </label>
                <button onClick={function() { setRewards(function(p) { return p.filter(function(_,j) { return j!==i; }); }); }} style={{border:"none",background:"none",cursor:"pointer",color:THEME.textMuted,fontSize:16}}>✕</button>
              </div>
              {r.optional && <input value={r.label} onChange={function(e) { setR(i,"label",e.target.value); }} placeholder="Ex: Si en couleurs..." style={{...inp,width:"100%",boxSizing:"border-box"}}/>}
            </div>
          );
        })}
        <button onClick={function() { setRewards(function(p) { return [...p,{...blank}]; }); }} style={{width:"100%",padding:"7px",borderRadius:10,cursor:"pointer",border:"1px dashed "+THEME.borderLight,background:"transparent",color:THEME.textMuted,fontSize:13,marginBottom:"1rem"}}>+ Gain</button>
        <div style={{display:"flex",gap:8}}>
          <button onClick={handleSave} style={{flex:1,padding:"8px",borderRadius:10,cursor:"pointer",border:"1px solid "+THEME.borderLight,background:THEME.accent,color:"#fff",fontSize:14,fontWeight:600}}>Enregistrer</button>
          {task && <button onClick={function() { onDelete(task.id); onClose(); }} style={{padding:"8px 14px",borderRadius:10,cursor:"pointer",border:"1px solid "+THEME.accentPink+"44",background:THEME.accentPink+"12",color:THEME.accentPink,fontSize:14}}>Supprimer</button>}
        </div>
      </div>
    </div>
  );
}

// --- DTIYS CARD ---
function DtiysCard(props) {
  const d = props.d;
  const skills = props.skills;
  const onUpdate = props.onUpdate;
  const onDelete = props.onDelete;
  const onComplete = props.onComplete; // (dtiys) => void — appelé une seule fois à la complétion
  var statusColor = d.done ? "#1D9E75" : "#BA7517";
  const [confirmDeleteDtiys, setConfirmDeleteDtiys] = useState(false);

  function toggleDone() {
    var wasAlreadyDone = d.done;
    onUpdate(d.id, {done:!d.done});
    if (!wasAlreadyDone && onComplete) {
      onComplete(d); // donne XP
    } else if (wasAlreadyDone && d.rewards && d.rewards.length>0 && props.onUncomplete) {
      props.onUncomplete(d); // retire XP
    }
  }

  return (
    <div style={{background:THEME.surface,backdropFilter:"blur(12px)",border:"0.5px solid "+THEME.border,borderRadius:18,padding:"1rem 1.1rem",opacity:d.done?0.7:1}}>
      <div style={{display:"flex",alignItems:"flex-start",gap:10}}>
        <button onClick={toggleDone} style={{width:22,height:22,borderRadius:"50%",border:"2px solid "+(d.done?THEME.accentGreen:THEME.border),background:d.done?THEME.accentGreen:"transparent",color:"#fff",fontSize:12,cursor:"pointer",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",marginTop:2}}>{d.done?"✓":""}</button>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
            <div style={{fontSize:14,fontWeight:500,color:d.done?THEME.textMuted:THEME.text,textDecoration:d.done?"line-through":"none"}}>{d.name}</div>
            <span style={{fontSize:10,color:statusColor,background:statusColor+"15",borderRadius:20,padding:"1px 8px",fontWeight:500}}>{d.done?"Terminé":"En cours"}</span>
          </div>
          {d.link && <a href={d.link} target="_blank" rel="noreferrer" style={{fontSize:11,color:THEME.accent,textDecoration:"none",display:"block",marginTop:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{d.link}</a>}
          {/* Badges XP */}
          {(d.rewards||[]).length > 0 && (
            <div style={{display:"flex",gap:4,flexWrap:"wrap",marginTop:5}}>
              {(d.rewards||[]).map(function(r, i) {
                var sk = (skills||[]).find(function(s) { return s.id===r.skillId; });
                if (!sk) return null;
                return <span key={i} style={{fontSize:10,background:sk.color+"18",border:"1px solid "+sk.color+"44",borderRadius:20,padding:"2px 7px",color:sk.color,fontWeight:500}}>+{r.xp} {sk.name}</span>;
              })}
            </div>
          )}
          <textarea value={d.note} onChange={function(e) { onUpdate(d.id,{note:e.target.value}); }} placeholder="Notes..." rows={1} style={{width:"100%",marginTop:6,padding:"5px 8px",borderRadius:8,border:"1px solid "+THEME.border,fontSize:12,color:THEME.textSub,resize:"vertical",fontFamily:"inherit",boxSizing:"border-box",background:THEME.inputBg}}/>
        </div>
        {!confirmDeleteDtiys ? (
          <button onClick={function() { setConfirmDeleteDtiys(true); }} style={{border:"none",background:"none",cursor:"pointer",fontSize:15,color:THEME.textMuted,flexShrink:0}}>✕</button>
        ) : (
          <div style={{display:"flex",flexDirection:"column",gap:4,alignItems:"flex-end",flexShrink:0}}>
            <div style={{fontSize:10,color:THEME.accentPink,fontWeight:600,whiteSpace:"nowrap"}}>Supprimer ?</div>
            <div style={{display:"flex",gap:4}}>
              <button onClick={function(){onDelete(d.id);}} style={{fontSize:10,padding:"2px 8px",borderRadius:20,border:"1px solid "+THEME.accentPink+"88",background:THEME.accentPink+"18",color:THEME.accentPink,cursor:"pointer",fontWeight:600}}>Oui</button>
              <button onClick={function(){setConfirmDeleteDtiys(false);}} style={{fontSize:10,padding:"2px 8px",borderRadius:20,border:"1px solid "+THEME.border,background:"transparent",color:THEME.textMuted,cursor:"pointer"}}>Non</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// --- THIRTY CARD ---
function ThirtyCard(props) {
  const c = props.c;
  const skills = props.skills;
  const onToggleDay = props.onToggleDay;
  const onDelete = props.onDelete;
  const onUpdateDay = props.onUpdateDay;
  const onDayXp = props.onDayXp;
  const onDayXpRemove = props.onDayXpRemove;
  const onUpdateDayRewards = props.onUpdateDayRewards; // (cid, day, rewards) => void

  const done = c.checked.length;
  const pct = Math.round(done / 30 * 100);
  const barColor = pct === 100 ? THEME.accentGreen : THEME.accent;

  const [editingDay, setEditingDay] = useState(null);
  const [editVal, setEditVal] = useState("");
  const [expandedDay, setExpandedDay] = useState(null);
  const [confirmDelete, setConfirmDelete] = useState(false);

  function startEdit(day) { setEditingDay(day); setEditVal((c.dayLabels||{})[day]||""); }
  function saveEdit() { onUpdateDay(c.id, editingDay, editVal.trim()); setEditingDay(null); setEditVal(""); }

  function toggleDaySkill(day, skillId) {
    var current = (c.dayRewards||{})[day] || [];
    var has = current.find(function(r) { return r.skillId===skillId; });
    var next = has
      ? current.filter(function(r) { return r.skillId!==skillId; })
      : [...current, {skillId:skillId, xp:10}];
    onUpdateDayRewards(c.id, day, next);
  }

  function setDaySkillXp(day, skillId, xp) {
    var current = (c.dayRewards||{})[day] || [];
    var next = current.map(function(r) { return r.skillId===skillId ? {...r,xp:xp} : r; });
    onUpdateDayRewards(c.id, day, next);
  }

  return (
    <div style={{background:THEME.surface,backdropFilter:"blur(12px)",border:"0.5px solid "+THEME.border,borderRadius:18,padding:"1.1rem 1.2rem"}}>
      {/* Header */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
        <div>
          <div style={{fontSize:14,fontWeight:500,color:THEME.text}}>{c.name}</div>
          <div style={{fontSize:11,color:THEME.textMuted,marginTop:1}}>Commencé le {c.date} — {done}/30 jours</div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:13,fontWeight:700,color:barColor}}>{pct}%</span>
          <button onClick={function() { setConfirmDelete(true); }} style={{border:"none",background:"none",cursor:"pointer",fontSize:15,color:THEME.textMuted,opacity:0.7}}>✕</button>
        </div>
      </div>

      {/* Confirmation suppression */}
      {confirmDelete && (
        <div style={{margin:"8px 0",padding:"12px 14px",borderRadius:12,background:THEME.accentPink+"10",border:"1px solid "+THEME.accentPink+"44",display:"flex",alignItems:"center",gap:10}}>
          <div style={{flex:1}}>
            <div style={{fontSize:12,fontWeight:600,color:THEME.accentPink,marginBottom:2}}>Supprimer ce challenge ?</div>
            <div style={{fontSize:11,color:THEME.textMuted}}>"{c.name}" — {done}/30 jours · Action irréversible.</div>
          </div>
          <button onClick={function(){ setConfirmDelete(false); }} style={{padding:"5px 10px",borderRadius:8,border:"1px solid "+THEME.border,background:THEME.surfaceLight,color:THEME.textMuted,fontSize:12,cursor:"pointer",flexShrink:0}}>Annuler</button>
          <button onClick={function(){ onDelete(c.id); }} style={{padding:"5px 10px",borderRadius:8,border:"1px solid "+THEME.accentPink+"55",background:THEME.accentPink+"18",color:THEME.accentPink,fontSize:12,fontWeight:600,cursor:"pointer",flexShrink:0}}>Supprimer</button>
        </div>
      )}

      {/* Barre */}
      <div style={{height:6,background:THEME.xpTrack,borderRadius:99,overflow:"hidden",marginBottom:12}}>
        <div style={{height:"100%",width:pct+"%",background:barColor,borderRadius:99,transition:"width 0.3s"}}/>
      </div>

      {/* Grille des jours */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:8}}>
        {Array.from({length:30},function(_,i) { return i+1; }).map(function(day) {
          var on = c.checked.includes(day);
          var label = (c.dayLabels||{})[day]||"";
          var dayRewards = (c.dayRewards||{})[day]||[];
          var hasCustomXp = dayRewards.length > 0;
          var isExpanded = expandedDay===day;

          return (
            <div key={day} style={{borderRadius:12,border:on?"1px solid "+THEME.accent+"66":"1px solid "+THEME.border,background:on?THEME.accent+"18":THEME.surfaceLight,padding:"10px 6px",display:"flex",flexDirection:"column",alignItems:"center",gap:4,minHeight:80}}>
              {/* Numéro + coche */}
              <button onClick={function() {
                var wasOn = c.checked.includes(day);
                onToggleDay(c.id,day);
                if (!wasOn && onDayXp) onDayXp(c.id, day);
                if (wasOn && onDayXpRemove) onDayXpRemove(c.id, day);
              }} style={{width:28,height:28,borderRadius:"50%",border:"2px solid "+(on?THEME.accent:THEME.border),background:on?THEME.accent:"transparent",cursor:"pointer",fontSize:12,fontWeight:700,color:on?"#fff":THEME.textSub,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                {on?"✓":day}
              </button>

              {/* Label */}
              {editingDay===day ? (
                <input autoFocus value={editVal} onChange={function(e){setEditVal(e.target.value);}} onBlur={saveEdit} onKeyDown={function(e){if(e.key==="Enter")saveEdit();if(e.key==="Escape")setEditingDay(null);}} style={{width:"100%",fontSize:9,textAlign:"center",border:"1px solid "+THEME.border,borderRadius:4,padding:"2px 4px",background:THEME.inputBg,color:THEME.text,boxSizing:"border-box"}}/>
              ) : (
                <div onClick={function(){startEdit(day);}} style={{fontSize:9,color:on?THEME.accent:THEME.textMuted,textAlign:"center",cursor:"pointer",lineHeight:1.3,width:"100%",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",padding:"0 2px",flex:1,display:"flex",alignItems:"center",justifyContent:"center"}}>
                  {label||<span style={{opacity:0.4}}>···</span>}
                </div>
              )}

              {/* Bouton XP perso */}
              <button onClick={function(){setExpandedDay(isExpanded?null:day);}} style={{border:"none",background:"none",cursor:"pointer",fontSize:9,color:hasCustomXp?THEME.accent:THEME.textMuted,padding:"0",fontWeight:hasCustomXp?700:400,lineHeight:1}}>
                {hasCustomXp?"★ xp":"+ xp"}
              </button>
            </div>
          );
        })}
      </div>

      {/* Panel XP du jour sélectionné */}
      {expandedDay !== null && (
        <div style={{marginTop:10,padding:"10px 12px",borderRadius:12,background:THEME.filterActive,border:"1px solid "+THEME.accent+"33"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <div style={{fontSize:12,fontWeight:600,color:THEME.accent}}>⭐ XP spécifique — Jour {expandedDay}</div>
            <button onClick={function(){setExpandedDay(null);}} style={{border:"none",background:"none",cursor:"pointer",fontSize:13,color:THEME.textMuted}}>✕</button>
          </div>
          <div style={{fontSize:11,color:THEME.textMuted,marginBottom:8}}>S'ajoute au gain global quand ce jour est coché.</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:8}}>
            {(skills||[]).map(function(sk) {
              var dayRewards = (c.dayRewards||{})[expandedDay]||[];
              var active = !!dayRewards.find(function(r) { return r.skillId===sk.id; });
              return (
                <button key={sk.id} onClick={function(){toggleDaySkill(expandedDay,sk.id);}} style={{padding:"3px 9px",borderRadius:20,fontSize:10,cursor:"pointer",border:active?"1px solid "+sk.color:THEME.border,background:active?sk.color+"18":THEME.surfaceLight,color:active?sk.color:THEME.textMuted,fontWeight:active?600:400}}>
                  {active?"✓ ":""}{sk.name}
                </button>
              );
            })}
          </div>
          {((c.dayRewards||{})[expandedDay]||[]).length > 0 && (
            <div style={{display:"flex",flexDirection:"column",gap:5}}>
              {((c.dayRewards||{})[expandedDay]||[]).map(function(r) {
                var sk = (skills||[]).find(function(s){return s.id===r.skillId;});
                if (!sk) return null;
                return (
                  <div key={r.skillId} style={{display:"flex",alignItems:"center",gap:8}}>
                    <span style={{fontSize:11,color:sk.color,flex:1,fontWeight:500}}>{sk.name}</span>
                    <input type="number" min={1} max={100} value={r.xp} onChange={function(e){setDaySkillXp(expandedDay,r.skillId,Number(e.target.value));}} style={{width:48,padding:"3px 6px",borderRadius:8,fontSize:11,border:"1px solid "+THEME.border,background:THEME.inputBg,color:THEME.text,textAlign:"center"}}/>
                    <span style={{fontSize:10,color:THEME.textMuted}}>XP</span>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      )}

      {pct===100 && <div style={{marginTop:10,textAlign:"center",fontSize:13,color:THEME.accentGreen,fontWeight:500}}>🎉 Challenge terminé !</div>}
    </div>
  );
}

// --- CHALLENGES PAGE ---
function ChallengesPage(props) {
  const challenges = props.challenges;
  const onChange = props.onChange;
  const skills = props.skills;
  const onXpGain = props.onXpGain;
  const onXpRemove = props.onXpRemove;
  const formations = props.formations || [];
  const onFormationsChange = props.onFormationsChange;
  const onFormationUpdate = props.onFormationUpdate;
  const onFormationDelete = props.onFormationDelete;
  const onFormationComplete = props.onFormationComplete;
  const dtiys = challenges.dtiys;
  const thirty = challenges.thirty;
  const [tab, setTab] = useState("dtiys");
  const [showAddDtiys, setShowAddDtiys] = useState(false);
  const [newDtiysName, setNewDtiysName] = useState("");
  const [newDtiysLink, setNewDtiysLink] = useState("");
  const [newDtiysRewards, setNewDtiysRewards] = useState([]);
  const [showAddThirty, setShowAddThirty] = useState(false);
  const [newThirtyName, setNewThirtyName] = useState("");
  const [newThirtyLabels, setNewThirtyLabels] = useState(Array(30).fill(""));
  const [newThirtyRewards, setNewThirtyRewards] = useState([]);
  const [showAddFormation, setShowAddFormation] = useState(false);
  const [newFormName, setNewFormName] = useState("");
  const [newFormLink, setNewFormLink] = useState("");
  const [newFormStart, setNewFormStart] = useState(new Date().toISOString().slice(0,10));
  const [newFormEnd, setNewFormEnd] = useState("");
  const [newFormRewards, setNewFormRewards] = useState([]);

  function toggleFormSkill(skillId) {
    setNewFormRewards(function(prev) {
      var has = prev.find(function(r) { return r.skillId===skillId; });
      return has ? prev.filter(function(r) { return r.skillId!==skillId; }) : [...prev, {skillId:skillId, xp:30}];
    });
  }
  function setFormXp(skillId, xp) {
    setNewFormRewards(function(prev) {
      return prev.map(function(r) { return r.skillId===skillId ? {...r,xp:xp} : r; });
    });
  }
  function resetFormForm() { setNewFormName(""); setNewFormLink(""); setNewFormStart(new Date().toISOString().slice(0,10)); setNewFormEnd(""); setNewFormRewards([]); }
  function addFormation() {
    if (!newFormName.trim()) return;
    var entry = {id:Date.now(),name:newFormName.trim(),link:newFormLink.trim(),startDate:newFormStart,endDate:newFormEnd,sections:[],note:"",rewards:newFormRewards,completed:false,completedDate:null};
    onFormationsChange(function(prev) { return [...prev, entry]; });
    resetFormForm(); setShowAddFormation(false);
  }

  function toggleThirtySkill(skillId) {
    setNewThirtyRewards(function(prev) {
      var has = prev.find(function(r) { return r.skillId===skillId; });
      return has ? prev.filter(function(r) { return r.skillId!==skillId; }) : [...prev, {skillId:skillId, xp:5}];
    });
  }
  function setThirtyXp(skillId, xp) {
    setNewThirtyRewards(function(prev) {
      return prev.map(function(r) { return r.skillId===skillId ? {...r,xp:xp} : r; });
    });
  }
  var inp = {padding:"7px 10px",borderRadius:10,fontSize:13,border:"1px solid "+THEME.borderLight,background:THEME.inputBg,color:THEME.text};
  var block = {background:THEME.surface,backdropFilter:"blur(12px)",border:"0.5px solid "+THEME.border,borderRadius:18,padding:"1.1rem 1.2rem"};

  function toggleRewardSkill(skillId) {
    setNewDtiysRewards(function(prev) {
      var has = prev.find(function(r) { return r.skillId===skillId; });
      return has ? prev.filter(function(r) { return r.skillId!==skillId; }) : [...prev, {skillId:skillId, xp:20}];
    });
  }
  function setRewardXp(skillId, xp) {
    setNewDtiysRewards(function(prev) {
      return prev.map(function(r) { return r.skillId===skillId ? {...r,xp:xp} : r; });
    });
  }

  function addDtiys() {
    if (!newDtiysName.trim()) return;
    var entry = {id:Date.now(),name:newDtiysName.trim(),link:newDtiysLink.trim(),note:"",done:false,date:new Date().toLocaleDateString("fr-FR"),rewards:newDtiysRewards};
    onChange({dtiys:[...dtiys,entry],thirty:thirty});
    setNewDtiysName(""); setNewDtiysLink(""); setNewDtiysRewards([]); setShowAddDtiys(false);
  }
  function updateDtiys(id, patch) { onChange({dtiys:dtiys.map(function(d) { return d.id===id?{...d,...patch}:d; }),thirty:thirty}); }
  function deleteDtiys(id) { onChange({dtiys:dtiys.filter(function(d) { return d.id!==id; }),thirty:thirty}); }
  function completeDtiys(d) {
    if (!d.rewards || d.rewards.length===0 || !onXpGain) return;
    onXpGain(d.rewards, "🎨 DTIYS — "+d.name);
  }
  function uncompleteDtiys(d) {
    if (!d.rewards || d.rewards.length===0 || !onXpRemove) return;
    onXpRemove(d.rewards);
  }

  function addThirty() {
    if (!newThirtyName.trim()) return;
    var dayLabels = {};
    newThirtyLabels.forEach(function(l, i) { if (l.trim()) dayLabels[i+1] = l.trim(); });
    var entry = {id:Date.now(),name:newThirtyName.trim(),checked:[],dayLabels:dayLabels,date:new Date().toLocaleDateString("fr-FR"),rewards:newThirtyRewards};
    onChange({dtiys:dtiys,thirty:[...thirty,entry]});
    setNewThirtyName(""); setNewThirtyLabels(Array(30).fill("")); setNewThirtyRewards([]); setShowAddThirty(false);
  }
  function handleDayXpRemove(cid, day) {
    var c = thirty.find(function(x) { return x.id===cid; });
    if (!c || !onXpRemove) return;
    var allRewards = [];
    if (c.rewards && c.rewards.length>0) allRewards = allRewards.concat(c.rewards);
    var dayR = (c.dayRewards||{})[day]||[];
    if (dayR.length>0) allRewards = allRewards.concat(dayR);
    if (allRewards.length>0) onXpRemove(allRewards);
  }
  function handleDayXp(cid, day) {
    var c = thirty.find(function(x) { return x.id===cid; });
    if (!c || !onXpGain) return;
    var allRewards = [];
    // Gain global
    if (c.rewards && c.rewards.length>0) allRewards = allRewards.concat(c.rewards);
    // Gain spécifique au jour
    var dayR = (c.dayRewards||{})[day]||[];
    if (dayR.length>0) allRewards = allRewards.concat(dayR);
    if (allRewards.length>0) onXpGain(allRewards, "📅 "+c.name+" — Jour "+day);
  }

  function updateDayRewards(cid, day, rewards) {
    onChange({dtiys:dtiys, thirty:thirty.map(function(c) {
      if (c.id!==cid) return c;
      var dr = {...(c.dayRewards||{}), [day]:rewards};
      return {...c, dayRewards:dr};
    })});
  }
  function toggleDay(cid, day) {
    onChange({dtiys:dtiys,thirty:thirty.map(function(c) {
      if (c.id!==cid) return c;
      var checked = c.checked.includes(day) ? c.checked.filter(function(d) { return d!==day; }) : [...c.checked,day];
      return {...c,checked:checked};
    })});
  }
  function deleteThirty(id) { onChange({dtiys:dtiys,thirty:thirty.filter(function(c) { return c.id!==id; })}); }
  function updateDay(cid, day, label) {
    onChange({dtiys:dtiys,thirty:thirty.map(function(c) {
      if (c.id!==cid) return c;
      var dl = {...(c.dayLabels||{}),[day]:label};
      return {...c,dayLabels:dl};
    })});
  }

  return (
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
        {[{id:"dtiys",label:"🎨 DTIYS ("+dtiys.length+")"},{id:"thirty",label:"📅 30 Days ("+thirty.length+")"},{id:"formation",label:"📖 Formations ("+(formations||[]).length+")"}].map(function(t) {
          var isActive = tab===t.id;
          return (
            <button key={t.id} onClick={function() { setTab(t.id); }} style={{padding:"6px 14px",borderRadius:20,fontSize:12,cursor:"pointer",border:isActive?"1px solid "+THEME.accent+"66":THEME.border,background:isActive?THEME.filterActive:THEME.surfaceLight,color:isActive?THEME.accent:THEME.textSub,fontWeight:isActive?600:400}}>
              {t.label}
            </button>
          );
        })}
      </div>

      {tab==="dtiys" && (
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          <div style={{fontSize:11,color:THEME.textMuted}}>{dtiys.filter(function(d) { return d.done; }).length}/{dtiys.length} terminés</div>
          {dtiys.map(function(d) { return <DtiysCard key={d.id} d={d} skills={skills} onUpdate={updateDtiys} onDelete={deleteDtiys} onComplete={completeDtiys} onUncomplete={uncompleteDtiys}/>; })}
          {!showAddDtiys ? (
            <button onClick={function() { setShowAddDtiys(true); }} style={{width:"100%",padding:"10px",borderRadius:14,cursor:"pointer",border:"1px dashed "+THEME.borderLight,background:"transparent",color:THEME.textMuted,fontSize:13}}>+ DTIYS</button>
          ) : (
            <div style={{...block,display:"flex",flexDirection:"column",gap:8}}>
              <input value={newDtiysName} onChange={function(e) { setNewDtiysName(e.target.value); }} placeholder="Nom artiste..." style={{...inp,width:"100%",boxSizing:"border-box"}}/>
              <input value={newDtiysLink} onChange={function(e) { setNewDtiysLink(e.target.value); }} placeholder="Lien (optionnel)..." style={{...inp,width:"100%",boxSizing:"border-box"}}/>
              {/* Compétences & XP */}
              <div>
                <div style={{fontSize:11,color:THEME.textMuted,marginBottom:5}}>Compétences gagnées à la complétion</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:8}}>
                  {(skills||[]).map(function(sk) {
                    var active = !!newDtiysRewards.find(function(r) { return r.skillId===sk.id; });
                    return (
                      <button key={sk.id} onClick={function() { toggleRewardSkill(sk.id); }} style={{padding:"3px 10px",borderRadius:20,fontSize:11,cursor:"pointer",border:active?"1px solid "+sk.color:THEME.border,background:active?sk.color+"18":THEME.surfaceLight,color:active?sk.color:THEME.textMuted,fontWeight:active?600:400}}>
                        {active?"✓ ":""}{sk.name}
                      </button>
                    );
                  })}
                </div>
                {newDtiysRewards.length > 0 && (
                  <div style={{display:"flex",flexDirection:"column",gap:5,padding:"8px 10px",borderRadius:10,background:THEME.accent+"08",border:"1px solid "+THEME.accent+"22"}}>
                    {newDtiysRewards.map(function(r) {
                      var sk = (skills||[]).find(function(s) { return s.id===r.skillId; });
                      if (!sk) return null;
                      return (
                        <div key={r.skillId} style={{display:"flex",alignItems:"center",gap:8}}>
                          <span style={{fontSize:11,color:sk.color,flex:1,fontWeight:500}}>{sk.name}</span>
                          <input type="number" min={1} max={100} value={r.xp} onChange={function(e) { setRewardXp(r.skillId, Number(e.target.value)); }} style={{width:55,padding:"4px 8px",borderRadius:8,fontSize:12,border:"1px solid "+THEME.border,background:THEME.inputBg,color:THEME.text,textAlign:"center"}}/>
                          <span style={{fontSize:11,color:THEME.textMuted}}>XP</span>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
              <div style={{display:"flex",gap:8}}>
                <button onClick={addDtiys} style={{flex:1,padding:"8px",borderRadius:10,cursor:"pointer",border:"1px solid "+THEME.accent+"44",background:THEME.accent,color:"#fff",fontSize:13,fontWeight:600}}>Ajouter</button>
                <button onClick={function() { setShowAddDtiys(false); setNewDtiysRewards([]); }} style={{padding:"8px 14px",borderRadius:10,cursor:"pointer",border:"1px solid "+THEME.border,background:"transparent",color:THEME.textMuted,fontSize:13}}>Annuler</button>
              </div>
            </div>
          )}
        </div>
      )}

      {tab==="thirty" && (
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          {thirty.map(function(c) { return <ThirtyCard key={c.id} c={c} skills={skills} onToggleDay={toggleDay} onDelete={deleteThirty} onUpdateDay={updateDay} onDayXp={handleDayXp} onDayXpRemove={handleDayXpRemove} onUpdateDayRewards={updateDayRewards}/>; })}
          {!showAddThirty ? (
            <button onClick={function() { setShowAddThirty(true); }} style={{width:"100%",padding:"10px",borderRadius:14,cursor:"pointer",border:"1px dashed "+THEME.borderLight,background:"transparent",color:THEME.textMuted,fontSize:13}}>+ 30 Days Challenge</button>
          ) : (
            <div style={{...block,display:"flex",flexDirection:"column",gap:8}}>
              <input value={newThirtyName} onChange={function(e) { setNewThirtyName(e.target.value); }} placeholder="Nom du challenge..." style={{...inp,width:"100%",boxSizing:"border-box"}}/>
              {/* Compétences XP par jour */}
              <div>
                <div style={{fontSize:11,color:THEME.textMuted,marginBottom:5}}>XP gagné par jour coché</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:newThirtyRewards.length>0?8:0}}>
                  {(skills||[]).map(function(sk) {
                    var active = !!newThirtyRewards.find(function(r) { return r.skillId===sk.id; });
                    return (
                      <button key={sk.id} onClick={function() { toggleThirtySkill(sk.id); }} style={{padding:"3px 10px",borderRadius:20,fontSize:11,cursor:"pointer",border:active?"1px solid "+sk.color:THEME.border,background:active?sk.color+"18":THEME.surfaceLight,color:active?sk.color:THEME.textMuted,fontWeight:active?600:400}}>
                        {active?"✓ ":""}{sk.name}
                      </button>
                    );
                  })}
                </div>
                {newThirtyRewards.length > 0 && (
                  <div style={{display:"flex",flexDirection:"column",gap:5,padding:"8px 10px",borderRadius:10,background:THEME.accent+"08",border:"1px solid "+THEME.accent+"22",marginBottom:4}}>
                    {newThirtyRewards.map(function(r) {
                      var sk = (skills||[]).find(function(s) { return s.id===r.skillId; });
                      if (!sk) return null;
                      return (
                        <div key={r.skillId} style={{display:"flex",alignItems:"center",gap:8}}>
                          <span style={{fontSize:11,color:sk.color,flex:1,fontWeight:500}}>{sk.name}</span>
                          <input type="number" min={1} max={50} value={r.xp} onChange={function(e) { setThirtyXp(r.skillId, Number(e.target.value)); }} style={{width:50,padding:"4px 8px",borderRadius:8,fontSize:12,border:"1px solid "+THEME.border,textAlign:"center",background:THEME.inputBg,color:THEME.text}}/>
                          <span style={{fontSize:11,color:THEME.textMuted}}>XP/jour</span>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
              <div style={{fontSize:11,color:THEME.textMuted,marginBottom:2}}>Thèmes des 30 jours (optionnel) :</div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:5}}>
                {Array.from({length:30},function(_,i) { return i+1; }).map(function(day) {
                  return (
                    <div key={day} style={{display:"flex",flexDirection:"column",gap:2}}>
                      <div style={{fontSize:9,color:THEME.textMuted,textAlign:"center"}}>Jour {day}</div>
                      <input value={newThirtyLabels[day-1]} onChange={function(e) { var next=[...newThirtyLabels]; next[day-1]=e.target.value; setNewThirtyLabels(next); }} placeholder="thème..." style={{padding:"4px 5px",borderRadius:6,fontSize:10,border:"1px solid "+THEME.border,background:THEME.inputBg,color:THEME.text,textAlign:"center",width:"100%",boxSizing:"border-box"}}/>
                    </div>
                  );
                })}
              </div>
              <div style={{display:"flex",gap:8,marginTop:4}}>
                <button onClick={addThirty} style={{flex:1,padding:"8px",borderRadius:10,cursor:"pointer",border:"1px solid #7F77DD44",background:"#7F77DD12",color:"#7F77DD",fontSize:13,fontWeight:500}}>Créer</button>
                <button onClick={function() { setShowAddThirty(false); setNewThirtyLabels(Array(30).fill("")); }} style={{padding:"8px 14px",borderRadius:10,cursor:"pointer",border:"1px solid rgba(255,255,255,0.10)",background:"transparent",color:THEME.textMuted,fontSize:13}}>Annuler</button>
              </div>
            </div>
          )}
        </div>
      )}
      {tab==="formation" && (
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          <div style={{fontSize:11,color:THEME.textMuted}}>{(formations||[]).filter(function(f){return f.completed;}).length}/{(formations||[]).length} terminées</div>
          {(formations||[]).map(function(f) {

                <button onClick={function(){setShowAddFormation(false);resetFormForm();}} style={{padding:"8px 14px",borderRadius:10,cursor:"pointer",border:"1px solid "+THEME.border,background:"transparent",color:THEME.textMuted,fontSize:13}}>Annuler</button>

  );
}

// --- FORMATION CARD ---
function FormationCard(props) {
  const f = props.f;
  const skills = props.skills;
  const onUpdate = props.onUpdate;
  const onDelete = props.onDelete;
  const onComplete = props.onComplete;

  const [showAddSection, setShowAddSection] = useState(false);
  const [newSection, setNewSection] = useState("");
  const [expanded, setExpanded] = useState(true);
  const [confirmDeleteForm, setConfirmDeleteForm] = useState(false);

  var done = (f.sections||[]).filter(function(s){return s.done;}).length;
  var total = (f.sections||[]).length;
  var pct = total > 0 ? Math.round(done/total*100) : 0;
  var statusColor = f.completed ? THEME.accentGreen : pct > 0 ? THEME.accentGold : THEME.accent;

  function toggleSection(id) {
    onUpdate({sections:(f.sections||[]).map(function(s){return s.id===id?{...s,done:!s.done}:s;})});
  }
  function addSection() {
    if (!newSection.trim()) return;
    onUpdate({sections:[...(f.sections||[]),{id:Date.now(),label:newSection.trim(),done:false,note:""}]});
    setNewSection(""); setShowAddSection(false);
  }
  function updateSectionNote(id, note) {
    onUpdate({sections:(f.sections||[]).map(function(s){return s.id===id?{...s,note:note}:s;})});
  }
  function deleteSection(id) {
    onUpdate({sections:(f.sections||[]).filter(function(s){return s.id!==id;})});
  }

  // Formater date YYYY-MM-DD → DD/MM/YYYY
  function fmtDate(d) {
    if (!d) return "";
    if (d.includes("/")) return d;
    var p = d.split("-"); return p[2]+"/"+p[1]+"/"+p[0];
  }

  return (
    <div style={{background:THEME.surface,backdropFilter:"blur(12px)",border:"0.5px solid "+(f.completed?THEME.accentGreen+"44":THEME.border),borderRadius:18,padding:"1rem 1.1rem",opacity:f.completed?0.75:1}}>
      {/* Header */}
      <div style={{display:"flex",alignItems:"flex-start",gap:10,marginBottom:8}}>
        <button onClick={function(){setExpanded(function(v){return !v;});}} style={{fontSize:12,border:"none",background:"none",cursor:"pointer",color:THEME.textMuted,flexShrink:0,marginTop:2}}>{expanded?"▼":"▶"}</button>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
            <div style={{fontSize:14,fontWeight:600,color:f.completed?THEME.textMuted:THEME.text,textDecoration:f.completed?"line-through":"none"}}>{f.name}</div>
            <span style={{fontSize:10,color:statusColor,background:statusColor+"15",borderRadius:20,padding:"1px 8px",fontWeight:500}}>{f.completed?"✓ Terminée":pct+"%"}</span>
          </div>
          {f.link && <a href={f.link} target="_blank" rel="noreferrer" style={{fontSize:11,color:THEME.accent,textDecoration:"none",display:"block",marginTop:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{f.link}</a>}
          <div style={{display:"flex",gap:8,marginTop:4,fontSize:10,color:THEME.textMuted}}>
            {f.startDate && <span>📅 Début : {fmtDate(f.startDate)}</span>}
            {f.endDate && <span>🎯 Fin prévue : {fmtDate(f.endDate)}</span>}
            {f.completedDate && <span>✓ Terminée le : {fmtDate(f.completedDate)}</span>}
          </div>
          {total > 0 && (
            <div style={{marginTop:6}}>
              <div style={{height:5,background:THEME.xpTrack,borderRadius:99,overflow:"hidden"}}>
                <div style={{height:"100%",width:pct+"%",background:statusColor,borderRadius:99,transition:"width 0.3s"}}/>
              </div>
              <div style={{fontSize:10,color:THEME.textMuted,marginTop:2}}>{done}/{total} sections</div>
            </div>
          )}
          {/* XP rewards */}
          {(f.rewards||[]).length>0 && (
            <div style={{display:"flex",gap:4,flexWrap:"wrap",marginTop:5}}>
              {(f.rewards||[]).map(function(r,i) {
                var sk=(skills||[]).find(function(s){return s.id===r.skillId;});
                if (!sk) return null;
                return <span key={i} style={{fontSize:10,background:sk.color+"18",border:"1px solid "+sk.color+"44",borderRadius:20,padding:"2px 7px",color:sk.color,fontWeight:500}}>+{r.xp} {sk.name}</span>;
              })}
            </div>
          )}
        </div>
        {!confirmDeleteForm ? (
          <button onClick={function(){setConfirmDeleteForm(true);}} style={{border:"none",background:"none",cursor:"pointer",fontSize:15,color:THEME.textMuted,flexShrink:0}}>✕</button>
        ) : (
          <div style={{display:"flex",flexDirection:"column",gap:4,alignItems:"flex-end",flexShrink:0}}>
            <div style={{fontSize:10,color:THEME.accentPink,fontWeight:600,whiteSpace:"nowrap"}}>Supprimer ?</div>
            <div style={{display:"flex",gap:4}}>
              <button onClick={function(){onDelete();}} style={{fontSize:10,padding:"2px 8px",borderRadius:20,border:"1px solid "+THEME.accentPink+"88",background:THEME.accentPink+"18",color:THEME.accentPink,cursor:"pointer",fontWeight:600}}>Oui</button>
              <button onClick={function(){setConfirmDeleteForm(false);}} style={{fontSize:10,padding:"2px 8px",borderRadius:20,border:"1px solid "+THEME.border,background:"transparent",color:THEME.textMuted,cursor:"pointer"}}>Non</button>
            </div>
          </div>
        )}
      </div>

      {expanded && (
        <div style={{paddingLeft:22}}>
          {/* Sections */}
          {(f.sections||[]).map(function(s) {
            return (
              <div key={s.id} style={{marginBottom:8,background:s.done?THEME.accentGreen+"08":THEME.surfaceLight,borderRadius:10,padding:"8px 10px",border:"0.5px solid "+(s.done?THEME.accentGreen+"33":THEME.border)}}>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <button onClick={function(){toggleSection(s.id);}} style={{width:18,height:18,borderRadius:"50%",border:"2px solid "+(s.done?THEME.accentGreen:THEME.border),background:s.done?THEME.accentGreen:"transparent",color:"#fff",fontSize:10,cursor:"pointer",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
                    {s.done?"✓":""}
                  </button>
                  <span style={{fontSize:13,color:s.done?THEME.textMuted:THEME.text,textDecoration:s.done?"line-through":"none",flex:1}}>{s.label}</span>
                  <button onClick={function(){deleteSection(s.id);}} style={{border:"none",background:"none",cursor:"pointer",fontSize:12,color:THEME.textMuted}}>✕</button>
                </div>
                <textarea value={s.note||""} onChange={function(e){updateSectionNote(s.id,e.target.value);}} placeholder="Notes sur cette section..." rows={1} style={{width:"100%",marginTop:5,padding:"5px 8px",borderRadius:8,border:"1px solid "+THEME.border,fontSize:11,color:THEME.textSub,resize:"vertical",fontFamily:"inherit",boxSizing:"border-box",background:THEME.inputBg}}/>
              </div>
            );
          })}

          {/* Ajouter section */}
          {!showAddSection ? (
            <button onClick={function(){setShowAddSection(true);}} style={{width:"100%",padding:"6px",borderRadius:10,cursor:"pointer",border:"1px dashed "+THEME.borderLight,background:"transparent",color:THEME.textMuted,fontSize:12,marginBottom:8}}>+ Ajouter une section</button>
          ) : (
            <div style={{display:"flex",gap:6,marginBottom:8}}>
              <input value={newSection} onChange={function(e){setNewSection(e.target.value);}} onKeyDown={function(e){if(e.key==="Enter")addSection();}} placeholder="Nom de la section..." style={{flex:1,padding:"6px 10px",borderRadius:8,border:"1px solid "+THEME.border,background:THEME.inputBg,color:THEME.text,fontSize:12}}/>
              <button onClick={addSection} style={{padding:"6px 10px",borderRadius:8,border:"1px solid "+THEME.accent+"44",background:THEME.accent,color:"#fff",fontSize:12,cursor:"pointer",fontWeight:600}}>✓</button>
              <button onClick={function(){setShowAddSection(false);setNewSection("");}} style={{padding:"6px 10px",borderRadius:8,border:"1px solid "+THEME.border,background:"transparent",color:THEME.textMuted,fontSize:12,cursor:"pointer"}}>✕</button>
            </div>
          )}

          {/* Note générale */}
          <textarea value={f.note||""} onChange={function(e){onUpdate({note:e.target.value});}} placeholder="Notes générales sur cette formation..." rows={2} style={{width:"100%",padding:"7px 10px",borderRadius:10,border:"1px solid "+THEME.border,fontSize:12,color:THEME.textSub,resize:"vertical",fontFamily:"inherit",boxSizing:"border-box",background:THEME.inputBg,marginBottom:8}}/>

          {/* Bouton terminer */}
          {!f.completed && (
            <button onClick={function(){onComplete(f.id);}} style={{width:"100%",padding:"8px",borderRadius:10,cursor:"pointer",border:"1px solid "+THEME.accentGreen+"44",background:THEME.accentGreen+"12",color:THEME.accentGreen,fontSize:13,fontWeight:600}}>
              🎓 Marquer comme terminée
            </button>
          )}
        </div>
      )}
    </div>
  );
}
function TimerBlock(props) {
  const timerData = props.timerData;
  const onSave = props.onSave;

  const [running, setRunning] = useState(false);
  const [elapsed, setElapsed] = useState(0);
  const [startedAt, setStartedAt] = useState(null);
  const [showAddManual, setShowAddManual] = useState(false);
  const [manualH, setManualH] = useState(0);
  const [manualM, setManualM] = useState(0);
  const [missedTime, setMissedTime] = useState(null); // temps perdu si fermeture
  const intervalRef = useRef(null);

  var totalSeconds = timerData.totalSeconds || 0;
  var totalHours = Math.floor(totalSeconds / 3600);
  var totalMins = Math.floor((totalSeconds % 3600) / 60);

  // Détection fermeture app — sauvegarde le timestamp
  useEffect(function() {
    if (running) {
      localStorage.setItem('timer_running_since', String(startedAt));
    } else {
      localStorage.removeItem('timer_running_since');
    }
  }, [running, startedAt]);

  // Au chargement — vérifie si le timer tournait
  useEffect(function() {
    var savedStart = localStorage.getItem('timer_running_since');
    if (savedStart) {
      var missed = Math.floor((Date.now() - Number(savedStart)) / 1000);
      if (missed > 30) { // au moins 30s
        setMissedTime(missed);
      }
      localStorage.removeItem('timer_running_since');
    }
  }, []);

  function fmt(secs) {
    var h = Math.floor(secs/3600);
    var m = Math.floor((secs%3600)/60);
    var s = secs%60;
    if (h > 0) return h+"h "+String(m).padStart(2,"0")+"m "+String(s).padStart(2,"0")+"s";
    return String(m).padStart(2,"0")+"m "+String(s).padStart(2,"0")+"s";
  }

  function fmtShort(secs) {
    var h = Math.floor(secs/3600);
    var m = Math.floor((secs%3600)/60);
    if (h > 0) return h+"h "+String(m).padStart(2,"0")+"m";
    return m+"m";
  }

  function start() { setStartedAt(Date.now()); setRunning(true); }
  function pause() { setRunning(false); clearInterval(intervalRef.current); }

  function stop() {
    setRunning(false);
    clearInterval(intervalRef.current);
    if (elapsed === 0) return;
    saveSession(elapsed);
    setElapsed(0);
    setStartedAt(null);
  }

  function saveSession(secs) {
    var session = {id:Date.now(),seconds:secs,date:new Date().toLocaleString("fr-FR",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"})};
    onSave({totalSeconds:totalSeconds+secs,sessions:[session,...(timerData.sessions||[])].slice(0,50)});
  }

  function addManual() {
    var secs = (manualH*3600)+(manualM*60);
    if (secs <= 0) return;
    saveSession(secs);
    setManualH(0); setManualM(0); setShowAddManual(false);
  }

  function recoverMissed() {
    if (!missedTime) return;
    saveSession(missedTime);
    setMissedTime(null);
  }

  useEffect(function() {
    if (running) {
      intervalRef.current = setInterval(function() { setElapsed(Math.floor((Date.now()-startedAt)/1000)); }, 1000);
    } else {
      clearInterval(intervalRef.current);
    }
    return function() { clearInterval(intervalRef.current); };
  }, [running, startedAt]);

  var milestones = [10,50,100,300,800,1000];
  var prevM = 0;
  var nextM = milestones.find(function(m) { if (totalHours >= m) { prevM = m; return false; } return true; }) || milestones[milestones.length-1];
  var progressPct = Math.min(((totalHours-prevM)/(nextM-prevM))*100, 100);

  var block = {background:THEME.surface,backdropFilter:"blur(12px)",border:"0.5px solid "+THEME.border,borderRadius:18,padding:"1.2rem"};

  // Couleur dynamique selon état
  var timerColor = running ? THEME.accentGreen : elapsed > 0 ? THEME.accentGold : THEME.accent;

  return (
    <div style={{display:"flex",flexDirection:"column",gap:10}}>

      {/* Alerte temps manqué */}
      {missedTime && (
        <div style={{...block,background:THEME.accentGold+"10",border:"1px solid "+THEME.accentGold+"44",display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:20}}>⏰</span>
          <div style={{flex:1}}>
            <div style={{fontSize:13,fontWeight:600,color:THEME.accentGold,marginBottom:2}}>Timer interrompu détecté</div>
            <div style={{fontSize:11,color:THEME.textSub}}>L'app a été fermée pendant que le timer tournait. Temps estimé : <strong>{fmtShort(missedTime)}</strong></div>
          </div>
          <div style={{display:"flex",gap:6}}>
            <button onClick={recoverMissed} style={{padding:"6px 12px",borderRadius:20,border:"1px solid "+THEME.accentGreen+"44",background:THEME.accentGreen+"12",color:THEME.accentGreen,fontSize:12,cursor:"pointer",fontWeight:600}}>✓ Ajouter</button>
            <button onClick={function(){setMissedTime(null);}} style={{padding:"6px 10px",borderRadius:20,border:"1px solid "+THEME.border,background:"transparent",color:THEME.textMuted,fontSize:12,cursor:"pointer"}}>✕</button>
          </div>
        </div>
      )}

      {/* Timer principal */}
      <div style={{...block,textAlign:"center"}}>

        {/* Total accumulé */}
        <div style={{marginBottom:16}}>
          <div style={{fontSize:11,fontWeight:600,color:THEME.textMuted,textTransform:"uppercase",letterSpacing:0.8,marginBottom:6}}>Total accumulé</div>
          <div style={{fontSize:38,fontWeight:700,color:THEME.accent,letterSpacing:-1,lineHeight:1}}>
            {totalHours}<span style={{fontSize:20,fontWeight:500,color:THEME.textSub}}>h </span>
            {String(totalMins).padStart(2,"0")}<span style={{fontSize:20,fontWeight:500,color:THEME.textSub}}>m</span>
          </div>
        </div>

        {/* Barre de progression vers prochain palier */}
        <div style={{marginBottom:18}}>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:THEME.textMuted,marginBottom:5}}>
            <span>{prevM}h</span>
            <span style={{color:THEME.accent,fontWeight:500}}>→ {nextM}h</span>
          </div>
          <div style={{height:8,background:THEME.xpTrack,borderRadius:99,overflow:"hidden",position:"relative"}}>
            <div style={{height:"100%",width:progressPct+"%",background:"linear-gradient(90deg,"+THEME.accent+","+THEME.accentPink+")",borderRadius:99,transition:"width 0.5s cubic-bezier(0.34,1.56,0.64,1)"}}/>
          </div>
          <div style={{fontSize:10,color:THEME.textMuted,marginTop:4,textAlign:"right"}}>{Math.round(progressPct)}% vers {nextM}h</div>
        </div>

        {/* Chrono actuel — grand affichage */}
        <div style={{background:THEME.surfaceLight,borderRadius:16,padding:"16px 24px",marginBottom:16,border:"1px solid "+(running?THEME.accentGreen+"44":THEME.border)}}>
          <div style={{fontSize:42,fontWeight:700,color:timerColor,letterSpacing:2,fontVariantNumeric:"tabular-nums",fontFamily:"monospace"}}>
            {String(Math.floor(elapsed/3600)).padStart(2,"0")}:{String(Math.floor((elapsed%3600)/60)).padStart(2,"0")}:{String(elapsed%60).padStart(2,"0")}
          </div>
          {running && <div style={{fontSize:11,color:THEME.accentGreen,marginTop:4,fontWeight:500}}>● En cours...</div>}
          {!running && elapsed>0 && <div style={{fontSize:11,color:THEME.accentGold,marginTop:4}}>En pause — {fmtShort(elapsed)}</div>}
          {!running && elapsed===0 && <div style={{fontSize:11,color:THEME.textMuted,marginTop:4}}>Prête à démarrer</div>}
        </div>

        {/* Boutons */}
        <div style={{display:"flex",gap:8,justifyContent:"center",marginBottom:12}}>
          {!running ? (
            <button onClick={start} style={{flex:1,maxWidth:140,padding:"10px",borderRadius:14,cursor:"pointer",fontSize:14,fontWeight:600,border:"1px solid "+THEME.accentGreen+"66",background:THEME.accentGreen+"15",color:THEME.accentGreen}}>
              {elapsed>0?"▶ Reprendre":"▶ Démarrer"}
            </button>
          ) : (
            <button onClick={pause} style={{flex:1,maxWidth:140,padding:"10px",borderRadius:14,cursor:"pointer",fontSize:14,fontWeight:600,border:"1px solid "+THEME.accentGold+"66",background:THEME.accentGold+"15",color:THEME.accentGold}}>⏸ Pause</button>
          )}
          {elapsed>0 && (
            <button onClick={stop} style={{flex:1,maxWidth:140,padding:"10px",borderRadius:14,cursor:"pointer",fontSize:14,fontWeight:600,border:"1px solid "+THEME.accent+"66",background:THEME.accent+"15",color:THEME.accent}}>💾 Sauvegarder</button>
          )}
        </div>

        {/* Ajouter manuellement */}
        {!showAddManual ? (
          <button onClick={function(){setShowAddManual(true);}} style={{fontSize:11,color:THEME.textMuted,background:"none",border:"none",cursor:"pointer",textDecoration:"underline",textUnderlineOffset:3}}>
            + Ajouter du temps manuellement
          </button>
        ) : (
          <div style={{background:THEME.surfaceLight,borderRadius:12,padding:"12px",border:"1px solid "+THEME.border,marginTop:4}}>
            <div style={{fontSize:11,color:THEME.textMuted,marginBottom:8}}>J'ai dessiné pendant...</div>
            <div style={{display:"flex",alignItems:"center",gap:8,justifyContent:"center",marginBottom:10}}>
              <div style={{display:"flex",alignItems:"center",gap:4}}>
                <input type="number" min={0} max={23} value={manualH} onChange={function(e){setManualH(Number(e.target.value));}} style={{width:52,padding:"6px 8px",borderRadius:8,border:"1px solid "+THEME.border,background:THEME.inputBg,color:THEME.text,fontSize:14,textAlign:"center",fontWeight:600}}/>
                <span style={{fontSize:12,color:THEME.textMuted}}>h</span>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:4}}>
                <input type="number" min={0} max={59} value={manualM} onChange={function(e){setManualM(Number(e.target.value));}} style={{width:52,padding:"6px 8px",borderRadius:8,border:"1px solid "+THEME.border,background:THEME.inputBg,color:THEME.text,fontSize:14,textAlign:"center",fontWeight:600}}/>
                <span style={{fontSize:12,color:THEME.textMuted}}>min</span>
              </div>
            </div>
            <div style={{display:"flex",gap:6}}>
              <button onClick={addManual} style={{flex:1,padding:"7px",borderRadius:10,cursor:"pointer",border:"1px solid "+THEME.accent+"44",background:THEME.accent,color:"#fff",fontSize:12,fontWeight:600}}>Ajouter</button>
              <button onClick={function(){setShowAddManual(false);setManualH(0);setManualM(0);}} style={{padding:"7px 12px",borderRadius:10,cursor:"pointer",border:"1px solid "+THEME.border,background:"transparent",color:THEME.textMuted,fontSize:12}}>Annuler</button>
            </div>
          </div>
        )}
      </div>

      {/* Sessions récentes */}
      {(timerData.sessions||[]).length > 0 && (
        <div style={block}>
          <div style={{fontSize:11,fontWeight:600,color:THEME.textMuted,textTransform:"uppercase",letterSpacing:0.6,marginBottom:10}}>Sessions récentes</div>
          <div style={{display:"flex",flexDirection:"column",gap:6,maxHeight:220,overflowY:"auto"}}>
            {(timerData.sessions||[]).map(function(s) {
              var isLong = s.seconds >= 3600;
              return (
                <div key={s.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:THEME.surfaceCard,borderRadius:10,padding:"8px 12px",border:"0.5px solid "+(isLong?THEME.accentGold+"33":THEME.border)}}>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <span style={{fontSize:16}}>{s.seconds>=3600?"🏆":s.seconds>=1800?"⭐":s.seconds>=600?"✓":"•"}</span>
                    <span style={{fontSize:14,fontWeight:600,color:isLong?THEME.accentGold:THEME.accent}}>{fmt(s.seconds)}</span>
                  </div>
                  <span style={{fontSize:11,color:THEME.textMuted}}>{s.date}</span>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

// --- STREAK ---
function calcStreak(history) {
  if (history.length === 0) return 0;
  var days = Array.from(new Set(history.map(function(e) { return e.date ? e.date.split(" ")[0] : null; }).filter(Boolean))).sort(function(a,b) { return b.localeCompare(a); });
  var today = new Date().toLocaleDateString("fr-FR",{day:"2-digit",month:"2-digit",year:"numeric"});
  if (days[0] !== today) return 0;
  var s = 1;
  for (var i = 1; i < days.length; i++) {
    var p1 = days[i-1].split("/").map(Number);
    var p2 = days[i].split("/").map(Number);
    var diff = (new Date(p1[2],p1[1]-1,p1[0]) - new Date(p2[2],p2[1]-1,p2[0])) / 86400000;
    if (diff === 1) s++;
    else break;
  }
  return s;
}
