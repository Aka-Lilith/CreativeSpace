function DiyTrackerApp(props) {
  const onHome = props.onHome;
  const [data, setData] = useState(null);
  const [themeMode, setThemeMode] = useState("light");
  var T = DIY_THEMES[themeMode];
  const [tab, setTab] = useState("projets");
  const [filterHobby, setFilterHobby] = useState(null);
  const [sortBy, setSortBy] = useState("status");
  const [filterTag, setFilterTag] = useState(null);
  const [searchDiy, setSearchDiy] = useState("");
  const [showAdd, setShowAdd] = useState(false);
  const [showAddHobby, setShowAddHobby] = useState(false);
  const [showReset, setShowReset] = useState(false);
  const [showSettings, setShowSettings] = useState(false);
  const [detailProject, setDetailProject] = useState(null);
  const [toast, setToast] = useState(null);
  const [pendingBadge, setPendingBadge] = useState(null);
  const toastTimer = useRef(null);
  const importRef = useRef(null);

  useEffect(function() {
    async function load() {
      var th = await storage.get(DIY_THEME_KEY);
      if (th) { setThemeMode(th); Object.assign(THEME_DIY, DIY_THEMES[th] || DIY_THEMES.light); }
      var d = await storage.get(DIY_KEY);
      if (d && d.projects) { setData(d); } else { setData(DIY_defaultData()); }
    }
    load();
  }, []);

  useEffect(function() { if (data) storage.set(DIY_KEY, data); }, [data]);

  // Vérification badges
  const prevBadgesRef = useRef({});
  useEffect(function() {
    if (!data) return;
    storage.get(DIY_BADGE_KEY).then(function(dates) {
      var earned = dates || {};
      var today = new Date().toLocaleDateString("fr-FR");
      var next = Object.assign({}, earned);
      var newBadges = [];
      DIY_BADGES.forEach(function(b) {
        if (!next[b.id] && b.check(data)) {
          next[b.id] = today;
          newBadges.push(b);
        }
      });
      if (newBadges.length > 0) {
        storage.set(DIY_BADGE_KEY, next);
        newBadges.forEach(function(b, i) {
          setTimeout(function() {
            showToast(b.emoji + " Badge débloqué : " + b.label + " !", true);
          }, i * 1500);
        });
      }
    });
  }, [data]);

  function showToast(msg, isBadge) {
    setToast({ msg, isBadge: !!isBadge });
    if (toastTimer.current) clearTimeout(toastTimer.current);
    toastTimer.current = setTimeout(function() { setToast(null); }, isBadge ? 4000 : 2800);
  }

  function toggleTheme() {
    var next = themeMode === "light" ? "dark" : "light";
    setThemeMode(next);
    Object.assign(THEME_DIY, DIY_THEMES[next]);
    storage.set(DIY_THEME_KEY, next);
    setData(function(d) { return Object.assign({}, d); });
  }

  function addProject(proj) {
    setData(function(d) {
      var newProj = Object.assign({ id: d.nextId, notes: [] }, proj);
      var gained = calcProjectXP(proj.status, proj.difficulty);
      return Object.assign({}, d, {
        projects: [newProj].concat(d.projects),
        nextId: d.nextId + 1,
        xpEarned: (d.xpEarned || 0) + gained,
      });
    });
    showToast("Projet ajouté ✦");
  }

  function updateProject(updated) {
    setData(function(d) {
      var old = d.projects.find(function(p) { return p.id === updated.id; });
      var gained = Math.max(0, (updated.xp || 0) - (old ? (old.xp || 0) : 0));
      return Object.assign({}, d, {
        projects: d.projects.map(function(p) { return p.id === updated.id ? updated : p; }),
        xpEarned: (d.xpEarned || 0) + gained,
      });
    });
    setDetailProject(updated);
  }

  function deleteProject(id) {
    setData(function(d) {
      return Object.assign({}, d, { projects: d.projects.filter(function(p) { return p.id !== id; }) });
    });
    showToast("Projet supprimé.");
  }

  function addHobby(hobby) {
    setData(function(d) { return Object.assign({}, d, { hobbies: d.hobbies.concat([hobby]) }); });
    showToast(hobby.emoji + " " + hobby.label + " ajouté !");
  }

  function doExport() {
    if (!data) return;
    var filename = "lilith-diy-" + new Date().toISOString().slice(0, 10) + ".json";
    exportJSON(data, filename, function() { showToast("📦 Sauvegarde exportée !"); });
  }

  function doImport(e) {
    var file = e.target.files && e.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(ev) {
      try {
        var d = JSON.parse(ev.target.result);
        if (d.projects) {
          setData(function(cur) {
            return Object.assign({}, cur, {
              projects: d.projects,
              hobbies: d.hobbies || cur.hobbies,
              xpEarned: d.xpEarned || 0,
              nextId: d.nextId || cur.nextId,
            });
          });
          showToast("✅ Données importées !");
        } else {
          showToast("❌ Fichier invalide");
        }
      } catch(err) { showToast("❌ Fichier invalide"); }
    };
    reader.readAsText(file);
    e.target.value = "";
  }

  function deleteHobby(id) {
    var usedInProjects = data.projects.some(function(p) { return p.hobby === id; });
    if (usedInProjects) { showToast("❌ Ce hobby est utilisé par des projets."); return; }
    setData(function(d) { return Object.assign({}, d, { hobbies: d.hobbies.filter(function(h) { return h.id !== id; }) }); });
    showToast("Hobby supprimé.");
  }

  function doReset() {
    setData(function(current) {
      var hobbies = current && current.hobbies && current.hobbies.length > 0
        ? current.hobbies
        : DEFAULT_HOBBIES.map(function(h) { return Object.assign({}, h); });
      return { projects: [], hobbies: hobbies, nextId: 1, xpEarned: 0 };
    });
    storage.set(DIY_BADGE_KEY, {});
    setShowReset(false);
    showToast("Réinitialisation effectuée.");
  }

  if (!data) {
    return (
      <div style={{minHeight:"100vh",background:T.bgGradient,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:18}}>
        <style>{`
          @keyframes diy-spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
          @keyframes diy-pulse{0%,100%{opacity:0.3;transform:scale(0.95)}50%{opacity:1;transform:scale(1.05)}}
          @keyframes diy-dot{0%,100%{transform:scale(1);opacity:0.3}50%{transform:scale(1.4);opacity:1}}
          @keyframes diy-toast{from{opacity:0;transform:translateX(-50%) translateY(14px) scale(0.93)}to{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}}
        `}</style>
        <div style={{position:"relative",width:64,height:64,display:"flex",alignItems:"center",justifyContent:"center"}}>
          <div style={{position:"absolute",inset:0,borderRadius:"50%",border:"2px solid "+T.accent+"20",borderTop:"2px solid "+T.accent,animation:"diy-spin 1.2s linear infinite"}}/>
          <div style={{fontSize:26,animation:"diy-pulse 2s ease-in-out infinite"}}>✦</div>
        </div>
        <div style={{textAlign:"center"}}>
          <div style={{fontSize:15,fontWeight:700,color:T.text,fontFamily:"'Playfair Display',serif",letterSpacing:0.5,marginBottom:6}}>DIY Studio</div>
          <div style={{display:"flex",gap:5,justifyContent:"center"}}>
            {[0,1,2].map(function(i){return <div key={i} style={{width:5,height:5,borderRadius:"50%",background:T.accent,animation:"diy-dot 1.2s ease-in-out infinite",animationDelay:i*0.2+"s"}}/>;  })}
          </div>
        </div>
      </div>
    );
  }

  var filteredProjects = data.projects.filter(function(p) {
    if (filterHobby && p.hobby !== filterHobby) return false;
    if (filterTag && !(p.tags || []).includes(filterTag)) return false;
    if (searchDiy.trim()) {
      var q = searchDiy.toLowerCase();
      var nameMatch = p.name.toLowerCase().includes(q);
      var descMatch = (p.description || "").toLowerCase().includes(q);
      var tagMatch = (p.tags || []).some(function(t) { return t.toLowerCase().includes(q); });
      var stepMatch = (p.steps || []).some(function(s) { return s.label.toLowerCase().includes(q); });
      if (!nameMatch && !descMatch && !tagMatch && !stepMatch) return false;
    }
    return true;
  });
  filteredProjects = filteredProjects.slice().sort(function(a, b) {
    if (sortBy === "status") { var so = { inprogress: 0, wishlist: 1, done: 2 }; return (so[a.status]||0) - (so[b.status]||0); }
    if (sortBy === "name") return a.name.localeCompare(b.name);
    if (sortBy === "hobby") return a.hobby.localeCompare(b.hobby);
    if (sortBy === "diff") { var sd = { Difficile: 0, Moyen: 1, Facile: 2, "": 3 }; return (sd[a.difficulty||""]||3) - (sd[b.difficulty||""]||3); }
    if (sortBy === "date") return (b.startDate||"").localeCompare(a.startDate||"");
    return 0;
  });

  var usedHobbyIds = Array.from(new Set(data.projects.map(function(p) { return p.hobby; })));
  var usedHobbies = usedHobbyIds.map(function(id) {
    return data.hobbies.find(function(h) { return h.id === id; }) || { id, emoji: "✦", label: id };
  });

  var xp = data.xpEarned || 0;
  var lv = levelFromXP(xp);
  var xpIn = xpInLevel(xp);

  return (
    <DIY_ThemeCtx.Provider value={T}>
    <div style={{ minHeight: "100vh", background: T.bgGradient, position: "relative", overflow: "hidden" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap');
        * { font-family: 'Inter', sans-serif; box-sizing: border-box; }
        @keyframes float  { 0%,100%{transform:translateY(0)}    50%{transform:translateY(-10px)} }
        @keyframes float2 { 0%,100%{transform:translateY(0) rotate(0deg)} 50%{transform:translateY(-7px) rotate(5deg)} }
        @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
        @keyframes twinkle{ 0%,100%{opacity:0.12} 50%{opacity:0.6} }
        @keyframes badgePop { 0%{transform:translateX(-50%) translateY(20px);opacity:0} 15%{transform:translateX(-50%) translateY(0);opacity:1} 85%{transform:translateX(-50%) translateY(0);opacity:1} 100%{transform:translateX(-50%) translateY(-10px);opacity:0} }
        .diy-tab-btn { transition: all 0.18s; cursor: pointer; }
        .diy-filter-pill { transition: all 0.15s; cursor: pointer; }
        input[type="date"] { color-scheme: ${themeMode}; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: ${T.scrollThumb}; border-radius: 4px; }
      `}</style>

      {/* Décos */}
      <div style={{ position: "absolute", top: "4%", right: "5%", animation: "float 6s ease-in-out infinite", opacity: T.decoOpacity, zIndex: 0 }}><DecoStar color={T.accent} size={28}/></div>
      <div style={{ position: "absolute", top: "12%", left: "3%", animation: "float2 7s ease-in-out infinite", opacity: T.decoOpacity * 0.7, zIndex: 0 }}><DecoMushroom color={T.accentViolet} size={30}/></div>
      <div style={{ position: "absolute", bottom: "15%", right: "4%", animation: "float 8s ease-in-out infinite", animationDelay: "1s", opacity: T.decoOpacity * 0.6, zIndex: 0 }}><DecoCrystal color={T.accent} size={18}/></div>
      <div style={{ position: "absolute", bottom: "25%", left: "4%", animation: "float2 5.5s ease-in-out infinite", animationDelay: "0.5s", opacity: T.decoOpacity * 0.5, zIndex: 0 }}><DecoStar color={T.accentViolet} size={18}/></div>
      {[[8,30],[88,55],[15,80],[80,22],[45,8],[92,70]].map(function(pos, i) {
        var colors = [T.accent, T.accentViolet, T.accentGreen, T.accentPink];
        return <div key={i} style={{ position: "absolute", left: pos[0] + "%", top: pos[1] + "%", width: 3, height: 3, borderRadius: "50%", background: colors[i % 4], opacity: 0.35, animation: "twinkle " + (2 + i * 0.4) + "s ease-in-out infinite", animationDelay: i * 0.3 + "s", zIndex: 0 }}/>;
      })}

      <div style={{ position: "relative", zIndex: 1, maxWidth: 480, margin: "0 auto", padding: "0 0 80px" }}>

        {/* Header */}
        <div style={{ padding: "16px 16px 0", display: "flex", alignItems: "center", justifyContent: "space-between", animation: "fadeUp 0.5s ease both" }}>
          <button onClick={onHome} style={{ background: T.surfaceLight, border: "1px solid " + T.border, borderRadius: 10, padding: "6px 12px", fontSize: 12, color: T.textMuted, cursor: "pointer", fontWeight: 500 }}>← Accueil</button>
          <div style={{ textAlign: "center" }}>
            <div style={{ fontSize: 17, fontWeight: 700, color: T.text, fontFamily: "'Playfair Display', serif" }}>DIY & Hobbies</div>
          </div>
          <div style={{ display: "flex", gap: 6 }}>
            <button onClick={toggleTheme} style={{ background: T.surfaceLight, border: "1px solid " + T.border, borderRadius: 10, padding: "5px 10px", fontSize: 13, cursor: "pointer", display:"flex", alignItems:"center", gap:5, color:T.textSub, transition:"all 0.2s" }}>
              <span style={{fontSize:16}}>{themeMode === "light" ? "🌙" : "☀️"}</span>
            </button>
            <button onClick={function() { setShowSettings(function(v) { return !v; }); }} style={{ background: showSettings ? T.filterActive : T.surfaceLight, border: "1px solid " + (showSettings ? T.accent + "55" : T.border), borderRadius: 10, padding: "6px 10px", fontSize: 14, cursor: "pointer" }}>⚙️</button>
          </div>
        </div>

        {/* Panneau paramètres */}
        {showSettings && (
          <div style={{ margin: "10px 16px 0", background: T.surfaceCard, border: "1px solid " + T.borderLight, borderRadius: 16, padding: 16, display: "flex", flexDirection: "column", gap: 12, animation: "fadeUp 0.3s ease both" }}>
            <div style={{ fontSize: 13, fontWeight: 600, color: T.textSub }}>Hobbies</div>
            <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
              {data.hobbies.map(function(h) {
                var usedCount = data.projects.filter(function(p) { return p.hobby === h.id; }).length;
                var isDefault = DEFAULT_HOBBIES.some(function(dh) { return dh.id === h.id; });
                return (
                  <div key={h.id} style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 12px", borderRadius: 10, background: T.surfaceLight, border: "1px solid " + T.border }}>
                    <span style={{ fontSize: 18, flexShrink: 0 }}>{h.emoji}</span>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontSize: 13, fontWeight: 500, color: T.text }}>{h.label}</div>
                      <div style={{ fontSize: 11, color: T.textMuted }}>
                        {usedCount > 0 ? usedCount + " projet" + (usedCount > 1 ? "s" : "") : "Aucun projet"}
                        {isDefault && <span style={{ marginLeft: 6, fontSize: 10, color: T.accentViolet }}>· défaut</span>}
                      </div>
                    </div>
                    <button onClick={function() { deleteHobby(h.id); }} style={{ background: usedCount > 0 ? T.surfaceLight : T.danger + "15", border: "1px solid " + (usedCount > 0 ? T.border : T.danger + "44"), borderRadius: 8, width: 28, height: 28, cursor: usedCount > 0 ? "not-allowed" : "pointer", color: usedCount > 0 ? T.textMuted : T.danger, fontSize: 13, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }} title={usedCount > 0 ? "Retire d'abord les projets liés" : "Supprimer"}>✕</button>
                  </div>
                );
              })}
              <button onClick={function() { setShowSettings(false); setShowAddHobby(true); }} style={{ padding: "8px 12px", borderRadius: 10, fontSize: 12, cursor: "pointer", border: "1px dashed " + T.accentViolet + "55", background: "none", color: T.accentViolet, fontWeight: 500 }}>+ Ajouter un hobby</button>
            </div>
            <div style={{ borderTop: "1px solid " + T.border, paddingTop: 12 }}>
              <div style={{ fontSize: 13, fontWeight: 600, color: T.textSub, marginBottom: 8 }}>Données</div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
                <button onClick={doExport} style={{ padding: "10px", borderRadius: 12, cursor: "pointer", border: "1px solid " + T.accent + "44", background: T.accent + "10", color: T.accent, fontSize: 13, fontWeight: 500 }}>📦 Exporter</button>
                <label style={{ padding: "10px", borderRadius: 12, cursor: "pointer", border: "1px solid " + T.accentGreen + "44", background: T.accentGreen + "10", color: T.accentGreen, fontSize: 13, fontWeight: 500, textAlign: "center", display: "flex", alignItems: "center", justifyContent: "center" }}>
                  📥 Importer
                  <input ref={importRef} type="file" accept=".json" style={{ display: "none" }} onChange={doImport}/>
                </label>
              </div>
              <button onClick={function() { setShowSettings(false); setShowReset(true); }} style={{ marginTop: 8, width: "100%", padding: "10px", borderRadius: 12, cursor: "pointer", border: "1px solid " + T.danger + "33", background: T.danger + "10", color: T.danger, fontSize: 13, fontWeight: 500 }}>
                🔄 Réinitialiser la progression...
              </button>
            </div>
          </div>
        )}

        {/* Bannière niveau */}
        <div style={{ margin: "12px 16px 0", animation: "fadeUp 0.5s ease 0.1s both" }}>
          <LevelBanner
            level={lv}
            title={getLevelInfo(lv).title}
            tier={getLevelInfo(lv).tier}
            xpIn={xpIn}
            xpTotal={DIY_XP_PER_LEVEL}
            themeMode={themeMode}
          />
        </div>

        {/* Tabs */}
        <div style={{ display: "flex", gap: 6, padding: "12px 16px 0", animation: "fadeUp 0.5s ease 0.15s both" }}>
          {["projets","galerie","stats"].map(function(t) {
            var labels = { projets: "Projets", galerie: "Galerie", stats: "Stats" };
            var active = tab === t;
            return (
              <button key={t} className="diy-tab-btn" onClick={function() { setTab(t); }} style={{
                flex: 1, padding: "9px 4px", borderRadius: 12, fontSize: 13, fontWeight: 600,
                border: "1px solid " + (active ? T.accent + "66" : T.border),
                background: active ? "linear-gradient(135deg," + T.accent + "22," + T.accentViolet + "18)" : T.surfaceLight,
                color: active ? T.accent : T.textMuted,
              }}>{labels[t]}</button>
            );
          })}
        </div>

        {/* Corps */}
        <div style={{ padding: "12px 16px 0", animation: "fadeUp 0.5s ease 0.2s both" }}>

          {tab === "projets" && (
            <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
              {/* Barre de recherche */}
              <div style={{ position: "relative" }}>
                <span style={{ position: "absolute", left: 10, top: "50%", transform: "translateY(-50%)", fontSize: 13, color: T.textMuted, pointerEvents: "none" }}>🔍</span>
                <input
                  value={searchDiy}
                  onChange={function(e) { setSearchDiy(e.target.value); }}
                  placeholder="Rechercher un projet..."
                  style={{ width: "100%", padding: "8px 10px 8px 32px", borderRadius: 12, fontSize: 13, border: "1px solid " + (searchDiy ? T.accent + "66" : T.border), background: T.inputBg, color: T.text, boxSizing: "border-box", outline: "none", transition: "border-color 0.2s" }}
                />
                {searchDiy && (
                  <button onClick={function() { setSearchDiy(""); }} style={{ position: "absolute", right: 8, top: "50%", transform: "translateY(-50%)", border: "none", background: "none", cursor: "pointer", fontSize: 13, color: T.textMuted, lineHeight: 1 }}>✕</button>
                )}
              </div>

              {/* Filtre hobbies */}
              <div style={{ display: "flex", flexWrap: "wrap", gap: 7 }}>
                <button className="diy-filter-pill" onClick={function() { setFilterHobby(null); }} style={{ fontSize: 12, padding: "5px 12px", borderRadius: 20, fontWeight: 600, border: "1px solid " + (!filterHobby ? T.filterBorder : T.border), background: !filterHobby ? T.filterActive : T.surfaceLight, color: !filterHobby ? T.accent : T.textMuted }}>Tous</button>
                {usedHobbies.map(function(h) {
                  var active = filterHobby === h.id;
                  return <button key={h.id} className="diy-filter-pill" onClick={function() { setFilterHobby(h.id); }} style={{ fontSize: 12, padding: "5px 12px", borderRadius: 20, fontWeight: 500, border: "1px solid " + (active ? T.filterBorder : T.border), background: active ? T.filterActive : T.surfaceLight, color: active ? T.accent : T.textMuted }}>{h.emoji} {h.label}</button>;
                })}
              </div>

              {/* Filtre tags */}
              {(function() {
                var allTags = Array.from(new Set(data.projects.reduce(function(acc, p) { return acc.concat(p.tags || []); }, [])));
                if (allTags.length === 0) return null;
                return (
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 6, alignItems: "center" }}>
                    <span style={{ fontSize: 11, color: T.textMuted }}>Tags :</span>
                    {filterTag && <button onClick={function() { setFilterTag(null); }} style={{ fontSize: 11, padding: "3px 10px", borderRadius: 20, border: "1px solid " + T.accentViolet + "55", background: T.accentViolet + "20", color: T.accentViolet, cursor: "pointer" }}>✕ {filterTag}</button>}
                    {allTags.filter(function(t) { return t !== filterTag; }).map(function(t) {
                      return <button key={t} className="diy-filter-pill" onClick={function() { setFilterTag(t); }} style={{ fontSize: 11, padding: "3px 10px", borderRadius: 20, border: "1px solid " + T.border, background: T.surfaceLight, color: T.textMuted }}>#{t}</button>;
                    })}
                  </div>
                );
              })()}

              {/* Tri */}
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <span style={{ fontSize: 11, color: T.textMuted, flexShrink: 0 }}>Trier par</span>
                <div style={{ display: "flex", gap: 5, flexWrap: "wrap" }}>
                  {[["status","Statut"],["name","Nom"],["hobby","Hobby"],["diff","Difficulté"],["date","Date"]].map(function(opt) {
                    var active = sortBy === opt[0];
                    return <button key={opt[0]} onClick={function() { setSortBy(opt[0]); }} style={{ fontSize: 11, padding: "3px 9px", borderRadius: 20, border: "1px solid " + (active ? T.accent + "66" : T.border), background: active ? T.filterActive : T.surfaceLight, color: active ? T.accent : T.textMuted, cursor: "pointer", fontWeight: active ? 600 : 400 }}>{opt[1]}</button>;
                  })}
                </div>
              </div>

              {filteredProjects.length === 0 && (
                <div style={{ textAlign: "center", padding: "32px 20px", color: T.textMuted }}>
                  {searchDiy.trim() ? (
                    <div>
                      <div style={{ fontSize: 28, marginBottom: 8 }}>🔍</div>
                      <div style={{ fontSize: 14, fontWeight: 600, color: T.text, marginBottom: 4 }}>Aucun résultat</div>
                      <div style={{ fontSize: 12 }}>Aucun projet pour "{searchDiy}"</div>
                    </div>
                  ) : (
                    <div>
                      <div style={{ fontSize: 32, marginBottom: 10 }}>✦</div>
                      <div style={{ fontSize: 14, fontWeight: 600, color: T.text }}>Pas encore de projets.</div>
                      <div style={{ fontSize: 12, marginTop: 6 }}>Crée ton premier projet DIY !</div>
                    </div>
                  )}
                </div>
              )}
              {filteredProjects.map(function(p) {
                return <DIY_ProjectCard key={p.id} project={p} hobbies={data.hobbies} onClick={function() { setDetailProject(p); }}/>;
              })}

              <button onClick={function() { setShowAddHobby(true); }} style={{ background: "none", border: "1px dashed " + T.accentViolet + "55", borderRadius: 12, padding: "10px", fontSize: 12, color: T.accentViolet, cursor: "pointer", width: "100%", marginTop: 4 }}>
                + Ajouter un nouveau hobby
              </button>
            </div>
          )}

          {tab === "galerie" && <DIY_GalleryTab data={data} onOpenProject={function(p) { setDetailProject(p); }}/>}
          {tab === "stats"   && <StatsTab data={data} themeMode={themeMode}/>}
        </div>
      </div>

      {/* FAB */}
      {tab === "projets" && (
        <button onClick={function() { setShowAdd(true); }} style={{
          position: "fixed", bottom: 28, right: 20, width: 56, height: 56, borderRadius: "50%",
          background: "linear-gradient(135deg," + T.accent + "," + T.accentViolet + ")",
          border: "none", color: T.bg, fontSize: 26, fontWeight: 700,
          cursor: "pointer", boxShadow: "0 4px 20px " + T.accent + "55",
          zIndex: 100, display: "flex", alignItems: "center", justifyContent: "center", transition: "transform 0.15s",
        }}
          onMouseEnter={function(e) { e.currentTarget.style.transform = "scale(1.08)"; }}
          onMouseLeave={function(e) { e.currentTarget.style.transform = "scale(1)"; }}
        >+</button>
      )}

      {/* Modals */}
      {showAdd && <AddProjectModal hobbies={data.hobbies} onClose={function() { setShowAdd(false); }} onAdd={addProject}/>}
      {showAddHobby && <AddHobbyModal onClose={function() { setShowAddHobby(false); }} onAdd={addHobby}/>}
      {showReset && <DIY_ResetModal onClose={function() { setShowReset(false); }} onReset={doReset}/>}
      {detailProject && (
        <ProjectDetail
          project={data.projects.find(function(p) { return p.id === detailProject.id; }) || detailProject}
          hobbies={data.hobbies}
          onClose={function() { setDetailProject(null); }}
          onUpdate={updateProject}
          onDelete={deleteProject}
        />
      )}

      {/* Toast */}
      {toast && (
        <div style={{
          position: "fixed", bottom: 24, left: "50%", transform: "translateX(-50%)",
          background: toast.isBadge
            ? "linear-gradient(135deg," + T.surface + "," + T.filterActive + ")"
            : T.modalBg,
          backdropFilter: "blur(14px)",
          border: "1px solid " + (toast.isBadge ? T.accent + "88" : T.accent + "44"),
          borderRadius: 22, padding: toast.isBadge ? "12px 22px" : "10px 20px",
          fontSize: 13, color: T.text, boxShadow: "0 8px 36px rgba(0,0,0,0.22)",
          whiteSpace: "nowrap", zIndex: 300, fontWeight: toast.isBadge ? 600 : 400,
          animation: "diy-toast 0.3s cubic-bezier(0.34,1.56,0.64,1) both",
        }}>
          {toast.msg}
        </div>
      )}
    </div>
    </DIY_ThemeCtx.Provider>
  );
}

// Palette de couleurs pour les tags WB
var WB_TAG_PALETTE = ["#A78BFA","#6EE7B7","#F9A8D4","#FCD34D","#93C5FD","#FB923C","#86EFAC","#F472B6","#67E8F9","#D8B4FE"];
// Normalise un tag — string legacy → objet {label, color}
function normalizeTag(t, idx) {
  if (typeof t === "string") return { label: t, color: WB_TAG_PALETTE[idx % WB_TAG_PALETTE.length] };
  return t;
}
function normalizeTags(tags) {
  return (tags || []).map(function(t, i) { return normalizeTag(t, i); });
}

function calcCompletion(entries, goals) {
  var global = 0, bySec = {}, countedSections = 0;
  SECTIONS.forEach(function(s) {
    var count = entries.filter(function(e) { return e.section === s.id; }).length;
    var goal = (goals && goals[s.id]) ? goals[s.id] : 5;
    var pct = goal > 0 ? Math.min(100, Math.round((count / goal) * 100)) : 0;
    bySec[s.id] = { count:count, goal:goal, pct:pct };
    // La galerie se remplit automatiquement, on l'exclut du % global
    if (s.id !== "galerie") { global += pct; countedSections++; }
  });
  return { bySec:bySec, global: countedSections > 0 ? Math.round(global / countedSections) : 0 };
}

// Parse une date textuelle pour le tri timeline
function parseDateStr(str) {
  if (!str) return Infinity;
  // Essaie un nombre pur (année, ou année négative pour "avant JC")
  var num = parseInt(str.replace(/[^\-0-9]/g, ""), 10);
  if (!isNaN(num)) return num;
  // Essaie Date standard
  var d = new Date(str);
  if (!isNaN(d.getTime())) return d.getTime() / 1000;
  return Infinity;
}

function WB_fmtDate(iso) {
  if (!iso) return "";
  var d = new Date(iso);
  return d.getDate().toString().padStart(2,"0") + "/" + (d.getMonth()+1).toString().padStart(2,"0") + "/" + d.getFullYear();
}

// Collecte toutes les entrées qui ont une image (imageUrl ou mapUrl)
function getAllImages(entries) {
  var imgs = [];
  entries.forEach(function(e) {
    var sec = SECTIONS.find(function(s) { return s.id === e.section; });
    if (e.imageUrl) imgs.push({ entry:e, url:e.imageUrl, type:"image", secLabel: sec ? sec.label : "", secEmoji: sec ? sec.emoji : "" });
    if (e.mapUrl)   imgs.push({ entry:e, url:e.mapUrl,   type:"map",   secLabel: sec ? sec.label : "", secEmoji:"🗺️" });
  });
  return imgs;
}

// GLOBE PLACEHOLDER PULSANT
// ============================================================
function WorldGlobe({ globalPct }) {
  var T = useT();
  // Phase déterminée par le pourcentage global
  var phase = globalPct < 10 ? 0 : globalPct < 30 ? 1 : globalPct < 60 ? 2 : globalPct < 90 ? 3 : 4;
  var phaseLabels = ["Neant primordial","Monde naissant","Monde en formation","Monde vivant","Monde legendaire"];
  var phaseColors = [
    ["#1A1A2E","#16213E"],   // phase 0 - néant
    ["#1B3A4B","#2D6A4F"],   // phase 1 - naissant
    ["#2D6A4F","#40916C"],   // phase 2 - formation
    ["#40916C","#74C69D"],   // phase 3 - vivant
    ["#74C69D","#B7E4C7"],   // phase 4 - légendaire
  ];
  var cols = phaseColors[phase];
  var R = 70; // rayon globe
  var CX = 120, CY = 120;
  var W = 240, H = 240;

  return (
    <div style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:10, padding:"20px 0 10px" }}>
      <style>{`
        @keyframes globePulse { 0%,100%{opacity:0.6;transform:scale(1)} 50%{opacity:1;transform:scale(1.04)} }
        @keyframes globeRing  { 0%{transform:scale(0.9);opacity:0.3} 100%{transform:scale(1.4);opacity:0} }
        @keyframes globeFloat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
        @keyframes starTwinkle{ 0%,100%{opacity:0.2} 50%{opacity:1} }
      `}</style>
      <div style={{ position:"relative", width:W, height:H }}>
        {/* Anneaux pulsants */}
        {[1,2,3].map(function(i) {
          return (
            <div key={i} style={{
              position:"absolute", borderRadius:"50%",
              width: R*2 + i*30, height: R*2 + i*30,
              top: CY - R - i*15, left: CX - R - i*15,
              border: "1px solid " + T.accent,
              animation: "globeRing " + (2 + i*0.7) + "s ease-out " + (i*0.4) + "s infinite",
              opacity: 0,
            }}/>
          );
        })}
        <svg viewBox={"0 0 " + W + " " + H} width={W} height={H} style={{ animation:"globeFloat 4s ease-in-out infinite", position:"relative", zIndex:2 }}>
          <defs>
            <radialGradient id="globeGrad" cx="38%" cy="35%" r="60%">
              <stop offset="0%" stopColor={cols[1]}/>
              <stop offset="100%" stopColor={cols[0]}/>
            </radialGradient>
            <radialGradient id="globeShine" cx="35%" cy="30%" r="50%">
              <stop offset="0%" stopColor="rgba(255,255,255,0.18)"/>
              <stop offset="100%" stopColor="rgba(255,255,255,0)"/>
            </radialGradient>
            <clipPath id="globeClip"><circle cx={CX} cy={CY} r={R}/></clipPath>
          </defs>

          {/* Étoiles fond (phases 0-1) */}
          {phase <= 1 && [
            [30,40],[80,20],[160,35],[200,60],[40,160],[180,180],[100,200],[210,140]
          ].map(function(pos, i) {
            return <circle key={i} cx={pos[0]} cy={pos[1]} r="1.5" fill={T.textMuted} style={{ animation:"starTwinkle " + (1.5+i*0.3) + "s ease-in-out " + (i*0.2) + "s infinite" }}/>;
          })}

          {/* Globe de base */}
          <circle cx={CX} cy={CY} r={R} fill="url(#globeGrad)" style={{ animation:"globePulse 3s ease-in-out infinite" }}/>

          {/* Continent placeholder — phase 1+ */}
          {phase >= 1 && (
            <g clipPath="url(#globeClip)" opacity={Math.min(1, (globalPct - 10) / 20)}>
              <ellipse cx={CX-15} cy={CY+5} rx="28" ry="22" fill="#2D6A4F" opacity="0.7"/>
              <ellipse cx={CX+25} cy={CY-20} rx="18" ry="14" fill="#40916C" opacity="0.6"/>
              <ellipse cx={CX+10} cy={CY+28} rx="14" ry="10" fill="#2D6A4F" opacity="0.5"/>
            </g>
          )}

          {/* Végétation — phase 2+ */}
          {phase >= 2 && (
            <g clipPath="url(#globeClip)" opacity={Math.min(1, (globalPct - 30) / 30)}>
              <ellipse cx={CX-15} cy={CY+5} rx="28" ry="22" fill="#52B788" opacity="0.5"/>
              <ellipse cx={CX+25} cy={CY-20} rx="18" ry="14" fill="#74C69D" opacity="0.4"/>
              {/* Petits arbres stylisés */}
              {[[-20,0],[0,-15],[20,10],[-5,20]].map(function(off, i) {
                return (
                  <g key={i} transform={"translate("+(CX+off[0])+","+(CY+off[1])+")"}>
                    <rect x="-1.5" y="0" width="3" height="8" fill="#40916C" opacity="0.8"/>
                    <polygon points="0,-10 -6,0 6,0" fill="#52B788" opacity="0.9"/>
                  </g>
                );
              })}
            </g>
          )}

          {/* Civilisation — phase 3+ */}
          {phase >= 3 && (
            <g clipPath="url(#globeClip)" opacity={Math.min(1, (globalPct - 60) / 30)}>
              {/* Bâtiments minuscules */}
              {[[-10,8],[5,-5],[18,15],[-25,-10]].map(function(off, i) {
                var h = 6 + i*2;
                return (
                  <g key={i} transform={"translate("+(CX+off[0])+","+(CY+off[1])+")"}>
                    <rect x="-3" y={-h} width="6" height={h} fill={T.accentGold} opacity="0.7"/>
                    <polygon points={"0,"+(-(h+4))+" -4,"+(-h)+" 4,"+(-h)} fill={T.accentGold} opacity="0.9"/>
                  </g>
                );
              })}
              {/* Lumières de villes */}
              {[[-8,5],[10,0],[20,18],[-20,15]].map(function(off, i) {
                return <circle key={i} cx={CX+off[0]} cy={CY+off[1]} r="2" fill={T.accentGold} opacity="0.6" style={{ animation:"starTwinkle "+(1+i*0.5)+"s ease-in-out infinite" }}/>;
              })}
            </g>
          )}

          {/* Phase 4 — légende : halo doré */}
          {phase >= 4 && (
            <circle cx={CX} cy={CY} r={R} fill="none" stroke={T.accentGold} strokeWidth="2" opacity="0.4" style={{ animation:"globePulse 2s ease-in-out infinite" }}/>
          )}

          {/* Lignes de longitude/latitude */}
          <g clipPath="url(#globeClip)" opacity="0.12">
            <ellipse cx={CX} cy={CY} rx={R} ry={R*0.35} fill="none" stroke={T.text} strokeWidth="1"/>
            <ellipse cx={CX} cy={CY} rx={R*0.7} ry={R*0.25} fill="none" stroke={T.text} strokeWidth="0.8"/>
            <line x1={CX} y1={CY-R} x2={CX} y2={CY+R} stroke={T.text} strokeWidth="0.8"/>
            <line x1={CX-R} y1={CY} x2={CX+R} y2={CY} stroke={T.text} strokeWidth="0.8"/>
          </g>

          {/* Reflet */}
          <circle cx={CX} cy={CY} r={R} fill="url(#globeShine)"/>
        </svg>
      </div>

      {/* Label phase */}
      <div style={{ fontSize:13, fontWeight:600, color:T.accent, letterSpacing:0.5 }}>{phaseLabels[phase]}</div>
      <div style={{ fontSize:11, color:T.textMuted }}>Completion globale : {globalPct}%</div>
    </div>
  );
}

function BadgesPanel({ badges }) {
  var T = useT();
  var [selected, setSelected] = useState(null);
  var unlocked = badges.filter(function(b) { return b.unlocked; });
  var locked   = badges.filter(function(b) { return !b.unlocked; });
  var selBadge = selected ? badges.find(function(b) { return b.id === selected; }) : null;

  return (
    <div>
      <div style={{ fontSize:13, fontWeight:600, color:T.textMuted, letterSpacing:0.5, marginBottom:10 }}>
        SUCCES — {unlocked.length}/{badges.length}
      </div>
      <div style={{ display:"flex", flexWrap:"wrap", gap:8 }}>
        {unlocked.map(function(b) {
          var isSel = selected === b.id;
          return (
            <div key={b.id} onClick={function() { setSelected(isSel ? null : b.id); }} style={{ display:"flex", alignItems:"center", gap:6, padding:"6px 12px", borderRadius:20, background:"linear-gradient(135deg,"+T.accentGold+"22,"+T.accent+"18)", border:"1px solid "+(isSel ? T.accentGold : T.accentGold+"55"), cursor:"pointer", transition:"all 0.15s", boxShadow: isSel ? "0 0 0 2px "+T.accentGold+"44" : "none" }}>

              <span style={{ fontSize:12, fontWeight:600, color:T.accentGold }}>{b.label}</span>
            </div>
          );
        })}
        {locked.map(function(b) {
          var isSel = selected === b.id;
          return (
            <div key={b.id} onClick={function() { setSelected(isSel ? null : b.id); }} style={{ display:"flex", alignItems:"center", gap:6, padding:"6px 12px", borderRadius:20, background:T.surfaceLight, border:"1px solid "+(isSel ? T.border : T.border), cursor:"pointer", opacity:0.6, filter:"grayscale(0.7)", transition:"all 0.15s", boxShadow: isSel ? "0 0 0 2px "+T.accent+"33" : "none" }}>
              <span style={{ fontSize:16 }}>🔒</span>
              <span style={{ fontSize:12, fontWeight:600, color:T.textMuted }}>{b.label}</span>
            </div>
          );
        })}
      </div>
      {selBadge && (
        <div style={{ marginTop:10, padding:"12px 14px", borderRadius:14, background: selBadge.unlocked ? "linear-gradient(135deg,"+T.accentGold+"15,"+T.accent+"10)" : T.surfaceLight, border:"1px solid "+(selBadge.unlocked ? T.accentGold+"44" : T.border), display:"flex", alignItems:"flex-start", gap:12, animation:"fadeUp 0.2s ease" }}>
          <span style={{ fontSize:28, flexShrink:0 }}>{selBadge.unlocked ? selBadge.icon : "🔒"}</span>
          <div style={{ flex:1 }}>
            <div style={{ fontSize:13, fontWeight:700, color: selBadge.unlocked ? T.accentGold : T.textMuted, marginBottom:4 }}>{selBadge.label}</div>
            <div style={{ fontSize:12, color:T.textSub, lineHeight:1.5 }}>{selBadge.desc}</div>
            {selBadge.unlocked && <div style={{ fontSize:11, color:T.accent, marginTop:5, fontWeight:600 }}>✓ Débloqué</div>}
            {!selBadge.unlocked && <div style={{ fontSize:11, color:T.textMuted, marginTop:5, fontStyle:"italic" }}>Continue à construire ton univers !</div>}
          </div>
          <button onClick={function(e) { e.stopPropagation(); setSelected(null); }} style={{ border:"none", background:"none", cursor:"pointer", fontSize:14, color:T.textMuted, flexShrink:0 }}>✕</button>
        </div>
      )}
    </div>
  );
}

      <line x1="8" y1="10" x2="8"  y2="24" stroke={T.accent} strokeWidth="1.5" opacity="0.5"/>
      <line x1={W-8} y1="10" x2={W-22} y2="10" stroke={T.accent} strokeWidth="1.5" opacity="0.5"/>
      <line x1={W-8} y1="10" x2={W-8}  y2="24" stroke={T.accent} strokeWidth="1.5" opacity="0.5"/>
      <line x1="8" y1={H-10} x2="22" y2={H-10} stroke={T.accent} strokeWidth="1.5" opacity="0.5"/>
      <line x1="8" y1={H-10} x2="8"  y2={H-24} stroke={T.accent} strokeWidth="1.5" opacity="0.5"/>
      <line x1={W-8} y1={H-10} x2={W-22} y2={H-10} stroke={T.accent} strokeWidth="1.5" opacity="0.5"/>
      <line x1={W-8} y1={H-10} x2={W-8}  y2={H-24} stroke={T.accent} strokeWidth="1.5" opacity="0.5"/>
      <text x="32" y={H/2+6} fontSize="18" textAnchor="middle">🌍</text>
      <line x1="60" y1="14" x2="60" y2={H-14} stroke={T.accent} strokeWidth="1" opacity="0.2"/>
      <text x="72" y="30" fontSize="10" fontWeight="600" fill={T.textMuted} fontFamily="Inter,sans-serif" letterSpacing="1">UNIVERS</text>
      <text x="72" y="56" fontSize="16" fontWeight="700" fill={T.text} fontFamily="Playfair Display,serif">{worldName}</text>
      <text x={W-20} y="30" fontSize="10" fontWeight="600" fill={T.textMuted} fontFamily="Inter,sans-serif" letterSpacing="1" textAnchor="end">COMPLETE</text>
      <text x={W-20} y="56" fontSize="22" fontWeight="700" fill={globalPct >= 100 ? T.accentGold : T.accent} fontFamily="Playfair Display,serif" textAnchor="end">{globalPct}%</text>
      <rect x="18" y={H-16} width={W-36} height="5" rx="2.5" fill={T.border} opacity="0.4"/>
      <rect x="18" y={H-16} width={barW} height="5" rx="2.5" fill={T.accent}/>
      {barW > 6 && <circle cx={18+barW} cy={H-13.5} r="3" fill={T.accent} opacity="0.9"/>}
    </svg>
  );
}

function SectionProgress({ completion }) {

  return (
    <div style={{ display:"flex", flexWrap:"wrap", gap:8 }}>
      {SECTIONS.map(function(s) {
        var info = completion.bySec[s.id] || { count:0, goal:5, pct:0 };
        return (
          <div key={s.id} style={{ flex:"1 1 calc(50% - 4px)", minWidth:140, background:T.surface, border:"1px solid "+T.border, borderRadius:12, padding:"10px 12px" }}>
            <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:6 }}>
              <span style={{ fontSize:12, fontWeight:600, color:T.text }}>{s.emoji} {s.label}</span>
              <span style={{ fontSize:11, color:s.color, fontWeight:700 }}>{info.count}/{info.goal}</span>
            </div>
            <div style={{ height:5, borderRadius:3, background:T.border, overflow:"hidden" }}>
              <div style={{ height:"100%", width:info.pct+"%", borderRadius:3, background:s.color, transition:"width 0.4s ease" }}/>

}

// ============================================================
// CARTE ENTREE
// ============================================================
function EntryCard({ entry, onClick }) {
  var T = useT();
  var sec = SECTIONS.find(function(s) { return s.id === entry.section; }) || SECTIONS[0];
  var st  = WB_STATUS_META[entry.status] || WB_STATUS_META.ebauche;
  var mainImg = entry.imageUrl || entry.mapUrl || null;
  return (
    <div onClick={onClick} style={{ background:T.surfaceCard, border:"1px solid "+T.border, borderLeft:"3px solid "+sec.color, borderRadius:14, overflow:"hidden", cursor:"pointer", transition:"transform 0.2s, box-shadow 0.2s" }}
      onMouseEnter={function(e) { e.currentTarget.style.transform="translateY(-2px)"; e.currentTarget.style.boxShadow="0 8px 24px rgba(0,0,0,0.12)"; }}
      onMouseLeave={function(e) { e.currentTarget.style.transform=""; e.currentTarget.style.boxShadow=""; }}
    >
      {/* Image bannière si présente — cachée si portrait déjà dans avatar */}
      {mainImg && mainImg !== entry.imageUrl && (
        <div style={{ height:100, overflow:"hidden", position:"relative" }}>
          <img src={mainImg} style={{ width:"100%", height:"100%", objectFit:"cover" }} alt="" onError={function(e){e.target.parentNode.style.display="none";}}/>
          <div style={{ position:"absolute", inset:0, background:"linear-gradient(to bottom, transparent 40%, "+T.surfaceCard+")" }}/>
        </div>
      )}
      <div style={{ padding:"12px 14px" }}>
        <div style={{ display:"flex", alignItems:"flex-start", gap:10, marginBottom:6 }}>
          {entry.imageUrl ? (
            <div style={{ width:40, height:40, borderRadius:"50%", overflow:"hidden", flexShrink:0, border:"2px solid "+sec.color+"55" }}>
              <img src={entry.imageUrl} alt="" style={{ width:"100%", height:"100%", objectFit:"cover" }}/>
            </div>
          ) : (
            <span style={{ fontSize:20, flexShrink:0, width:40, height:40, display:"flex", alignItems:"center", justifyContent:"center", borderRadius:"50%", background:sec.color+"18" }}>{sec.emoji}</span>
          )}
          <div style={{ flex:1, minWidth:0 }}>
            <div style={{ fontSize:14, fontWeight:700, color:T.text, fontFamily:"Playfair Display,serif", marginBottom:3, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{entry.name}</div>
            <div style={{ display:"flex", gap:6, flexWrap:"wrap", alignItems:"center" }}>
              <span style={{ fontSize:10, padding:"2px 9px", borderRadius:20, background:st.bg, color:st.color, fontWeight:600, border:"1px solid "+st.color+"44" }}>{st.label}</span>
              {normalizeTags(entry.tags).map(function(t) {
                return <span key={t.label} style={{ fontSize:10, padding:"2px 8px", borderRadius:20, background:t.color+"18", color:t.color, border:"1px solid "+t.color+"44", fontWeight:500 }}>#{t.label}</span>;
              })}
            </div>
          </div>
        </div>
        {entry.description && <div style={{ fontSize:12, color:T.textMuted, lineHeight:1.5, overflow:"hidden", display:"-webkit-box", WebkitLineClamp:2, WebkitBoxOrient:"vertical" }}>{entry.description}</div>}
        {entry.relations && entry.relations.length > 0 && (
          <div style={{ marginTop:8, display:"flex", gap:5, flexWrap:"wrap" }}>
            {entry.relations.slice(0,3).map(function(r,i) {
              var ro = WB_normRelation(r);
              var rt = WB_RELATION_TYPES.find(function(x){return x.id===ro.type;})||WB_RELATION_TYPES[6];
              return <span key={i} style={{ fontSize:10, padding:"2px 8px", borderRadius:20, background:rt.color+"18", color:rt.color, border:"1px solid "+rt.color+"44" }}>{rt.emoji} {ro.name}</span>;
            })}
            {entry.relations.length > 3 && <span style={{ fontSize:10, color:T.textMuted }}>+{entry.relations.length-3}</span>}
          </div>
        )}
        <div style={{ fontSize:10, color:T.textMuted, marginTop:8, textAlign:"right" }}>ajouté le {WB_fmtDate(entry.createdAt)}</div>
      </div>
    </div>
  );
}

// ============================================================
// MODAL AJOUTER / EDITER
// ============================================================
function EntryModal({ entry, sectionId, onClose, onSave, allEntries, relTypes: relTypesProp }) {
  var relTypes = relTypesProp || WB_RELATION_TYPES;
  var T = useT();
  var initSection = entry ? entry.section : (sectionId || SECTIONS[0].id);
  var [section, setSection]     = useState(initSection);
  var [name, setName]           = useState(entry ? entry.name : "");
  var [description, setDesc]    = useState(entry ? entry.description : "");
  var [status, setStatus]       = useState(entry ? entry.status : "ebauche");
  var [imageUrl, setImageUrl]   = useState(entry ? (entry.imageUrl||"") : "");
  var [mapUrl, setMapUrl]       = useState(entry ? (entry.mapUrl||"") : "");
  var [tags, setTags]           = useState(function(){ return normalizeTags(entry ? entry.tags||[] : []); });
  var [tagInput, setTagInput]   = useState("");
  var [editingTagIdx, setEditingTagIdx] = useState(null);
  var [relations, setRelations] = useState(function(){ return entry ? (entry.relations||[]).map(WB_normRelation) : []; });
  var [relName,   setRelName]   = useState("");
  var [relType,   setRelType]   = useState("neutre");
  var [customFields, setCustom] = useState(entry ? (entry.customFields||{}) : {});
  var curSec = SECTIONS.find(function(s) { return s.id === section; }) || SECTIONS[0];
  var otherEntries = allEntries.filter(function(e) { return !entry || e.id !== entry.id; }).map(function(e) { return e.name; });

  function handleSave() {
    if (!name.trim()) return;
    onSave({
      id: entry ? entry.id : null,
      section: section, name: name.trim(), description: description, status: status,
      imageUrl: imageUrl, mapUrl: mapUrl,
      tags: tags,
      relations: relations.filter(function(r){return r.name.trim();}), 
      customFields: customFields,
      createdAt: entry ? entry.createdAt : new Date().toISOString(),
    });
  }

  var inp = { width:"100%", padding:"9px 12px", borderRadius:10, fontSize:13, color:T.text, background:T.inputBg, border:"1px solid "+T.borderLight, outline:"none", boxSizing:"border-box", fontFamily:"Inter,sans-serif" };
  var lbl = { fontSize:11, fontWeight:600, color:T.textMuted, marginBottom:4, letterSpacing:0.5 };

  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.55)", zIndex:200, display:"flex", alignItems:"flex-end", justifyContent:"center" }} onClick={function(e){if(e.target===e.currentTarget)onClose();}}>
      <div style={{ background:T.modalBg, borderRadius:"24px 24px 0 0", width:"100%", maxWidth:540, maxHeight:"92vh", overflowY:"auto", padding:"20px 20px 48px" }}>
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:16 }}>
          <div style={{ fontSize:16, fontWeight:700, color:T.text, fontFamily:"Playfair Display,serif" }}>{entry ? "Modifier" : "Nouvelle fiche"} — {curSec.emoji} {curSec.label}</div>
          <button onClick={onClose} style={{ background:"none", border:"none", fontSize:20, cursor:"pointer", color:T.textMuted }}>✕</button>
        </div>

        {!entry && (
          <div style={{ marginBottom:14 }}>
            <div style={lbl}>Section</div>
            <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>
              {SECTIONS.map(function(s) {
                var active = section === s.id;
                return <button key={s.id} onClick={function(){setSection(s.id);}} style={{ padding:"6px 12px", borderRadius:20, fontSize:12, fontWeight:600, cursor:"pointer", border:"1px solid "+(active ? s.color+"88" : T.border), background:active ? s.color+"22" : T.surfaceLight, color:active ? s.color : T.textMuted }}>{s.emoji} {s.label}</button>;
              })}
            </div>
          </div>
        )}

        <div style={{ marginBottom:12 }}>
          <div style={lbl}>Nom *</div>
          <input style={inp} value={name} onChange={function(e){setName(e.target.value);}} placeholder="Nom de l'element..."/>
        </div>

        <div style={{ marginBottom:12 }}>
          <div style={lbl}>Statut</div>
          <div style={{ display:"flex", gap:8 }}>
            {Object.entries(WB_STATUS_META).map(function(pair) {
              var k=pair[0], v=pair[1], active=status===k;
              return <button key={k} onClick={function(){setStatus(k);}} style={{ flex:1, padding:"7px 4px", borderRadius:10, fontSize:12, fontWeight:600, cursor:"pointer", border:"1px solid "+(active ? v.color+"88" : T.border), background:active ? v.bg : T.surfaceLight, color:active ? v.color : T.textMuted }}>{v.label}</button>;
            })}
          </div>
        </div>

        <div style={{ marginBottom:12 }}>
          <div style={lbl}>Description</div>
          <textarea style={Object.assign({},inp,{minHeight:80,resize:"vertical"})} value={description} onChange={function(e){setDesc(e.target.value);}} placeholder="Description generale..."/>
        </div>

        {curSec.fields.map(function(field) {
          var key = field.toLowerCase().replace(/\s+/g,"_").replace(/[^a-z0-9_]/g,"");
          return (
            <div key={field} style={{ marginBottom:12 }}>
              <div style={lbl}>{field}</div>
              <textarea style={Object.assign({},inp,{minHeight:56,resize:"vertical"})} value={customFields[key]||""} onChange={function(e){setCustom(Object.assign({},customFields,{[key]:e.target.value}));}} placeholder={field+"..."}/>
            </div>
          );
        })}

        {/* Portrait / illustration */}
        <div style={{ marginBottom:12 }}>
          <div style={lbl}>Portrait / Illustration</div>
          <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:8 }}>
            {imageUrl ? (
              <div style={{ position:"relative", flexShrink:0 }}>
                <img src={imageUrl} alt="" style={{ width:64, height:64, borderRadius:"50%", objectFit:"cover", border:"2px solid "+T.accent+"44", display:"block" }}/>
                <button onClick={function(){setImageUrl("");}} style={{ position:"absolute", top:-4, right:-4, width:18, height:18, borderRadius:"50%", border:"none", background:"#F87171", color:"#fff", cursor:"pointer", fontSize:11, display:"flex", alignItems:"center", justifyContent:"center", lineHeight:1 }}>✕</button>
              </div>
            ) : (
              <div style={{ width:64, height:64, borderRadius:"50%", background:T.surfaceLight, border:"1px dashed "+T.border, display:"flex", alignItems:"center", justifyContent:"center", fontSize:24, flexShrink:0 }}>👤</div>
            )}
            <div style={{ flex:1 }}>
              <label style={{ display:"block", padding:"8px 12px", borderRadius:10, border:"1px dashed "+T.accent+"44", background:T.accent+"08", color:T.accent, cursor:"pointer", fontSize:12, fontWeight:600, textAlign:"center" }}>
                {imageUrl ? "Changer le portrait" : "📷 Ajouter un portrait"}
                <input type="file" accept="image/*" style={{ display:"none" }} onChange={async function(e){
                  var file = e.target.files[0];
                  if (!file) return;
                  var formData = new FormData();
                  formData.append("file", file);
                  formData.append("upload_preset", "dt5wa6tqm");
                  try {
                    var res = await fetch("https://api.cloudinary.com/v1_1/dt5wa6tqm/image/upload", { method:"POST", body:formData });
                    var data = await res.json();
                    if (data.secure_url) setImageUrl(data.secure_url);
                  } catch(err) { console.error("Upload failed", err); }
                }}/>
              </label>
              <div style={{ fontSize:10, color:T.textMuted, marginTop:4, textAlign:"center" }}>JPG, PNG depuis ta galerie</div>
            </div>
          </div>
        </div>

        {/* Carte du monde — seulement pour Lieux */}
        {curSec.hasMap && (
          <div style={{ marginBottom:12 }}>
            <div style={lbl}>URL de carte du monde (optionnel)</div>
            <input style={inp} value={mapUrl} onChange={function(e){setMapUrl(e.target.value);}} placeholder="https://..."/>
            {mapUrl && (
              <div style={{ marginTop:8, borderRadius:10, overflow:"hidden", maxHeight:140, border:"1px solid "+T.border }}>
                <img src={mapUrl} style={{ width:"100%", objectFit:"cover", maxHeight:140 }} alt="" onError={function(e){e.target.parentNode.style.display="none";}}/>
              </div>
            )}
          </div>
        )}

        <div style={{ marginBottom:12 }}>
          <div style={lbl}>Tags</div>
          {/* Chips tags existants */}
          <div style={{ display:"flex", flexWrap:"wrap", gap:6, marginBottom:tags.length>0?8:0 }}>
            {tags.map(function(t, idx) {
              return (
                <div key={idx} style={{ display:"flex", alignItems:"center", gap:4, background:t.color+"18", border:"1px solid "+t.color+"55", borderRadius:20, padding:"3px 10px 3px 8px" }}>
                  {editingTagIdx === idx ? (
                    <input
                      autoFocus
                      value={t.label}
                      onChange={function(e){ setTags(function(prev){ return prev.map(function(x,i){ return i===idx ? Object.assign({},x,{label:e.target.value}) : x; }); }); }}
                      onBlur={function(){ setEditingTagIdx(null); }}
                      onKeyDown={function(e){ if(e.key==="Enter"||e.key==="Escape") setEditingTagIdx(null); }}
                      style={{ fontSize:11, width:60, border:"none", background:"transparent", color:t.color, fontWeight:600, outline:"none" }}
                    />
                  ) : (
                    <span onClick={function(){ setEditingTagIdx(idx); }} style={{ fontSize:11, color:t.color, fontWeight:600, cursor:"text" }}>#{t.label}</span>
                  )}
                  <input
                    type="color"
                    value={t.color}
                    onChange={function(e){ setTags(function(prev){ return prev.map(function(x,i){ return i===idx ? Object.assign({},x,{color:e.target.value}) : x; }); }); }}
                    style={{ width:14, height:14, border:"none", background:"none", cursor:"pointer", padding:0, borderRadius:"50%", flexShrink:0 }}
                  />
                  <button onClick={function(){ setTags(function(prev){ return prev.filter(function(_,i){ return i!==idx; }); }); }} style={{ border:"none", background:"none", cursor:"pointer", fontSize:11, color:t.color, opacity:0.6, padding:0, lineHeight:1 }}>✕</button>
                </div>
              );
            })}
          </div>
          {/* Input nouveau tag */}
          <div style={{ display:"flex", gap:6 }}>
            <input
              value={tagInput}
              onChange={function(e){ setTagInput(e.target.value); }}
              onKeyDown={function(e){
                if ((e.key==="Enter"||e.key===",") && tagInput.trim()) {
                  e.preventDefault();
                  var nextColor = WB_TAG_PALETTE[tags.length % WB_TAG_PALETTE.length];
                  setTags(function(prev){ return [...prev, {label:tagInput.trim().replace(/^#/,""), color:nextColor}]; });
                  setTagInput("");
                }
              }}
              placeholder="Ajouter un tag..."
              style={Object.assign({},inp,{flex:1,fontSize:12})}
            />
            <button onClick={function(){
              if (!tagInput.trim()) return;
              var nextColor = WB_TAG_PALETTE[tags.length % WB_TAG_PALETTE.length];
              setTags(function(prev){ return [...prev, {label:tagInput.trim().replace(/^#/,""), color:nextColor}]; });
              setTagInput("");
            }} style={{ padding:"6px 12px", borderRadius:10, fontSize:12, cursor:"pointer", border:"1px solid "+T.accent+"44", background:T.accent+"12", color:T.accent, whiteSpace:"nowrap" }}>+ Tag</button>
          </div>
          <div style={{ fontSize:10, color:T.textMuted, marginTop:4 }}>Clique sur le carré coloré pour changer la couleur · Clique sur le label pour le renommer</div>
        </div>
        <div style={{ marginBottom:20 }}>
          <div style={lbl}>Relations</div>
          <div style={{ display:"flex", gap:6, marginBottom:8, flexWrap:"wrap" }}>
            <input style={{...inp, flex:1, minWidth:100}} value={relName} onChange={function(e){setRelName(e.target.value);}}
              placeholder={otherEntries.slice(0,2).join(", ") || "Nom de la fiche..."}
              onKeyDown={function(e){ if(e.key==="Enter" && relName.trim()){ setRelations(function(prev){return [...prev,{name:relName.trim(),type:relType}];}); setRelName(""); }}}
            />
            <select value={relType} onChange={function(e){setRelType(e.target.value);}}
              style={{padding:"9px 10px",borderRadius:10,fontSize:12,color:T.text,background:T.inputBg,border:"1px solid "+T.borderLight,outline:"none",cursor:"pointer"}}>
              {relTypes.map(function(rt){
                return <option key={rt.id} value={rt.id}>{rt.emoji} {rt.label}</option>;
              })}
            </select>
            <button onClick={function(){ if(!relName.trim()) return; setRelations(function(prev){return [...prev,{name:relName.trim(),type:relType}];}); setRelName(""); }}
              style={{padding:"9px 14px",borderRadius:10,fontSize:12,cursor:"pointer",border:"1px solid "+T.accent+"44",background:T.accent+"12",color:T.accent,whiteSpace:"nowrap",fontWeight:600}}>
              + Ajouter
            </button>
          </div>
          <div style={{ display:"flex", flexWrap:"wrap", gap:5 }}>
            {relations.map(function(r, i){
              var rt = WB_RELATION_TYPES.find(function(x){return x.id===r.type;})||WB_RELATION_TYPES[6];
              return (
                <span key={i} style={{display:"flex",alignItems:"center",gap:4,fontSize:11,padding:"3px 8px 3px 10px",borderRadius:20,background:rt.color+"18",border:"1px solid "+rt.color+"44",color:rt.color}}>
                  {rt.emoji} {r.name}
                  <button onClick={function(){setRelations(function(prev){return prev.filter(function(_,j){return j!==i;});});}}
                    style={{border:"none",background:"none",cursor:"pointer",fontSize:11,color:rt.color,padding:0,lineHeight:1,marginLeft:2}}>✕</button>
                </span>
              );
            })}
          </div>
        </div>

        <button onClick={handleSave} style={{ width:"100%", padding:"13px", borderRadius:14, fontSize:14, fontWeight:700, background:"linear-gradient(135deg,"+T.accent+","+T.accentBlue+")", border:"none", color:"#fff", cursor:"pointer", boxShadow:"0 4px 16px "+T.accent+"44" }}>
          {entry ? "Enregistrer" : "Creer la fiche"}
        </button>
      </div>
    </div>
  );
}

// ============================================================
// MODAL DETAIL
// ============================================================
function EntryDetail({ entry, allEntries, onClose, onEdit, onDelete, onGoToEntry, onOpenEntry, relTypes: relTypesProp }) {
  var relTypes = relTypesProp || WB_RELATION_TYPES;
  var T = useT();
  var [confirmDel, setConfirmDel] = useState(false);
  var sec = SECTIONS.find(function(s) { return s.id === entry.section; }) || SECTIONS[0];
  var st  = WB_STATUS_META[entry.status] || WB_STATUS_META.ebauche;
  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.55)", zIndex:200, display:"flex", alignItems:"flex-end", justifyContent:"center" }} onClick={function(e){if(e.target===e.currentTarget)onClose();}}>
      <div style={{ background:T.modalBg, borderRadius:"24px 24px 0 0", width:"100%", maxWidth:540, maxHeight:"92vh", overflowY:"auto", padding:"0 0 40px" }}>

        {/* Image grande — illustration */}
        {entry.imageUrl && (
          <div style={{ width:"100%", height:220, overflow:"hidden", borderRadius:"24px 24px 0 0", position:"relative" }}>
            <img src={entry.imageUrl} style={{ width:"100%", height:"100%", objectFit:"cover" }} alt={entry.name} onError={function(e){e.target.parentNode.style.display="none";}}/>
            <div style={{ position:"absolute", inset:0, background:"linear-gradient(to bottom, transparent 40%, "+T.modalBg+")" }}/>
            <button onClick={onClose} style={{ position:"absolute", top:12, right:12, background:"rgba(0,0,0,0.4)", border:"none", fontSize:18, cursor:"pointer", color:"#fff", borderRadius:"50%", width:32, height:32, display:"flex", alignItems:"center", justifyContent:"center" }}>✕</button>
          </div>
        )}

        <div style={{ padding:"20px 20px 0" }}>
          {!entry.imageUrl && (
            <div style={{ display:"flex", justifyContent:"flex-end", marginBottom:8 }}>
              <button onClick={onClose} style={{ background:"none", border:"none", fontSize:20, cursor:"pointer", color:T.textMuted }}>✕</button>
            </div>
          )}

          <div style={{ marginBottom:14 }}>
            <div style={{ fontSize:11, color:sec.color, fontWeight:600, letterSpacing:1, marginBottom:4 }}>{sec.emoji} {sec.label.toUpperCase()}</div>
            <div style={{ fontSize:22, fontWeight:700, color:T.text, fontFamily:"Playfair Display,serif", lineHeight:1.2 }}>{entry.name}</div>
          </div>

          <div style={{ display:"flex", flexWrap:"wrap", gap:6, marginBottom:14 }}>
            <span style={{ fontSize:11, padding:"3px 10px", borderRadius:20, background:st.bg, color:st.color, fontWeight:600, border:"1px solid "+st.color+"44" }}>{st.label}</span>
            {normalizeTags(entry.tags).map(function(t) {
              return <span key={t.label} style={{ fontSize:11, padding:"3px 10px", borderRadius:20, background:t.color+"18", color:t.color, border:"1px solid "+t.color+"44", fontWeight:500 }}>#{t.label}</span>;
            })}
          </div>

          {entry.description && (
            <div style={{ marginBottom:14 }}>
              <div style={{ fontSize:11, color:T.textMuted, fontWeight:600, letterSpacing:0.5, marginBottom:4 }}>DESCRIPTION</div>
              <div style={{ fontSize:13, color:T.text, lineHeight:1.6, whiteSpace:"pre-wrap" }}>{entry.description}</div>
            </div>
          )}

          {entry.customFields && Object.entries(entry.customFields).map(function(pair) {
            var k=pair[0], v=pair[1]; if (!v) return null;
            var label = k.replace(/_/g," ").replace(/\b\w/g,function(c){return c.toUpperCase();});
            return (
              <div key={k} style={{ marginBottom:12 }}>
                <div style={{ fontSize:11, color:T.textMuted, fontWeight:600, letterSpacing:0.5, marginBottom:4 }}>{label.toUpperCase()}</div>
                <div style={{ fontSize:13, color:T.text, lineHeight:1.6, whiteSpace:"pre-wrap" }}>{v}</div>
              </div>
            );
          })}

          {/* Carte du monde si lieu */}
          {entry.mapUrl && (
            <div style={{ marginBottom:14 }}>
              <div style={{ fontSize:11, color:T.textMuted, fontWeight:600, letterSpacing:0.5, marginBottom:6 }}>CARTE DU MONDE</div>
              <div style={{ borderRadius:12, overflow:"hidden", border:"1px solid "+T.border }}>
                <img src={entry.mapUrl} style={{ width:"100%", objectFit:"contain", maxHeight:240 }} alt="carte" onError={function(e){e.target.parentNode.style.display="none";}}/>
              </div>
            </div>
          )}

          {entry.relations && entry.relations.length > 0 && (
            <div style={{ marginBottom:14 }}>
              <div style={{ fontSize:11, color:T.textMuted, fontWeight:600, letterSpacing:0.5, marginBottom:10 }}>RELATIONS</div>

              {/* Mini graphe centré */}
              {(function() {
                var entries = allEntries || [];
                var relations = entry.relations || [];
                var centerSec = SECTIONS.find(function(s){return s.id===entry.section;})||SECTIONS[0];

                // Résoudre les nœuds satellites
                var nodes = relations.map(function(r) {
                  var ro = WB_normRelation(r);
                  var rt = relTypes.find(function(x){return x.id===ro.type;})||relTypes[0]||WB_DEFAULT_RELATION_TYPES[6];
                  var linked = entries.find(function(e){ return e.name.toLowerCase()===ro.name.toLowerCase(); });
                  var linkedSec = linked ? (SECTIONS.find(function(s){return s.id===linked.section;})||SECTIONS[0]) : null;
                  return { name:ro.name, entry:linked||null, sec:linkedSec, color: linkedSec ? linkedSec.color : T.border, relType:rt };
                });

                var W = 300, H = 260;
                var cx = W/2, cy = H/2;
                var radius = Math.min(90, 60 + nodes.length * 4); // rayon du cercle satellites
                var labelMaxLen = 10;

                return (
                  <div style={{ width:"100%", overflowX:"auto", marginBottom:12 }}>
                    <svg width={W} height={H} viewBox={"0 0 "+W+" "+H} style={{ display:"block", margin:"0 auto" }}>
                      {/* Arêtes */}
                      {nodes.map(function(node, i) {
                        var angle = (2*Math.PI/nodes.length)*i - Math.PI/2;
                        var nx = cx + radius*Math.cos(angle);
                        var ny = cy + radius*Math.sin(angle);
                        return (
                          <g key={"edge-"+i}>
                            <line
                              x1={cx} y1={cy} x2={nx} y2={ny}
                              stroke={node.relType.color} strokeWidth="2" strokeOpacity="0.5"
                              strokeDasharray={node.entry?"none":"4 3"}
                            />
                            <text x={(cx+nx)/2} y={(cy+ny)/2-5} textAnchor="middle" fontSize="10" dominantBaseline="middle">
                              {node.relType.emoji}
                            </text>
                          </g>
                        );
                      })}

                      {/* Nœud central */}
                      <circle cx={cx} cy={cy} r={32} fill={centerSec.color+"22"} stroke={centerSec.color} strokeWidth="2"/>
                      <text x={cx} y={cy-6} textAnchor="middle" fontSize="18" dominantBaseline="middle">{centerSec.emoji}</text>
                      <text x={cx} y={cy+16} textAnchor="middle" fontSize="8" fill={T.text} fontWeight="600"
                        style={{fontFamily:"Inter,sans-serif"}}>
                        {entry.name.length > 12 ? entry.name.slice(0,11)+"…" : entry.name}
                      </text>

                      {/* Nœuds satellites */}
                      {nodes.map(function(node, i) {
                        var angle = (2*Math.PI/nodes.length)*i - Math.PI/2;
                        var nx = cx + radius*Math.cos(angle);
                        var ny = cy + radius*Math.sin(angle);
                        var label = node.name.length > labelMaxLen ? node.name.slice(0,labelMaxLen-1)+"…" : node.name;
                        return (
                          <g key={"node-"+i} style={{cursor: node.entry ? "pointer" : "default"}}
                            onClick={function(){ if(node.entry && onOpenEntry) onOpenEntry(node.entry); }}>
                            <circle cx={nx} cy={ny} r={20}
                              fill={node.entry ? node.color+"22" : T.surfaceLight}
                              stroke={node.color}
                              strokeWidth="1.5"
                              strokeOpacity={node.entry ? 1 : 0.4}
                            />
                            <text x={nx} y={ny-2} textAnchor="middle" fontSize="13" dominantBaseline="middle"
                              opacity={node.entry ? 1 : 0.4}>
                              {node.sec ? node.sec.emoji : "❓"}
                            </text>
                            <text x={nx} y={ny+14} textAnchor="middle" fontSize="7.5"
                              fill={node.entry ? T.text : T.textMuted}
                              style={{fontFamily:"Inter,sans-serif"}}
                              opacity={node.entry ? 1 : 0.5}>
                              {label}
                            </text>
                          </g>
                        );
                      })}
                    </svg>
                    <div style={{ textAlign:"center", fontSize:9, color:T.textMuted, marginTop:2 }}>
                      {nodes.filter(function(n){return n.entry;}).length}/{nodes.length} fiches liées · tap pour ouvrir
                    </div>
                  </div>
                );
              })()}

              {/* Chips texte (gardés pour référence rapide) */}
              <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>
                {entry.relations.map(function(r, ri) {
                  var ro = WB_normRelation(r);
                  var rt = relTypes.find(function(x){return x.id===ro.type;})||relTypes[0]||WB_DEFAULT_RELATION_TYPES[6];
                  var linked = (allEntries||[]).find(function(e){ return e.name.toLowerCase()===ro.name.toLowerCase(); });
                  var linkedSec = linked ? (SECTIONS.find(function(s){return s.id===linked.section;})||SECTIONS[0]) : null;
                  return (
                    <span key={ri}
                      onClick={function(){ if(linked && onOpenEntry) onOpenEntry(linked); }}
                      style={{ display:"flex", alignItems:"center", gap:4, fontSize:12, padding:"5px 12px", borderRadius:20,
                        background: rt.color+"18",
                        color: rt.color,
                        border:"1px solid "+rt.color+"44",
                        cursor: linked ? "pointer" : "default",
                        opacity: linked ? 1 : 0.65,
                      }}>
                      <span style={{fontSize:14}}>{rt.emoji}</span>
                      <span style={{fontSize:10,opacity:0.8}}>{rt.label}</span>
                      <span style={{fontWeight:600}}>{linkedSec ? linkedSec.emoji+" " : "❓ "}{ro.name}</span>
                    </span>
                  );
                })}
              </div>
            </div>
          )}

          {/* Bouton "aller à la fiche source" depuis la galerie */}
          {onGoToEntry && (
            <button onClick={onGoToEntry} style={{ width:"100%", marginBottom:10, padding:"10px", borderRadius:12, fontSize:13, fontWeight:600, cursor:"pointer", background:"linear-gradient(135deg,"+T.accentViolet+"22,"+T.accentBlue+"18)", border:"1px solid "+T.accentViolet+"44", color:T.accentViolet }}>
              {sec.emoji} Voir la fiche {sec.label}
            </button>
          )}

          <div style={{ fontSize:10, color:T.textMuted, marginBottom:16 }}>Cree le {WB_fmtDate(entry.createdAt)}</div>

          {!confirmDel ? (
            <div style={{ display:"flex", gap:10 }}>
              <button onClick={function(){onEdit(entry);}} style={{ flex:1, padding:"11px", borderRadius:12, fontSize:13, fontWeight:600, cursor:"pointer", background:"linear-gradient(135deg,"+T.accent+"22,"+T.accentBlue+"18)", border:"1px solid "+T.accent+"44", color:T.accent }}>Modifier</button>
              <button onClick={function(){setConfirmDel(true);}} style={{ padding:"11px 18px", borderRadius:12, fontSize:13, cursor:"pointer", background:"none", border:"1px solid "+T.danger+"44", color:T.danger }}>🗑</button>
            </div>
          ) : (
            <div style={{ background:T.danger+"11", border:"1px solid "+T.danger+"44", borderRadius:12, padding:"14px", textAlign:"center" }}>
              <div style={{ fontSize:13, color:T.text, marginBottom:12 }}>Supprimer <strong>{entry.name}</strong> ? Cette action est irreversible.</div>
              <div style={{ display:"flex", gap:8 }}>
                <button onClick={function(){setConfirmDel(false);}} style={{ flex:1, padding:"9px", borderRadius:10, background:"none", border:"1px solid "+T.border, color:T.textMuted, cursor:"pointer", fontSize:13 }}>Annuler</button>
                <button onClick={function(){onDelete(entry.id);}} style={{ flex:1, padding:"9px", borderRadius:10, background:T.danger, border:"none", color:"#fff", cursor:"pointer", fontSize:13, fontWeight:700 }}>Supprimer</button>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function GoalModal({ goals, onClose, onSave }) {
  var T = useT();
  var [vals, setVals] = useState(function() {
    var init = {};
    SECTIONS.forEach(function(s) { init[s.id] = String((goals && goals[s.id]) || 5); });
    return init;
  });
  function handleSave() {
    var parsed = {};
    SECTIONS.forEach(function(s) { var n = parseInt(vals[s.id], 10); parsed[s.id] = (!isNaN(n) && n > 0) ? n : 5; });
    onSave(parsed);
  }
  var inp = { width:56, padding:"6px 8px", borderRadius:8, fontSize:13, color:T.text, background:T.inputBg, border:"1px solid "+T.borderLight, outline:"none", textAlign:"center", fontFamily:"Inter,sans-serif" };
  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.55)", zIndex:250, display:"flex", alignItems:"flex-end", justifyContent:"center" }} onClick={function(e){if(e.target===e.currentTarget)onClose();}}>
      <div style={{ background:T.modalBg, borderRadius:"24px 24px 0 0", width:"100%", maxWidth:540, maxHeight:"80vh", overflowY:"auto", padding:"20px 20px 40px" }}>
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:6 }}>
          <div style={{ fontSize:16, fontWeight:700, color:T.text, fontFamily:"Playfair Display,serif" }}>Objectifs par section</div>
          <button onClick={onClose} style={{ background:"none", border:"none", fontSize:20, cursor:"pointer", color:T.textMuted }}>✕</button>
        </div>
        <div style={{ fontSize:12, color:T.textMuted, marginBottom:16, lineHeight:1.5 }}>Fixe le nombre de fiches cible. Le % s'ajuste si tu changes l'objectif.</div>
        <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
          {SECTIONS.map(function(s) {
            var sid = s.id;
            return (
              <div key={sid} style={{ display:"flex", alignItems:"center", justifyContent:"space-between", background:T.surface, border:"1px solid "+T.border, borderRadius:12, padding:"10px 14px" }}>
                <span style={{ fontSize:13, fontWeight:600, color:T.text }}>{s.emoji} {s.label}</span>
                <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                  <button onClick={function(){setVals(function(v){var n=Math.max(1,parseInt(v[sid],10)-1); return Object.assign({},v,{[sid]:String(n)});});}} style={{ width:28,height:28,borderRadius:8,border:"1px solid "+T.border,background:T.surfaceLight,color:T.text,cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center" }}>-</button>
                  <input style={inp} type="number" min="1" value={vals[sid]} onChange={function(e){var v=e.target.value; setVals(function(prev){return Object.assign({},prev,{[sid]:v});});}}/>
                  <button onClick={function(){setVals(function(v){var n=parseInt(v[sid],10)+1; return Object.assign({},v,{[sid]:String(n)});});}} style={{ width:28,height:28,borderRadius:8,border:"1px solid "+T.border,background:T.surfaceLight,color:T.text,cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center" }}>+</button>
                </div>
              </div>
            );
          })}
        </div>
        <button onClick={handleSave} style={{ marginTop:20, width:"100%", padding:"13px", borderRadius:14, fontSize:14, fontWeight:700, background:"linear-gradient(135deg,"+T.accent+","+T.accentBlue+")", border:"none", color:"#fff", cursor:"pointer" }}>
          Enregistrer les objectifs
        </button>
      </div>
    </div>
  );
}
