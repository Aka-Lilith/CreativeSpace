// ════════════════════════════════════════════════════════════════
// DASHBOARD WIDGET — résumé HomeScreen
// ════════════════════════════════════════════════════════════════
function DashboardWidget(props) {
  const onOpen = props.onOpen;
  const [summary, setSummary] = React.useState(null);

  React.useEffect(function() {
    async function load() {
      try {
        // --- Tracker ---
        var trackerRaw  = await storage.get(STORAGE_KEY);
        var projectsRaw = await storage.get(PROJECTS_KEY);
        var decayRaw    = await storage.get(DECAY_KEY);
        var timerRaw    = await storage.get(TIMER_KEY);

        // --- DIY ---
        var diyRaw = await storage.get(_DIY_KEY_REF);

        // --- Worldbuilding ---
        var wbRaw = await storage.get(_WB_KEY_REF);

        // ---- Calculs Tracker ----
        var skills  = (trackerRaw && trackerRaw.skills)  || [];
        var history = (trackerRaw && trackerRaw.history) || [];
        var projects = projectsRaw || [];

        // Niveau global = moyenne des niveaux des compétences
        var totalXp    = skills.reduce(function(s, sk) { return s + (sk.xp || 0); }, 0);
        var globalLevel = skills.length > 0 ? Math.floor(totalXp / skills.length / XP_PER_LEVEL) + 1 : 1;
        var globalXp    = skills.length > 0 ? Math.round(totalXp / skills.length) % XP_PER_LEVEL : 0;

        // Streak — jours consécutifs avec activité
        var streak = 0;
        if (history.length > 0) {
          var today = new Date(); today.setHours(0,0,0,0);
          var check = new Date(today);
          var dateSet = new Set(history.map(function(h) {
            if (!h.date) return null;
            var p = h.date.split(" ")[0].split("/").map(Number);
            return new Date(p[2], p[1]-1, p[0]).toDateString();
          }).filter(Boolean));
          // Remonter jour par jour
          while (dateSet.has(check.toDateString())) {
            streak++;
            check.setDate(check.getDate() - 1);
          }
          // Si pas d'activité aujourd'hui, vérifier hier
          if (streak === 0) {
            check = new Date(today);
            check.setDate(check.getDate() - 1);
            while (dateSet.has(check.toDateString())) {
              streak++;
              check.setDate(check.getDate() - 1);
            }
          }
        }

        // Dernier dessin — jours écoulés
        var daysSinceLast = null;
        if (decayRaw && decayRaw.lastActivityDate) {
          var p = decayRaw.lastActivityDate.split("/").map(Number);
          var last = new Date(p[2], p[1]-1, p[0]);
          var now = new Date(); now.setHours(0,0,0,0);
          daysSinceLast = Math.floor((now - last) / 86400000);
        } else if (history.length > 0 && history[0].date) {
          var p2 = history[0].date.split(" ")[0].split("/").map(Number);
          var last2 = new Date(p2[2], p2[1]-1, p2[0]);
          var now2 = new Date(); now2.setHours(0,0,0,0);
          daysSinceLast = Math.floor((now2 - last2) / 86400000);
        }

        // Heures totales timer
        var totalHours = timerRaw ? Math.floor((timerRaw.totalSeconds || 0) / 3600) : 0;

        // Projet actif en cours dans le Tracker
        var activeProject = projects.find(function(p) { return p.status === "actif"; }) || null;

        // Badge le plus proche (non gagné avec le plus d'XP)
        var completionCount = trackerRaw && trackerRaw.completionCount ? trackerRaw.completionCount : {};
        var challenges = { dtiys:[], thirty:[] };
        var timerData = timerRaw || { totalSeconds:0, sessions:[] };
        var closestBadge = null;
        var closestProgress = 0;
        BADGES.forEach(function(b) {
          try {
            var earned = b.check(history, completionCount, skills, [], timerData, projects, challenges);
            if (!earned) {
              // Estimer progression (heuristique sur les badges numériques)
              var prog = 0;
              if (history.length > 0 && b.check) {
                // Essayer de déduire le seuil depuis le label
                var m = b.label.match(/(\d+)/);
                if (m) {
                  var threshold = parseInt(m[1]);
                  var current = history.length;
                  prog = Math.min(99, Math.round(current / threshold * 100));
                }
              }
              if (prog > closestProgress) {
                closestProgress = prog;
                closestBadge = b;
              }
            }
          } catch(e) {}
        });

        // ---- Calculs DIY ----
        var diyProjects = diyRaw ? (diyRaw.projects || []) : [];
        var diyActive = diyProjects.filter(function(p) { return p.status === "inprogress"; });
        var diyDone   = diyProjects.filter(function(p) { return p.status === "done"; }).length;

        // ---- Calculs WB ----
        var wbEntries  = wbRaw ? (wbRaw.entries  || []) : [];
        var wbName     = wbRaw ? (wbRaw.worldName || "Mon Univers") : "Mon Univers";
        // Calcul simplifié de la complétion WB (sans dépendre de SECTIONS)
        var wbCompletion = 0;
        if (wbRaw && wbRaw.goals && wbEntries.length > 0) {
          var sectionIds = ["personnages","lieux","creatures","factions","lore","timeline"];
          var total = 0; var count = 0;
          sectionIds.forEach(function(sid) {
            var goal = wbRaw.goals[sid] || 5;
            var cnt = wbEntries.filter(function(e) { return e.section === sid; }).length;
            total += 100; count += Math.min(100, Math.round(cnt/goal*100));
          });
          wbCompletion = total > 0 ? Math.round(count/total*100) : 0;
        }

        setSummary({
          // Tracker
          globalLevel, globalXp, streak, daysSinceLast, totalHours,
          activeProject, closestBadge, closestProgress,
          trackerHasData: skills.length > 0,
          // DIY
          diyActive, diyDone, diyTotal: diyProjects.length,
          // WB
          wbEntries: wbEntries.length, wbName, wbCompletion,
        });
      } catch(e) {
        setSummary({});
      }
    }
    load();
  }, []);

  if (!summary) return null;
  if (!summary.trackerHasData && summary.diyTotal === 0 && summary.wbEntries === 0) return null;

  var HL = THEMES.light;

  // Statut XP
  var xpStatus = "safe";
  if (summary.daysSinceLast !== null) {
    if (summary.daysSinceLast > DECAY_GRACE_DAYS) xpStatus = "decay";
    else if (summary.daysSinceLast >= 4) xpStatus = "warning";
  }

  var xpColors = { safe: "#1D9E75", warning: "#BA7517", decay: "#D4537E" };
  var xpIcons  = { safe: "🌱", warning: "⚠️", decay: "📉" };
  var xpLabels = {
    safe:    summary.daysSinceLast === 0 ? "XP protégés ✓" : "XP protégés encore " + Math.max(0, DECAY_GRACE_DAYS - (summary.daysSinceLast||0)) + "j",
    warning: "Déclin dans " + Math.max(0, DECAY_GRACE_DAYS - (summary.daysSinceLast||0)) + "j",
    decay:   "XP en déclin",
  };

  return (
    <div style={{width:"100%",maxWidth:440,zIndex:1,animation:"fadeUp 0.6s ease 0.05s both"}}>
      {/* Titre widget */}
      <div style={{fontSize:11,color:"#9080B0",fontWeight:600,letterSpacing:1,textTransform:"uppercase",marginBottom:10,paddingLeft:2}}>
        ✦ Résumé du jour
      </div>

      <div style={{display:"flex",flexDirection:"column",gap:8}}>

        {/* Ligne 1 — Streak + Niveau + Heures */}
        {summary.trackerHasData && (
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
            {/* Streak */}
            <div onClick={function(){onOpen("tracker");}} style={{background:"rgba(255,255,255,0.75)",backdropFilter:"blur(12px)",border:"1px solid rgba(160,130,210,0.2)",borderRadius:16,padding:"10px 8px",textAlign:"center",cursor:"pointer",transition:"transform 0.2s",boxShadow:"0 2px 12px rgba(100,70,180,0.06)"}}>
              <div style={{fontSize:20,marginBottom:2}}>{summary.streak >= 7 ? "🔥" : summary.streak >= 3 ? "✨" : "🌙"}</div>
              <div style={{fontSize:17,fontWeight:700,color:"#2D2440",lineHeight:1}}>{summary.streak}</div>
              <div style={{fontSize:9,color:"#9080B0",marginTop:2}}>jour{summary.streak > 1 ? "s" : ""} streak</div>
            </div>

            {/* Niveau global */}
            <div onClick={function(){onOpen("tracker");}} style={{background:"rgba(255,255,255,0.75)",backdropFilter:"blur(12px)",border:"1px solid rgba(160,130,210,0.2)",borderRadius:16,padding:"10px 8px",textAlign:"center",cursor:"pointer",transition:"transform 0.2s",boxShadow:"0 2px 12px rgba(100,70,180,0.06)"}}>
              <div style={{fontSize:20,marginBottom:2}}>⭐</div>
              <div style={{fontSize:17,fontWeight:700,color:"#2D2440",lineHeight:1}}>Niv. {summary.globalLevel}</div>
              <div style={{fontSize:9,color:"#9080B0",marginTop:2}}>{summary.globalXp}/{XP_PER_LEVEL} XP moy.</div>
            </div>

            {/* Heures */}
            <div onClick={function(){onOpen("tracker");}} style={{background:"rgba(255,255,255,0.75)",backdropFilter:"blur(12px)",border:"1px solid rgba(160,130,210,0.2)",borderRadius:16,padding:"10px 8px",textAlign:"center",cursor:"pointer",transition:"transform 0.2s",boxShadow:"0 2px 12px rgba(100,70,180,0.06)"}}>
              <div style={{fontSize:20,marginBottom:2}}>⏱</div>
              <div style={{fontSize:17,fontWeight:700,color:"#2D2440",lineHeight:1}}>{summary.totalHours}h</div>
              <div style={{fontSize:9,color:"#9080B0",marginTop:2}}>dessinées</div>
            </div>
          </div>
        )}

        {/* Ligne 2 — Statut XP + badge proche */}
        {summary.trackerHasData && summary.daysSinceLast !== null && (
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            {/* Statut XP */}
            <div style={{background:"rgba(255,255,255,0.75)",backdropFilter:"blur(12px)",border:"1px solid "+xpColors[xpStatus]+"33",borderRadius:16,padding:"10px 12px",boxShadow:"0 2px 12px rgba(100,70,180,0.06)"}}>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <span style={{fontSize:16}}>{xpIcons[xpStatus]}</span>
                <div>
                  <div style={{fontSize:11,fontWeight:600,color:xpColors[xpStatus],lineHeight:1.2}}>{xpLabels[xpStatus]}</div>
                  {summary.daysSinceLast > 0 && (
                    <div style={{fontSize:9,color:"#9080B0",marginTop:2}}>
                      Dernier dessin il y a {summary.daysSinceLast}j
                    </div>
                  )}
                </div>
              </div>
            </div>

            {/* Badge proche */}
            {summary.closestBadge && (
              <div onClick={function(){onOpen("tracker");}} style={{background:"rgba(255,255,255,0.75)",backdropFilter:"blur(12px)",border:"1px solid rgba(160,130,210,0.2)",borderRadius:16,padding:"10px 12px",cursor:"pointer",boxShadow:"0 2px 12px rgba(100,70,180,0.06)"}}>
                <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:5}}>
                  <span style={{fontSize:14}}>{summary.closestBadge.emoji}</span>
                  <div style={{fontSize:10,fontWeight:600,color:"#2D2440",lineHeight:1.2,flex:1}}>{summary.closestBadge.label}</div>
                </div>
                <div style={{height:3,background:"rgba(160,130,210,0.15)",borderRadius:99}}>
                  <div style={{height:"100%",width:summary.closestProgress+"%",background:"linear-gradient(90deg,#A78BFA,#7F77DD)",borderRadius:99,transition:"width 0.4s"}}/>
                </div>
                <div style={{fontSize:9,color:"#9080B0",marginTop:3}}>{summary.closestProgress}% — prochain badge</div>
              </div>
            )}
          </div>
        )}

        {/* Ligne 3 — Projet Tracker actif */}
        {summary.activeProject && (
          <div onClick={function(){onOpen("tracker");}} style={{background:"rgba(255,255,255,0.75)",backdropFilter:"blur(12px)",border:"1px solid rgba(127,119,221,0.25)",borderRadius:16,padding:"10px 14px",cursor:"pointer",display:"flex",alignItems:"center",gap:10,boxShadow:"0 2px 12px rgba(100,70,180,0.06)"}}>
            <span style={{fontSize:18,flexShrink:0}}>🗂</span>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:11,color:"#7F77DD",fontWeight:600,marginBottom:1}}>Projet en cours — Tracker</div>
              <div style={{fontSize:12,fontWeight:600,color:"#2D2440",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{summary.activeProject.name}</div>
              {summary.activeProject.steps && summary.activeProject.steps.length > 0 && (function() {
                var done = summary.activeProject.steps.filter(function(s){return s.done;}).length;
                var total = summary.activeProject.steps.length;
                var pct = Math.round(done/total*100);
                return (
                  <div style={{marginTop:4}}>
                    <div style={{height:3,background:"rgba(127,119,221,0.15)",borderRadius:99}}>
                      <div style={{height:"100%",width:pct+"%",background:"#7F77DD",borderRadius:99}}/>
                    </div>
                    <div style={{fontSize:9,color:"#9080B0",marginTop:2}}>{done}/{total} étapes · {pct}%</div>
                  </div>
                );
              })()}
            </div>
            <span style={{fontSize:14,color:"#7F77DD",opacity:0.6}}>›</span>
          </div>
        )}

        {/* Ligne 4 — DIY + WB côte à côte */}
        {(summary.diyTotal > 0 || summary.wbEntries > 0) && (
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            {/* DIY */}
            {summary.diyTotal > 0 && (
              <div onClick={function(){onOpen("diy");}} style={{background:"rgba(255,255,255,0.75)",backdropFilter:"blur(12px)",border:"1px solid rgba(186,117,23,0.2)",borderRadius:16,padding:"10px 12px",cursor:"pointer",boxShadow:"0 2px 12px rgba(100,70,180,0.06)"}}>
                <div style={{fontSize:16,marginBottom:4}}>🔧</div>
                <div style={{fontSize:11,fontWeight:600,color:"#2D2440",marginBottom:2}}>DIY Projects</div>
                <div style={{fontSize:10,color:"#9080B0"}}>{summary.diyActive.length} en cours</div>
                <div style={{fontSize:10,color:"#1D9E75"}}>{summary.diyDone} terminés ✓</div>
              </div>
            )}

            {/* Worldbuilding */}
            {summary.wbEntries > 0 && (

// Calcule XP enrichi : difficulté + heures réelles + matériel
function calcProjectXPFull(status, difficulty, realHours, materialCost) {
  if (status === "wishlist") return 0;
  var base = status === "done" ? 50 : 10;
  var diffMult = DIFF_XP_MULT[difficulty] || 1;
  var hourBonus = 0;
  if (status === "done" && realHours && Number(realHours) > 0) {
    // +1 XP/h flat, cap 150h
    hourBonus = Math.min(Math.round(Number(realHours)), 150);
  }
  var matOpt = MATERIAL_COST_OPTS.find(function(o){return o.value===materialCost;});
  var matBonus = (status === "done" && matOpt) ? (matOpt.bonus||0) : 0;
  return Math.round(base * diffMult) + hourBonus + matBonus;
}
const DIY_XP_PER_LEVEL = 100;

// Calcule l'XP d'un projet selon son statut ET sa difficulté
function calcProjectXP(status, difficulty) {
  var base = XP_STATUS[status] || 0;
  var mult = DIFF_XP_MULT[difficulty] || 1;
  return Math.round(base * mult);
}

          <line x1="8" y1={H-12} x2="8"  y2={H-24} stroke={accent} strokeWidth="1.5" opacity="0.6"/>
          <line x1={W-8} y1={H-12} x2={W-20} y2={H-12} stroke={accent} strokeWidth="1.5" opacity="0.6"/>
          <line x1={W-8} y1={H-12} x2={W-8}  y2={H-24} stroke={accent} strokeWidth="1.5" opacity="0.6"/>
        </React.Fragment>
      );
    }
    // tier 3+ : petits losanges latéraux
    if (tier >= 3) {
      items.push(
        <React.Fragment key="diamonds">
          {[20, 35, 50, 65, 80].map(function(y) {
            return <React.Fragment key={y}>
              <polygon points={"4," + y + " 8," + (y-4) + " 12," + y + " 8," + (y+4)} fill={accent} opacity="0.35"/>
              <polygon points={(W-4) + "," + y + " " + (W-8) + "," + (y-4) + " " + (W-12) + "," + y + " " + (W-8) + "," + (y+4)} fill={accent} opacity="0.35"/>
            </React.Fragment>;
          })}
        </React.Fragment>
      );
    }
    // tier 4+ : bordure ornementale complète + étoiles
    if (tier >= 4) {
      items.push(
        <React.Fragment key="border">
          <rect x="4" y="4" width={W-8} height={H-8} rx="8" fill="none" stroke={accent} strokeWidth="1" opacity="0.4" strokeDasharray="4,3"/>
          <polygon points={"" + (W/2) + ",8 " + (W/2+4) + ",14 " + (W/2+10) + ",14 " + (W/2+5) + ",18 " + (W/2+7) + ",24 " + (W/2) + ",20 " + (W/2-7) + ",24 " + (W/2-5) + ",18 " + (W/2-10) + ",14 " + (W/2-4) + ",14"} fill={accent} opacity="0.5"/>
          <polygon points={"" + (W/2) + "," + (H-8) + " " + (W/2+4) + "," + (H-14) + " " + (W/2+10) + "," + (H-14) + " " + (W/2+5) + "," + (H-18) + " " + (W/2+7) + "," + (H-24) + " " + (W/2) + "," + (H-20) + " " + (W/2-7) + "," + (H-24) + " " + (W/2-5) + "," + (H-18) + " " + (W/2-10) + "," + (H-14) + " " + (W/2-4) + "," + (H-14)} fill={accent} opacity="0.5"/>
        </React.Fragment>
      );
    }
    // tier 5 : filigrane central + halo
    if (tier >= 5) {
      items.push(
        <React.Fragment key="legendary">
          <circle cx={W/2} cy={H/2} r="38" fill="none" stroke={accent} strokeWidth="0.5" opacity="0.15"/>
          <circle cx={W/2} cy={H/2} r="44" fill="none" stroke={violet} strokeWidth="0.5" opacity="0.10"/>
          {[0,60,120,180,240,300].map(function(deg) {
            var rad = deg * Math.PI / 180;
            var x = W/2 + 38 * Math.cos(rad), y = H/2 + 38 * Math.sin(rad);
            return <circle key={deg} cx={x} cy={y} r="2" fill={accent} opacity="0.5"/>;
          })}
        </React.Fragment>
      );
    }
    return items;
  }

  return (
    <svg viewBox={"0 0 " + W + " " + H} style={{ width: "100%", display: "block", borderRadius: 14 }}>
      <defs>
        <linearGradient id="bannerBg" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stopColor={bg1}/>
          <stop offset="100%" stopColor={bg2}/>
        </linearGradient>
        <linearGradient id="bannerBar" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stopColor={accent}/>
          <stop offset="100%" stopColor={violet}/>
        </linearGradient>
        <clipPath id="barClip">
          <rect x="16" y={H-18} width={W-32} height="6" rx="3"/>
        </clipPath>
      </defs>

      {/* Fond */}
      <rect width={W} height={H} rx="14" fill="url(#bannerBg)"/>

      {/* Décorations */}
      {renderDeco()}

      {/* Niveau — centré verticalement dans H=90, barre en bas à y=76 */}
      <text x="24" y="30" fontSize="10" fontWeight="600" fill={mutedC} fontFamily="Inter,sans-serif" letterSpacing="1">NIVEAU</text>
      <text x="24" y="62" fontSize="30" fontWeight="700" fill={accent} fontFamily="Playfair Display,serif" dominantBaseline="auto">{String(level).padStart(2, "0")}</text>

      {/* Séparateur */}
      <line x1="70" y1="18" x2="70" y2="70" stroke={accent} strokeWidth="1" opacity="0.3"/>

      {/* Titre + XP — centrés verticalement */}
      <text x="82" y="38" fontSize="13" fontWeight="600" fill={textC} fontFamily="Playfair Display,serif" opacity="0.8">
        {tier >= 3 ? "✦ " : ""}{title}{tier >= 3 ? " ✦" : ""}
      </text>

      {/* Prochain niveau */}
      <text x="82" y="58" fontSize="10" fill={mutedC} fontFamily="Inter,sans-serif">
        {xpIn} / {xpTotal} XP vers le niveau {level + 1}
      </text>

      {/* Barre XP */}
      <rect x="16" y={H-18} width={W-32} height="6" rx="3" fill={bg1} opacity="0.5"/>
      <rect x="16" y={H-18} width={barW} height="6" rx="3" fill="url(#bannerBar)"/>

      {/* Petite étoile sur la barre */}
      {barW > 8 && (
        <circle cx={16 + barW} cy={H-15} r="3.5" fill={accent} opacity="0.9"/>
      )}
    </svg>
  );
}

// --- HELPERS ---
function levelFromXP(xp) { return Math.floor(xp / DIY_XP_PER_LEVEL) + 1; }
function xpInLevel(xp)   { return xp % DIY_XP_PER_LEVEL; }
function todayStr() {
  var d = new Date();
  return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
}
function DIY_fmtDate(str) {
  if (!str) return "";
  var p = str.split("-");
  if (p.length < 3) return str;
  return p[2] + "/" + p[1] + "/" + p[0];
}
function hobbyColor(hobby, hobbies) {
  var idx = hobbies.findIndex(function(h) { return h.id === hobby; });
  return HOBBY_COLORS[idx % HOBBY_COLORS.length] || HOBBY_COLORS[0];
}

function DIY_CustomSelect({
value, onChange, options, placeholder, style }) {
  const [open, setOpen] = useState(false);

    return function() { document.removeEventListener("mousedown", h); };

  var selected = options.find(function(o) { return o.value === value; });
  var label = selected ? selected.label : (placeholder || "Choisir...");
  return (
    <div ref={ref} style={Object.assign({ position: "relative" }, style)}>
      <button onClick={function() { setOpen(function(v) { return !v; }); }} style={{

function DIY_BadgeGrid({

// --- RADAR CHART ---
function RadarChart({
data }) {
  var hobbies = data.hobbies;
  var projects = data.projects;

  var hobbyStats = {};
  hobbies.forEach(function(h) { hobbyStats[h.id] = { done: 0, total: 0 }; });
  projects.forEach(function(p) {
    if (!hobbyStats[p.hobby]) hobbyStats[p.hobby] = { done: 0, total: 0 };
    hobbyStats[p.hobby].total++;
    if (p.status === "done") hobbyStats[p.hobby].done++;
  });

  var displayed = hobbies.filter(function(h) {
    return hobbyStats[h.id] && hobbyStats[h.id].total > 0;
  });

  if (displayed.length < 3) {
    return (
      <div style={{ textAlign: "center", color: T.textMuted, fontSize: 13, padding: "2rem 0" }}>
        Ajoute des projets dans au moins 3 hobbies différents pour voir le radar.
      </div>
    );
  }

  var n = displayed.length;
  var cx = 130, cy = 130, r = 90;
  var maxVal = Math.max.apply(null, displayed.map(function(h) {
    return hobbyStats[h.id].total;
  }).concat([1]));

  function angle(i) { return (i / n) * 2 * Math.PI - Math.PI / 2; }
  function pt(i, ratio) {
    return [cx + ratio * r * Math.cos(angle(i)), cy + ratio * r * Math.sin(angle(i))];
  }
  function gridRing(ratio) {
    return displayed.map(function(_, i) { var p = pt(i, ratio); return p[0] + "," + p[1]; }).join(" ");
  }

  var levels = [0.25, 0.5, 0.75, 1];
  var dataRatios = displayed.map(function(h) {
    return Math.max(0.05, hobbyStats[h.id].total / maxVal);
  });
  var dataPts = displayed.map(function(_, i) { var p = pt(i, dataRatios[i]); return p[0] + "," + p[1]; }).join(" ");

  return (
    <div>
      <svg viewBox="0 0 260 260" style={{ width: "100%", maxWidth: 260, margin: "0 auto", display: "block" }}>
        <defs>
          <linearGradient id="diyRadarFill" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stopColor={T.accent} stopOpacity="0.30"/>
            <stop offset="100%" stopColor={T.accentViolet} stopOpacity="0.18"/>
          </linearGradient>
        </defs>

        {levels.map(function(lvl, gi) {
          return (
            <polygon key={gi} points={gridRing(lvl)}
              fill={gi === 3 ? T.accent + "06" : "none"}
              stroke={T.border}
              strokeWidth={gi === 3 ? "1.5" : "1"}
              strokeDasharray={gi === 3 ? "none" : "3,3"}/>
          );
        })}

        {displayed.map(function(_, i) {
          var outer = pt(i, 1);
          return <line key={i} x1={cx} y1={cy} x2={outer[0]} y2={outer[1]} stroke={T.border} strokeWidth="1"/>;
        })}

        {displayed.map(function(_, i) {
          return levels.map(function(lvl, li) {
            var p = pt(i, lvl);
            return <circle key={i + "-" + li} cx={p[0]} cy={p[1]} r="2"
              fill={T.surfaceLight} stroke={T.border} strokeWidth="0.5"/>;
          });
        })}

        <polygon points={dataPts} fill="url(#diyRadarFill)"
          stroke={T.accent} strokeWidth="2" strokeLinejoin="round"/>

        {displayed.map(function(h, i) {
          var p = pt(i, dataRatios[i]);
          var outer = pt(i, 1.0);
          var color = hobbyColor(h.id, hobbies);
          return (
            <g key={i}>
              <circle cx={outer[0]} cy={outer[1]} r="9" fill={color} opacity="0.9"/>
              <text x={outer[0]} y={outer[1]} textAnchor="middle" dominantBaseline="middle"
                fontSize="9" fontWeight="700" fill="white">{i + 1}</text>
              <circle cx={p[0]} cy={p[1]} r="4.5" fill={color} stroke="white" strokeWidth="1.5" opacity="0.9"/>
            </g>
          );
        })}

        <circle cx={cx} cy={cy} r="3" fill={T.accent} opacity="0.5"/>
      </svg>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(2, 1fr)", gap: "3px 8px", marginTop: 10 }}>
        {displayed.map(function(h, i) {
          var s = hobbyStats[h.id];
          var color = hobbyColor(h.id, hobbies);
          return (
            <div key={h.id} style={{ display: "flex", alignItems: "center", gap: 5, minWidth: 0 }}>
              <div style={{
                width: 16, height: 16, borderRadius: "50%", background: color,
                display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0,
              }}>
                <span style={{ fontSize: 8, fontWeight: 700, color: "white" }}>{i + 1}</span>
              </div>
              <div style={{ minWidth: 0, overflow: "hidden" }}>
                <div style={{ fontSize: 10, fontWeight: 500, color: T.text, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                  {h.emoji} {h.label}
                </div>
                <div style={{ fontSize: 9, color: T.textMuted }}>{s.done}/{s.total} terminé{s.done > 1 ? "s" : ""}</div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// --- PROJECT DETAIL MODAL ---
function ProjectDetail({
project, hobbies, onClose, onUpdate, onDelete }) {
  var T = useDIYT();
  const [noteText, setNoteText] = useState("");
  const [confirmDelete, setConfirmDelete] = useState(false);
  const fileInputRef = useRef(null);
  const hobby = hobbies.find(function(h) { return h.id === project.hobby; }) || { emoji: "✦", label: project.hobby };

  var [photoUploading, setPhotoUploading] = useState(false);
  // Timer
  var [timerRunning, setTimerRunning] = useState(false);
  var [timerElapsed, setTimerElapsed] = useState(0);
  var timerStartRef = useRef(null);
  var timerIntervalRef = useRef(null);
  // Photos progression
  var [progUploading, setProgUploading] = useState(false);
  var [progCaption, setProgCaption] = useState("");
  const progInputRef = useRef(null);

  async function handlePhotoUpload(e) {
    var file = e.target.files && e.target.files[0];
    if (!file) return;
    setPhotoUploading(true);
    try {
      var formData = new FormData();
      formData.append("file", file);
      formData.append("upload_preset", "Studio");
      formData.append("cloud_name", "dt5wa6tqm");
      var res = await fetch("https://api.cloudinary.com/v1_1/dt5wa6tqm/image/upload", {
        method: "POST",
        body: formData,
      });
      var data = await res.json();
      if (data.secure_url) {
        onUpdate(Object.assign({}, project, { photo: data.secure_url }));
      }
    } catch(err) {
      alert("Erreur upload photo, réessaie.");
    }
    setPhotoUploading(false);
  }

  function removePhoto() {
    onUpdate(Object.assign({}, project, { photo: null }));
  }

  // --- Timer ---
  useEffect(function() {
    if (timerRunning) {
      timerStartRef.current = Date.now() - timerElapsed * 1000;
      timerIntervalRef.current = setInterval(function() {
        setTimerElapsed(Math.floor((Date.now() - timerStartRef.current) / 1000));
      }, 1000);
    } else {
      clearInterval(timerIntervalRef.current);
    }
    return function() { clearInterval(timerIntervalRef.current); };
  }, [timerRunning]);

  function stopAndSaveTimer() {
    if (timerElapsed < 60) { setTimerRunning(false); setTimerElapsed(0); return; }
    var mins = Math.round(timerElapsed / 60);
    var session = { id: Date.now(), date: todayStr(), minutes: mins };
    var sessions = [session].concat(project.timeSpent || []);
    onUpdate(Object.assign({}, project, { timeSpent: sessions }));
    setTimerRunning(false);
    setTimerElapsed(0);
  }

  function fmtTimer(secs) {
    var h = Math.floor(secs/3600);
    var m = Math.floor((secs%3600)/60);
    var s = secs % 60;
    return (h>0?h+"h ":"") + String(m).padStart(2,"0")+"m "+String(s).padStart(2,"0")+"s";
  }

  function totalTimeSpent() {
    return (project.timeSpent||[]).reduce(function(sum,s){ return sum+(s.minutes||0); }, 0);
  }

  // --- Photos progression ---
  async function handleProgPhotoUpload(e) {
    var file = e.target.files && e.target.files[0];
    if (!file) return;
    setProgUploading(true);
    try {
      var formData = new FormData();
      formData.append("file", file);
      formData.append("upload_preset", "Studio");
      formData.append("cloud_name", "dt5wa6tqm");
      var res = await fetch("https://api.cloudinary.com/v1_1/dt5wa6tqm/image/upload", { method:"POST", body:formData });
      var data = await res.json();
      if (data.secure_url) {
        var photo = { id: Date.now(), url: data.secure_url, date: todayStr(), caption: progCaption.trim() };
        var photos = [photo].concat(project.progressPhotos || []);
        onUpdate(Object.assign({}, project, { progressPhotos: photos }));
        setProgCaption("");
      }
    } catch(err) { alert("Erreur upload, réessaie."); }
    setProgUploading(false);
  }

  function removeProgPhoto(id) {
    onUpdate(Object.assign({}, project, { progressPhotos: (project.progressPhotos||[]).filter(function(p){return p.id!==id;}) }));
  }

  function addNote() {
    if (!noteText.trim()) return;
    var newNote = { id: Date.now(), date: todayStr(), text: noteText.trim() };
    onUpdate(Object.assign({}, project, { notes: [newNote].concat(project.notes || []) }));
    setNoteText("");
  }

  function deleteNote(nid) {
    onUpdate(Object.assign({}, project, {
      notes: (project.notes || []).filter(function(n) { return n.id !== nid; }),
    }));
  }

  var [showCompleteModal, setShowCompleteModal] = useState(false);

  function promote() {
    if (project.status === "wishlist") {
      onUpdate(Object.assign({}, project, {
        status: "inprogress",
        xp: calcProjectXPFull("inprogress", project.difficulty, project.estimatedHours, project.materialCost),
        startDate: project.startDate || todayStr(),
      }));
    } else {
      setShowCompleteModal(true);
    }
  }

  function confirmComplete(realHours, materialCost) {
    setShowCompleteModal(false);
    onUpdate(Object.assign({}, project, {
      status: "done",
      realHours: realHours ? Number(realHours) : project.estimatedHours,
      materialCost: materialCost || project.materialCost || null,
      xp: calcProjectXPFull("done", project.difficulty, realHours || project.estimatedHours, materialCost || project.materialCost),
      completedDate: todayStr(),
    }));
  }

  var sm = DIY_STATUS_META[project.status];
  var diff = project.difficulty;
  var dc = diff ? DIFF_COLORS[diff] : null;

  return (
    <div style={{
      position: "fixed", inset: 0, background: "rgba(0,0,0,0.55)", zIndex: 200,
      display: "flex", alignItems: "flex-end", justifyContent: "center",
    }}>
      <div style={{
        background: T.modalBg, borderRadius: "20px 20px 0 0",
        width: "100%", maxWidth: 480, maxHeight: "90vh", overflowY: "auto",
        padding: "20px 18px 32px", display: "flex", flexDirection: "column", gap: 16,
      }}>
        <style>{`.detail-input{width:100%;padding:9px 12px;border-radius:10px;font-size:13px;font-family:'Inter',sans-serif;outline:none;resize:none;box-sizing:border-box;}`}</style>

        {/* Header */}
        <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", gap: 10 }}>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 18, fontWeight: 700, color: T.text, lineHeight: 1.3 }}>
              {hobby.emoji} {project.name}
            </div>
            <div style={{ fontSize: 12, color: T.textMuted, marginTop: 4 }}>{hobby.label}</div>
          </div>
          <button onClick={onClose} style={{
            background: T.surfaceLight, border: "1px solid " + T.border,
            borderRadius: 8, width: 32, height: 32, cursor: "pointer",
            color: T.textMuted, fontSize: 16, flexShrink: 0,
            display: "flex", alignItems: "center", justifyContent: "center",
          }}>✕</button>
        </div>

        {/* Badges */}
        <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
          <span style={{ fontSize: 11, fontWeight: 600, padding: "3px 10px", borderRadius: 20, background: sm.bg, color: sm.color, border: "1px solid " + sm.color + "44" }}>{sm.label}</span>
          {diff && <span style={{ fontSize: 11, fontWeight: 600, padding: "3px 10px", borderRadius: 20, background: dc.bg, color: dc.text, border: "1px solid " + dc.border }}>{diff}</span>}
          <span style={{ fontSize: 11, fontWeight: 600, padding: "3px 10px", borderRadius: 20, background: T.xpTrack, color: T.accent, border: "1px solid " + T.accent + "44" }}>✦ {project.xp} XP</span>
        </div>

        {/* Dates */}
        <div style={{ display: "grid", gridTemplateColumns: project.status === "done" ? "1fr 1fr 1fr" : "1fr 1fr", gap: 8 }}>
          <div style={{ background: T.surfaceLight, borderRadius: 10, padding: "10px 12px", border: "1px solid " + T.border }}>
            <div style={{ fontSize: 11, color: T.textMuted, marginBottom: 3 }}>Démarré le</div>
            <div style={{ fontSize: 13, color: T.text, fontWeight: 500 }}>{project.startDate ? DIY_fmtDate(project.startDate) : "—"}</div>
          </div>
          <div style={{ background: T.surfaceLight, borderRadius: 10, padding: "10px 12px", border: "1px solid " + T.border }}>
            <div style={{ fontSize: 11, color: T.textMuted, marginBottom: 3 }}>Date limite</div>
            <div style={{ fontSize: 13, color: project.deadline ? T.accentViolet : T.textMuted, fontWeight: 500 }}>
              {project.deadline ? DIY_fmtDate(project.deadline) : "Aucune"}
            </div>
          </div>
          {project.status === "done" && (
            <div style={{ background: T.cardDone, borderRadius: 10, padding: "10px 12px", border: "1px solid " + T.cardDoneBorder }}>
              <div style={{ fontSize: 11, color: T.accentGreen, marginBottom: 3, fontWeight: 500 }}>Terminé le</div>
              <div style={{ fontSize: 13, color: T.text, fontWeight: 500 }}>{project.completedDate ? DIY_fmtDate(project.completedDate) : "—"}</div>
            </div>
          )}
        </div>

        {/* XP bar */}
        <div>
          <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}>
            <span style={{ fontSize: 12, color: T.textMuted }}>Progression</span>
            <span style={{ fontSize: 12, color: T.accent, fontWeight: 600 }}>{project.xp} / {XP_DONE_MAX[project.difficulty||""] } XP</span>
          </div>
          <DIY_XpBar current={project.xp} total={XP_DONE_MAX[project.difficulty||""]}/>
        </div>

        {showCompleteModal && <DIY_CompleteModal
          estimatedHours={project.estimatedHours}
          materialCost={project.materialCost}
          difficulty={project.difficulty}
          onConfirm={confirmComplete}
          onCancel={function(){setShowCompleteModal(false);}}
        />}

        {project.status !== "done" && (
          <button onClick={promote} style={{
            background: "linear-gradient(135deg," + T.accent + "CC," + T.accentViolet + "99)",
            border: "none", borderRadius: 12, padding: "11px 16px",
            fontSize: 13, fontWeight: 600, color: T.bg, cursor: "pointer", width: "100%",
          }}>
            {project.status === "wishlist" ? "▶ Démarrer ce projet" : "✓ Marquer comme terminé"}

        {/* Photo */}
        {project.status === "done" && (
          <div>
            <div style={{ fontSize: 13, fontWeight: 600, color: T.textSub, marginBottom: 10 }}>Photo du résultat</div>
            {project.photo ? (
              <div style={{ position: "relative", borderRadius: 12, overflow: "hidden", border: "1px solid " + T.cardDoneBorder }}>
                <img src={project.photo} alt="résultat" style={{ width: "100%", display: "block", maxHeight: 260, objectFit: "cover" }}/>
                <button onClick={removePhoto} style={{
                  position: "absolute", top: 8, right: 8, background: "rgba(0,0,0,0.55)",
                  border: "none", borderRadius: "50%", width: 28, height: 28,
                  cursor: "pointer", color: "#fff", fontSize: 13,
                  display: "flex", alignItems: "center", justifyContent: "center",
                }}>✕</button>
              </div>
            ) : (
              <button onClick={function() { if (!photoUploading) fileInputRef.current && fileInputRef.current.click(); }} style={{
                width: "100%", padding: "20px", borderRadius: 12,
                border: "1px dashed " + T.accentGreen + "66",
                background: T.cardDone, cursor: photoUploading ? "wait" : "pointer",
                display: "flex", flexDirection: "column", alignItems: "center", gap: 6,
                opacity: photoUploading ? 0.7 : 1,
              }}>
                <span style={{ fontSize: 24 }}>{photoUploading ? "⏳" : "📷"}</span>
                <span style={{ fontSize: 12, color: T.accentGreen, fontWeight: 600 }}>{photoUploading ? "Upload en cours..." : "Ajouter une photo"}</span>
                {!photoUploading && <span style={{ fontSize: 11, color: T.textMuted }}>JPG, PNG · depuis ta galerie</span>}
              </button>
            )}
            <input ref={fileInputRef} type="file" accept="image/*" style={{ display: "none" }} onChange={handlePhotoUpload}/>
          </div>
        )}

        {/* Annuler complétion */}
        {project.status === "done" && (
          <button onClick={function(){
            onUpdate(Object.assign({}, project, {
              status: "inprogress",
              xp: calcProjectXPFull("inprogress", project.difficulty, project.estimatedHours, project.materialCost),
              completedDate: null,
              realHours: null,
            }));
          }} style={{
            width: "100%", padding: "10px", borderRadius: 12, marginBottom: 8,
            border: "1px solid " + T.border, background: "transparent",
            color: T.textMuted, cursor: "pointer", fontSize: 12, fontWeight: 500,
          }}>
            ↩ Annuler la complétion
          </button>
        )}

        {/* Tags */}
        {((project.tags || []).length > 0) && (
          <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
            {(project.tags || []).map(function(t) {
              return <span key={t} style={{ fontSize: 11, padding: "3px 10px", borderRadius: 20, background: T.accentViolet + "18", color: T.accentViolet, border: "1px solid " + T.accentViolet + "44" }}>#{t}</span>;
            })}
          </div>
        )}

        {/* Timer de travail */}
        <div style={{ background: T.surfaceLight, borderRadius: 14, padding: "12px 14px", border: "1px solid " + T.border }}>
          <div style={{ fontSize: 13, fontWeight: 600, color: T.textSub, marginBottom: 10, display:"flex", alignItems:"center", justifyContent:"space-between" }}>
            <span>⏱ Temps de travail</span>
            {totalTimeSpent() > 0 && <span style={{ fontSize:11, color:T.accent, fontWeight:700 }}>{Math.floor(totalTimeSpent()/60)}h {totalTimeSpent()%60}min total</span>}
          </div>
          {project.estimatedHours > 0 && (
            <div style={{ marginBottom:8 }}>
              <div style={{ display:"flex", justifyContent:"space-between", fontSize:10, color:T.textMuted, marginBottom:3 }}>
                <span>Progression</span>
                <span>{Math.round(Math.min(totalTimeSpent()/60/project.estimatedHours*100,100))}%</span>
              </div>
              <div style={{ height:4, background:T.xpTrack, borderRadius:99, overflow:"hidden" }}>
                <div style={{ height:"100%", width:Math.min(totalTimeSpent()/60/project.estimatedHours*100,100)+"%", background:T.accent, borderRadius:99, transition:"width 0.3s" }}/>
              </div>
              <div style={{ fontSize:10, color:T.textMuted, marginTop:2 }}>{Math.round(totalTimeSpent()/60*10)/10}h / {project.estimatedHours}h estimées</div>
            </div>
          )}
          <div style={{ display:"flex", alignItems:"center", gap:10 }}>
            <div style={{ fontSize: 22, fontWeight: 700, color: timerRunning ? T.accent : T.text, flex:1, fontVariantNumeric:"tabular-nums", letterSpacing:1 }}>
              {fmtTimer(timerElapsed)}
            </div>
            {!timerRunning ? (
              <button onClick={function(){setTimerRunning(true);}} style={{ padding:"8px 16px", borderRadius:10, background:T.accent, border:"none", color:"#fff", fontSize:12, fontWeight:600, cursor:"pointer" }}>▶ Démarrer</button>
            ) : (
              <button onClick={stopAndSaveTimer} style={{ padding:"8px 16px", borderRadius:10, background:T.accentViolet, border:"none", color:"#fff", fontSize:12, fontWeight:600, cursor:"pointer" }}>⏹ Arrêter & Sauver</button>
            )}
          </div>
          {(project.timeSpent||[]).length > 0 && (
            <div style={{ marginTop:10, display:"flex", flexDirection:"column", gap:4 }}>
              <div style={{ fontSize:10, color:T.textMuted, fontWeight:600, letterSpacing:0.5 }}>SESSIONS</div>
              {(project.timeSpent||[]).slice(0,5).map(function(s) {
                return (
                  <div key={s.id} style={{ display:"flex", justifyContent:"space-between", fontSize:11, color:T.textSub }}>
                    <span>{DIY_fmtDate(s.date)}</span>
                    <span style={{ fontWeight:600, color:T.accent }}>{s.minutes >= 60 ? Math.floor(s.minutes/60)+"h "+s.minutes%60+"min" : s.minutes+"min"}</span>
                  </div>
                );
              })}
            </div>
          )}
        </div>

        {/* Photos de progression */}
        <div>
          <div style={{ fontSize: 13, fontWeight: 600, color: T.textSub, marginBottom: 10 }}>📷 Photos de progression</div>
          {/* Upload nouvelle photo */}
          <div style={{ display:"flex", gap:8, marginBottom:10 }}>
            <input value={progCaption} onChange={function(e){setProgCaption(e.target.value);}} placeholder="Légende (optionnel)..." style={{ flex:1, padding:"7px 10px", borderRadius:10, fontSize:12, border:"1px solid "+T.border, background:T.inputBg, color:T.text }}/>
            <button onClick={function(){if(!progUploading) progInputRef.current&&progInputRef.current.click();}} style={{ padding:"7px 14px", borderRadius:10, background:T.accentGreen+"18", border:"1px solid "+T.accentGreen+"44", color:T.accentGreen, fontSize:12, fontWeight:600, cursor:progUploading?"wait":"pointer", whiteSpace:"nowrap" }}>
              {progUploading ? "⏳" : "📷 Ajouter"}
            </button>
            <input ref={progInputRef} type="file" accept="image/*" style={{display:"none"}} onChange={handleProgPhotoUpload}/>
          </div>
          {/* Timeline photos */}
          {(project.progressPhotos||[]).length > 0 && (
            <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
              {(project.progressPhotos||[]).map(function(ph) {
                return (
                  <div key={ph.id} style={{ borderRadius:12, overflow:"hidden", border:"1px solid "+T.border, position:"relative" }}>
                    <img src={ph.url} alt={ph.caption||""} style={{ width:"100%", maxHeight:220, objectFit:"cover", display:"block" }}/>
                    <div style={{ padding:"8px 12px", background:T.surfaceCard, display:"flex", alignItems:"center", justifyContent:"space-between", gap:8 }}>
                      <div>
                        <div style={{ fontSize:11, color:T.textMuted }}>{DIY_fmtDate(ph.date)}</div>
                        {ph.caption && <div style={{ fontSize:12, color:T.text, marginTop:2 }}>{ph.caption}</div>}
                      </div>
                      <button onClick={function(){removeProgPhoto(ph.id);}} style={{ border:"none", background:"none", cursor:"pointer", fontSize:14, color:T.textMuted, opacity:0.6, flexShrink:0 }}>🗑</button>
                    </div>
                  </div>
                );
              })}
            </div>
          )}
          {(project.progressPhotos||[]).length === 0 && (
            <div style={{ textAlign:"center", padding:"20px", color:T.textMuted, fontSize:12, border:"1px dashed "+T.border, borderRadius:12 }}>
              <div style={{ fontSize:24, marginBottom:6 }}>📷</div>
              Documente ta progression avec des photos
            </div>
          )}
        </div>

        {/* Notes */}
        <div>
          <div style={{ fontSize: 13, fontWeight: 600, color: T.textSub, marginBottom: 10 }}>Journal de progression</div>
          <div style={{ display: "flex", gap: 8, marginBottom: 10 }}>
            <textarea className="detail-input" value={noteText}
              onChange={function(e) { setNoteText(e.target.value); }}
              placeholder="Ajoute une note, étape, ressenti..." rows={2}
              style={{ flex: 1, background: T.inputBg, color: T.text, border: "1px solid " + T.border }}/>
            <button onClick={addNote} style={{
              background: T.accent, border: "none", borderRadius: 10,
              padding: "8px 14px", fontSize: 13, color: T.bg,
              fontWeight: 600, cursor: "pointer", alignSelf: "flex-end", flexShrink: 0,
            }}>+</button>
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            {(project.notes || []).length === 0 && (
              <div style={{ fontSize: 12, color: T.textMuted, textAlign: "center", padding: "12px 0" }}>
                Pas encore de notes. Commence ton journal !
              </div>
            )}
            {(project.notes || []).map(function(n) {
              return <NoteItem key={n.id} note={n} onDelete={function() { deleteNote(n.id); }}/>;
            })}
          </div>
        </div>

        {/* Delete */}
        {!confirmDelete ? (
          <button onClick={function() { setConfirmDelete(true); }} style={{
            background: "none", border: "1px solid " + T.danger + "44",
            borderRadius: 10, padding: "9px", fontSize: 12,
            color: T.danger, cursor: "pointer", width: "100%", marginTop: 4,
          }}>Supprimer ce projet</button>
        ) : (
          <div style={{
            border: "1px solid " + T.danger + "55", borderRadius: 12,
            padding: "12px 14px", background: T.danger + "0D", marginTop: 4,
            display: "flex", flexDirection: "column", gap: 10,
          }}>
            <div style={{ fontSize: 13, color: T.danger, fontWeight: 600, textAlign: "center" }}>
              Supprimer définitivement ce projet ?
            </div>
            <div style={{ display: "flex", gap: 8 }}>
              <button onClick={function() { setConfirmDelete(false); }} style={{
                flex: 1, padding: "9px", borderRadius: 10,
                border: "1px solid " + T.border, background: T.surfaceLight,
                color: T.textMuted, cursor: "pointer", fontSize: 13,
              }}>Annuler</button>
              <button onClick={function() { onDelete(project.id); onClose(); }} style={{
                flex: 1, padding: "9px", borderRadius: 10, border: "none",
                background: T.danger, color: "#fff", cursor: "pointer", fontSize: 13, fontWeight: 700,
              }}>Confirmer</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}


// --- COMPLETE PROJECT MODAL ---
function DIY_CompleteModal({ estimatedHours, materialCost, difficulty, onConfirm, onCancel }) {
  var T = useDIYT();
  var [realHours, setRealHours] = useState(estimatedHours ? String(estimatedHours) : "");
  var [mat, setMat] = useState(materialCost || "");

  var xpPreview = calcProjectXPFull("done", difficulty, realHours, mat);
  var diffMult = DIFF_XP_MULT[difficulty] || 1;
  var baseXp = Math.round(50 * diffMult);
  var h = Number(realHours) || 0;
  var hourBonus = h > 0 ? Math.min(Math.round(h), 150) : 0;
  var matOpt = MATERIAL_COST_OPTS.find(function(o){return o.value===mat;});
  var matBonus = matOpt ? (matOpt.bonus||0) : 0;

  var inp = { width:"100%", padding:"10px 12px", borderRadius:12, fontSize:14,
    color:T.text, background:T.inputBg, border:"1px solid "+T.borderLight,
    outline:"none", boxSizing:"border-box" };

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",backdropFilter:"blur(6px)",zIndex:400,display:"flex",alignItems:"flex-end",justifyContent:"center"}}
      onClick={function(e){if(e.target===e.currentTarget)onCancel();}}>
      <div style={{width:"100%",maxWidth:480,background:T.surface,borderRadius:"20px 20px 0 0",padding:"24px 20px 36px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <div style={{fontSize:16,fontWeight:700,color:T.text}}>🎉 Projet terminé !</div>
          <button onClick={onCancel} style={{border:"none",background:"none",fontSize:20,cursor:"pointer",color:T.textMuted}}>✕</button>
        </div>

        <div style={{marginBottom:16}}>
          <div style={{fontSize:12,fontWeight:600,color:T.textSub,marginBottom:6}}>⏱ Durée réelle (heures)</div>
          <input type="number" min={0} step={0.5} value={realHours}
            onChange={function(e){setRealHours(e.target.value);}}
            placeholder={estimatedHours ? "Estimé : "+estimatedHours+"h" : "Ex: 12.5"}
            style={inp}/>
          {estimatedHours > 0 && realHours && Number(realHours) !== Number(estimatedHours) && (
            <div style={{fontSize:11,color:T.textMuted,marginTop:4}}>
              {Number(realHours) > Number(estimatedHours) ? "⬆️" : "⬇️"} Estimé : {estimatedHours}h → Réel : {realHours}h
            </div>
          )}
        </div>

        <div style={{marginBottom:20}}>
          <div style={{fontSize:12,fontWeight:600,color:T.textSub,marginBottom:6}}>🧰 Coût matériel</div>
          <DIY_CustomSelect value={mat} onChange={setMat} options={MATERIAL_COST_OPTS} placeholder="Sélectionner..."/>
        </div>

        <div style={{background:T.surfaceLight,borderRadius:14,padding:"12px 16px",marginBottom:20,border:"1px solid "+T.border}}>
          <div style={{fontSize:11,color:T.textMuted,marginBottom:8,fontWeight:600,letterSpacing:0.5}}>XP GAGNÉ</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:8}}>
            <span style={{fontSize:11,padding:"2px 8px",borderRadius:20,background:T.accent+"18",border:"1px solid "+T.accent+"44",color:T.accent}}>Base {baseXp} XP</span>
            {hourBonus > 0 && <span style={{fontSize:11,padding:"2px 8px",borderRadius:20,background:"#60A5FA18",border:"1px solid #60A5FA44",color:"#60A5FA"}}>+{hourBonus} XP heures</span>}
            {matBonus > 0 && <span style={{fontSize:11,padding:"2px 8px",borderRadius:20,background:"#FBBF2418",border:"1px solid #FBBF2444",color:"#FBBF24"}}>+{matBonus} XP matériel</span>}
          </div>
          <div style={{fontSize:22,fontWeight:800,color:T.accent}}>= {xpPreview} XP</div>
        </div>

        <button onClick={function(){onConfirm(realHours, mat);}}
          style={{width:"100%",padding:"13px",borderRadius:14,border:"none",
            background:"linear-gradient(135deg,"+T.accent+"CC,"+T.accentViolet+"99)",
            color:T.bg,cursor:"pointer",fontWeight:700,fontSize:15}}>
          ✓ Confirmer la complétion
        </button>
      </div>
    </div>
  );
}

// --- ADD PROJECT MODAL ---
function AddProjectModal({
hobbies, onClose, onAdd }) {
  const [name, setName] = useState("");
  const [hobby, setHobby] = useState("");
  const [status, setStatus] = useState("wishlist");
  const [difficulty, setDifficulty] = useState("");
  const [estimatedHours, setEstimatedHours] = useState("");
  const [materialCost, setMaterialCost] = useState("");
  const [startDate, setStartDate] = useState("");
  const [deadline, setDeadline] = useState("");
  const [firstNote, setFirstNote] = useState("");
  const [tagInput, setTagInput] = useState("");
  const [tags, setTags] = useState([]);

  function addTag() {
    var t = tagInput.trim().toLowerCase().replace(/\s+/g, "-");
    if (!t || tags.includes(t) || tags.length >= 8) return;
    setTags(function(p) { return p.concat([t]); });
    setTagInput("");
  }
  function removeTag(t) { setTags(function(p) { return p.filter(function(x) { return x !== t; }); }); }

  var hobbyOpts = hobbies.map(function(h) { return { value: h.id, label: h.emoji + " " + h.label }; });

        <div style={{ display:"flex", alignItems:"center", gap:8 }}>

// --- STATS TAB ---
function StatsTab({
data, themeMode }) {
  var projects = data.projects;
  var hobbies = data.hobbies;
  var xp = data.xpEarned || 0;
  var lv = levelFromXP(xp);
  var xpIn = xpInLevel(xp);
  var done = projects.filter(function(p) { return p.status === "done"; }).length;
  var inprog = projects.filter(function(p) { return p.status === "inprogress"; }).length;
  var wish = projects.filter(function(p) { return p.status === "wishlist"; }).length;
  const [subtab, setSubtab] = useState("radar");

  var statCard = function(label, value, sub, color) {
    return (
      <div style={{ background: T.surfaceCard, border: "1px solid " + T.border, borderRadius: 14, padding: "14px 14px 12px" }}>
        <div style={{ fontSize: 11, color: T.textMuted, marginBottom: 4 }}>{label}</div>
        <div style={{ fontSize: 26, fontWeight: 700, color: color || T.accent }}>{value}</div>
        {sub && <div style={{ fontSize: 11, color: T.textMuted, marginTop: 2 }}>{sub}</div>}
      </div>
    );
  };

  var hobbyStats = {};
  projects.forEach(function(p) {
    if (!hobbyStats[p.hobby]) hobbyStats[p.hobby] = { total: 0, done: 0, xp: 0 };
    hobbyStats[p.hobby].total++;
    if (p.status === "done") hobbyStats[p.hobby].done++;
    hobbyStats[p.hobby].xp += p.xp || 0;
  });

  var topHobbies = Object.keys(hobbyStats).map(function(hid) {
    var h = hobbies.find(function(x) { return x.id === hid; }) || { emoji: "✦", label: hid };
    return Object.assign({}, hobbyStats[hid], { id: hid, emoji: h.emoji, label: h.label });
  }).sort(function(a, b) { return b.xp - a.xp; });

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
      {/* XP global */}
      <div>
        <LevelBanner level={lv} title={getLevelInfo(lv).title} tier={getLevelInfo(lv).tier} xpIn={xpIn} xpTotal={DIY_XP_PER_LEVEL} themeMode={themeMode}/>
        <div style={{ display: "flex", justifyContent: "space-between", marginTop: 8, padding: "0 4px" }}>
          <span style={{ fontSize: 11, color: T.textMuted }}>XP total accumulé</span>
          <span style={{ fontSize: 11, fontWeight: 600, color: T.accentViolet }}>{xp} XP</span>
        </div>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
        {statCard("Terminés", done, "projets complétés", T.accentGreen)}
        {statCard("En cours", inprog, "projets actifs", T.accent)}
        {statCard("Wishlist", wish, "projets à faire", T.accentViolet)}
        {statCard("Total", projects.length, "projets créés", T.textSub)}
      </div>

      {/* Sous-onglets radar / progression / badges */}
      <div style={{ display: "flex", gap: 6 }}>
        {["radar","progression","badges"].map(function(t) {
          var labels = { radar: "Radar", progression: "Hobbies", badges: "Badges" };
          var active = subtab === t;
          return (
            <button key={t} onClick={function() { setSubtab(t); }} style={{
              flex: 1, padding: "7px 4px", borderRadius: 10, fontSize: 12, fontWeight: 600,
              border: "1px solid " + (active ? T.accent + "66" : T.border),
              background: active ? T.filterActive : T.surfaceLight,
              color: active ? T.accent : T.textMuted, cursor: "pointer",
            }}>{labels[t]}</button>
          );
        })}
      </div>

      {subtab === "radar" && (
        <div style={{ background: T.surfaceCard, border: "1px solid " + T.border, borderRadius: 14, padding: 14 }}>
          <RadarChart data={data}/>
        </div>
      )}

      {subtab === "progression" && topHobbies.length > 0 && (
        <div style={{ background: T.surfaceCard, border: "1px solid " + T.border, borderRadius: 14, padding: 14 }}>
          {topHobbies.map(function(h) {
            var pct = h.total > 0 ? Math.round(h.done / h.total * 100) : 0;
            return (
              <div key={h.id} style={{ marginBottom: 14 }}>
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 5 }}>
                  <span style={{ fontSize: 13, color: T.text }}>{h.emoji} {h.label}</span>
                  <span style={{ fontSize: 11, color: T.textMuted }}>{h.done}/{h.total} · {h.xp} XP</span>
                </div>
                <DIY_XpBar current={h.done} total={h.total} color={T.accentGreen} height={5}/>
              </div>
            );
          })}
        </div>
      )}

      {subtab === "badges" && <DIY_BadgeGrid data={data}/>}
    </div>
  );
}
