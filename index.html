// TAB TIMELINE — tri par date, ordre croissant/décroissant
// ============================================================
function TimelineTab({ entries, onOpen }) {
  var T = useT();
  var [order, setOrder] = useState("asc");
  var evts = entries.filter(function(e) { return e.section === "timeline"; });

  evts = evts.slice().sort(function(a, b) {
    var da = parseDateStr(a.customFields && a.customFields.date_ou_epoque);
    var db = parseDateStr(b.customFields && b.customFields.date_ou_epoque);
    return order === "asc" ? da - db : db - da;
  });

  return (
    <div>
      {/* Contrôle tri */}
      <div style={{ display:"flex", justifyContent:"flex-end", marginBottom:12 }}>
        <button onClick={function(){setOrder(order === "asc" ? "desc" : "asc");}} style={{ display:"flex", alignItems:"center", gap:6, padding:"6px 14px", borderRadius:20, fontSize:12, fontWeight:600, cursor:"pointer", border:"1px solid "+T.border, background:T.surfaceLight, color:T.textMuted }}>
          {order === "asc" ? "↑ Croissant" : "↓ Décroissant"}
        </button>
      </div>

      {evts.length === 0 && (
        <div style={{ textAlign:"center", padding:"48px 20px", color:T.textMuted }}>
          <div style={{ fontSize:32, marginBottom:10 }}>⏳</div>
          <div style={{ fontSize:14 }}>Aucun evenement dans la timeline.</div>
          <div style={{ fontSize:12, marginTop:6 }}>Ajoute des evenements pour construire l'histoire.</div>
        </div>
      )}

      {evts.length > 0 && (
        <div style={{ position:"relative", paddingLeft:24 }}>
          <div style={{ position:"absolute", left:10, top:0, bottom:0, width:2, background:"linear-gradient(to bottom,"+T.accent+","+T.accentBlue+")", borderRadius:2, opacity:0.35 }}/>
          {evts.map(function(e) {
            var st = WB_STATUS_META[e.status] || WB_STATUS_META.ebauche;
            var dateStr = e.customFields && e.customFields.date_ou_epoque;
            return (
              <div key={e.id} style={{ position:"relative", marginBottom:16 }} onClick={function(){onOpen(e);}}>
                <div style={{ position:"absolute", left:-20, top:14, width:12, height:12, borderRadius:"50%", background:T.accent, border:"2px solid "+T.bg, zIndex:2 }}/>
                <div style={{ background:T.surfaceCard, border:"1px solid "+T.border, borderRadius:14, overflow:"hidden", cursor:"pointer" }}>
                  {e.imageUrl && <div style={{ height:70, overflow:"hidden" }}><img src={e.imageUrl} style={{ width:"100%", height:"100%", objectFit:"cover" }} alt="" onError={function(el){el.target.parentNode.style.display="none";}}/></div>}
                  <div style={{ padding:"10px 14px" }}>
                    <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:4 }}>
                      <span style={{ fontSize:13, fontWeight:700, color:T.text, fontFamily:"Playfair Display,serif", flex:1 }}>{e.name}</span>
                      <span style={{ fontSize:10, padding:"2px 8px", borderRadius:20, background:st.bg, color:st.color, fontWeight:600 }}>{st.label}</span>
                    </div>
                    {dateStr && <div style={{ fontSize:11, color:T.accent, fontWeight:600, marginBottom:4 }}>📅 {dateStr}</div>}
                    {e.description && <div style={{ fontSize:12, color:T.textMuted, lineHeight:1.5, overflow:"hidden", display:"-webkit-box", WebkitLineClamp:2, WebkitBoxOrient:"vertical" }}>{e.description}</div>}
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

}


// ============================================================
// MODAL EXPORT / IMPORT
// ============================================================
function ExportImportModal({ data, onClose, onImport }) {
  var T = useT();
  var [tab, setTab]       = useState("export");
  var [importText, setImportText] = useState("");
  var [importError, setImportError] = useState("");
  var fileRef = useRef(null);

  function handleExport() {
    var filename = "lilith-world-" + (data.worldName || "monde").replace(/\s+/g,"_") + "-" + new Date().toISOString().slice(0,10) + ".json";
    exportJSON(data, filename, function() {});
  }

  function handleFileImport(e) {
    var file = e.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(ev) { setImportText(ev.target.result); setImportError(""); };
    reader.readAsText(file);
  }

  function handleImport() {
    try {
      var parsed = JSON.parse(importText);
      if (!parsed.entries || !Array.isArray(parsed.entries)) throw new Error("Format invalide");
      if (!parsed.goals) parsed.goals = Object.assign({}, DEFAULT_GOALS);
      onImport(parsed);
    } catch(e) {
      setImportError("Fichier invalide : " + e.message);
    }
  }

  var inp = { width:"100%", padding:"9px 12px", borderRadius:10, fontSize:12, color:T.text, background:T.inputBg, border:"1px solid "+T.borderLight, outline:"none", boxSizing:"border-box", fontFamily:"monospace", resize:"vertical" };

  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.55)", zIndex:250, display:"flex", alignItems:"flex-end", justifyContent:"center" }} onClick={function(e){if(e.target===e.currentTarget)onClose();}}>
      <div style={{ background:T.modalBg, borderRadius:"24px 24px 0 0", width:"100%", maxWidth:540, maxHeight:"80vh", overflowY:"auto", padding:"20px 20px 40px" }}>
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:16 }}>
          <div style={{ fontSize:16, fontWeight:700, color:T.text, fontFamily:"Playfair Display,serif" }}>Export / Import</div>
          <button onClick={onClose} style={{ background:"none", border:"none", fontSize:20, cursor:"pointer", color:T.textMuted }}>✕</button>
        </div>

        {/* Tabs export/import */}
        <div style={{ display:"flex", gap:8, marginBottom:20 }}>
          {["export","import"].map(function(t) {
            var active = tab === t;
            return (
              <button key={t} onClick={function(){setTab(t); setImportError("");}} style={{ flex:1, padding:"8px", borderRadius:12, fontSize:13, fontWeight:600, cursor:"pointer", border:"1px solid "+(active ? T.accent+"88" : T.border), background:active ? T.accent+"22" : T.surfaceLight, color:active ? T.accent : T.textMuted }}>
                {t === "export" ? "⬇️ Exporter" : "⬆️ Importer"}
              </button>
            );
          })}
        </div>

        {tab === "export" && (
          <div>
            <div style={{ fontSize:13, color:T.textMuted, lineHeight:1.6, marginBottom:16 }}>
              Exporte toutes tes fiches, objectifs et le nom de ton univers dans un fichier <strong style={{color:T.text}}>.json</strong>. Uniquement les données du module Worldbuilding, independant des autres modules.
            </div>
            <div style={{ background:T.surface, border:"1px solid "+T.border, borderRadius:12, padding:"12px 14px", marginBottom:16 }}>
              <div style={{ fontSize:12, color:T.textMuted, marginBottom:4 }}>Ce fichier contiendra :</div>
              <div style={{ fontSize:13, color:T.text }}>🌍 {data.worldName}</div>
              <div style={{ fontSize:12, color:T.textMuted, marginTop:4 }}>{data.entries.length} fiche{data.entries.length > 1 ? "s" : ""} · {Object.keys(data.goals).length} sections</div>
            </div>
            <button onClick={handleExport} style={{ width:"100%", padding:"13px", borderRadius:14, fontSize:14, fontWeight:700, background:"linear-gradient(135deg,"+T.accent+","+T.accentBlue+")", border:"none", color:"#fff", cursor:"pointer" }}>
              Télécharger le fichier JSON
            </button>
          </div>
        )}

        {tab === "import" && (
          <div>
            <div style={{ fontSize:13, color:T.textMuted, lineHeight:1.6, marginBottom:16 }}>
              Importe un fichier exporté depuis ce module. <strong style={{color:T.danger}}>Attention : remplace toutes les données actuelles.</strong>
            </div>

            {/* Zone fichier */}
            <input ref={fileRef} type="file" accept=".json" onChange={handleFileImport} style={{ display:"none" }}/>
            <button onClick={function(){fileRef.current && fileRef.current.click();}} style={{ width:"100%", padding:"11px", borderRadius:12, fontSize:13, fontWeight:600, cursor:"pointer", border:"2px dashed "+T.border, background:T.surfaceLight, color:T.textMuted, marginBottom:12 }}>
              📂 Choisir un fichier .json
            </button>

            {/* Ou coller directement */}
            <div style={{ fontSize:11, color:T.textMuted, marginBottom:6 }}>Ou coller le JSON directement :</div>
            <textarea style={Object.assign({},inp,{minHeight:100})} value={importText} onChange={function(e){setImportText(e.target.value); setImportError("");}} placeholder='{"worldName":"...","entries":[...],...}'/>

            {importError && <div style={{ fontSize:12, color:T.danger, marginTop:8, padding:"8px 12px", background:T.danger+"11", borderRadius:8 }}>{importError}</div>}

            {importText && !importError && (
              <div style={{ marginTop:12 }}>
                <div style={{ fontSize:12, color:T.accent, marginBottom:10 }}>
                  {(function(){try{var p=JSON.parse(importText); return p.entries ? p.entries.length+" fiche(s) detectee(s) — "+( p.worldName||"?") : "Format invalide";}catch(e){return "JSON invalide";}})()}
                </div>
                <button onClick={handleImport} style={{ width:"100%", padding:"13px", borderRadius:14, fontSize:14, fontWeight:700, background:T.danger, border:"none", color:"#fff", cursor:"pointer" }}>
                  Importer et remplacer
                </button>
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

var EMOJI_SUGGESTIONS = ["🤝","⚔️","🏠","💕","📚","🔥","🌑","❓","👑","🐍","🌿","💀","🌟","🗡","🛡","🎭","🔮","🧬","🏹","💎","🌊","🦋","🐺","🌙","☀️","🍀","🕊","🦅","🐉","⚡"];

function RelTypesModal({ relTypes, setRelTypes, onClose }) {
  var T = useT();
  var [newLabel, setNewLabel] = useState("");
  var [newEmoji, setNewEmoji] = useState("🔗");
  var [newColor, setNewColor] = useState("#A78BFA");
  var [editIdx,  setEditIdx]  = useState(null);
  var [editLabel, setEditLabel] = useState("");
  var [editEmoji, setEditEmoji] = useState("");
  var [editColor, setEditColor] = useState("");
  var [picker, setPicker] = useState(null);

  function startEdit(i){ setEditIdx(i); setEditLabel(relTypes[i].label); setEditEmoji(relTypes[i].emoji); setEditColor(relTypes[i].color); }
  function saveEdit(){ if(!editLabel.trim())return; setRelTypes(function(p){return p.map(function(rt,i){return i===editIdx?{id:rt.id,label:editLabel.trim(),emoji:editEmoji,color:editColor}:rt;});}); setEditIdx(null); }
  function addType(){ if(!newLabel.trim())return; var nid=newLabel.trim().toLowerCase().replace(/[^a-z0-9]/g,"_").slice(0,20)+"_"+Date.now(); setRelTypes(function(p){return [...p,{id:nid,label:newLabel.trim(),emoji:newEmoji,color:newColor}];}); setNewLabel(""); setNewEmoji("🔗"); setNewColor("#A78BFA"); }
  function delType(i){ setRelTypes(function(p){return p.filter(function(_,j){return j!==i;});}); }

  var inp = {width:"100%",padding:"8px 10px",borderRadius:10,fontSize:13,color:T.text,background:T.inputBg,border:"1px solid "+T.borderLight,outline:"none",boxSizing:"border-box"};
  var emojiGrid = (
    <div style={{display:"flex",flexWrap:"wrap",gap:4,padding:8,background:T.surface,borderRadius:10,border:"1px solid "+T.border,marginBottom:8}}>
      {EMOJI_SUGGESTIONS.map(function(em){
        var isActive = picker==="new"?em===newEmoji:em===editEmoji;
        return <button key={em} onClick={function(){if(picker==="new")setNewEmoji(em);else setEditEmoji(em);setPicker(null);}}
          style={{fontSize:18,background:isActive?T.accent+"22":"none",border:isActive?"1px solid "+T.accent:"1px solid transparent",borderRadius:6,padding:"2px 4px",cursor:"pointer"}}>{em}</button>;
      })}
    </div>
  );

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.55)",backdropFilter:"blur(6px)",zIndex:400,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={function(e){if(e.target===e.currentTarget)onClose();}}>
      <div style={{width:"100%",maxWidth:480,background:T.surface,borderRadius:"20px 20px 0 0",padding:"20px 18px 32px",maxHeight:"85vh",overflowY:"auto"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <div style={{fontSize:15,fontWeight:700,color:T.text}}>🔗 Types de relation</div>
          <button onClick={onClose} style={{border:"none",background:"none",fontSize:20,cursor:"pointer",color:T.textMuted}}>✕</button>
        </div>

        <div style={{marginBottom:18}}>
          {relTypes.map(function(rt,i){
            if(editIdx===i) return (
              <div key={rt.id} style={{background:T.surfaceLight,borderRadius:12,padding:"10px 12px",marginBottom:6,border:"1px solid "+T.accent+"44"}}>
                <div style={{display:"flex",gap:6,marginBottom:8,alignItems:"center"}}>
                  <button onClick={function(){setPicker(picker===i?null:i);}} style={{fontSize:22,background:"none",border:"1px solid "+T.border,borderRadius:8,padding:"2px 8px",cursor:"pointer"}}>{editEmoji}</button>
                  <input value={editLabel} onChange={function(e){setEditLabel(e.target.value);}} style={{...inp,flex:1}} placeholder="Nom du type"/>
                  <input type="color" value={editColor} onChange={function(e){setEditColor(e.target.value);}} style={{width:36,height:34,borderRadius:8,border:"1px solid "+T.border,cursor:"pointer",padding:2,background:"none"}}/>
                </div>
                {picker===i && emojiGrid}
                <div style={{display:"flex",gap:6}}>
                  <button onClick={saveEdit} style={{flex:1,padding:"7px",borderRadius:10,border:"none",background:T.accent,color:"#fff",cursor:"pointer",fontWeight:600,fontSize:12}}>Enregistrer</button>
                  <button onClick={function(){setEditIdx(null);}} style={{padding:"7px 14px",borderRadius:10,border:"1px solid "+T.border,background:"transparent",color:T.textMuted,cursor:"pointer",fontSize:12}}>Annuler</button>
                </div>
              </div>
            );
            return (
              <div key={rt.id} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 10px",borderRadius:10,marginBottom:4,background:T.surfaceLight,border:"1px solid "+T.border}}>
                <span style={{fontSize:18,width:24,textAlign:"center"}}>{rt.emoji}</span>
                <span style={{flex:1,fontSize:13,fontWeight:600,color:rt.color}}>{rt.label}</span>
                <div style={{width:14,height:14,borderRadius:"50%",background:rt.color,flexShrink:0}}></div>
                <button onClick={function(){startEdit(i);}} style={{border:"none",background:"none",cursor:"pointer",fontSize:14,color:T.textMuted,padding:"0 4px"}}>✏️</button>
                {relTypes.length>1 && <button onClick={function(){delType(i);}} style={{border:"none",background:"none",cursor:"pointer",fontSize:14,color:T.textMuted,padding:"0 4px"}}>🗑️</button>}
              </div>
            );
          })}
        </div>

        <div style={{background:T.surfaceLight,borderRadius:14,padding:"12px 14px",marginBottom:12,border:"1px solid "+T.border}}>
          <div style={{fontSize:11,fontWeight:600,color:T.textMuted,marginBottom:8,letterSpacing:0.5}}>NOUVEAU TYPE</div>
          <div style={{display:"flex",gap:6,marginBottom:8,alignItems:"center"}}>
            <button onClick={function(){setPicker(picker==="new"?null:"new");}} style={{fontSize:22,background:"none",border:"1px solid "+T.border,borderRadius:8,padding:"2px 8px",cursor:"pointer"}}>{newEmoji}</button>
            <input value={newLabel} onChange={function(e){setNewLabel(e.target.value);}} onKeyDown={function(e){if(e.key==="Enter")addType();}} style={{...inp,flex:1}} placeholder="Ex: Serviteur, Contrat..."/>
            <input type="color" value={newColor} onChange={function(e){setNewColor(e.target.value);}} style={{width:36,height:34,borderRadius:8,border:"1px solid "+T.border,cursor:"pointer",padding:2,background:"none"}}/>
          </div>
          {picker==="new" && emojiGrid}
          <button onClick={addType} style={{width:"100%",padding:"9px",borderRadius:10,border:"none",background:"linear-gradient(135deg,"+T.accent+","+T.accentBlue+")",color:"#fff",cursor:"pointer",fontWeight:700,fontSize:13}}>+ Ajouter ce type</button>
        </div>

        <button onClick={function(){setRelTypes(WB_DEFAULT_RELATION_TYPES.slice());}} style={{width:"100%",padding:"9px",borderRadius:10,border:"1px solid "+T.border,background:"transparent",color:T.textMuted,cursor:"pointer",fontSize:12}}>
          Réinitialiser les types par défaut
        </button>
      </div>
    </div>
  );
}

function WorldbuildingModule({ onHome }) {
  var [data, setData]             = useState(WB_defaultData());
  var [themeMode, setThemeMode]   = useState("light");
  var [loaded, setLoaded]         = useState(false);
  var [activeSection, setSection] = useState("overview");
  var [showAdd, setShowAdd]       = useState(false);
  var [addSectionId, setAddSec]   = useState(null);
  var [editEntry, setEditEntry]   = useState(null);
  var [detailEntry, setDetail]    = useState(null);
  var [detailGoTo, setDetailGoTo] = useState(null); // callback "aller à la fiche" depuis galerie
  var [searchQ, setSearch]        = useState("");
  var [showNameModal, setNameMod] = useState(false);
  var [showGoalModal, setGoalMod]   = useState(false);
  var [showExportModal, setExportMod] = useState(false);
  var [showReset, setShowReset]       = useState(false);
  var [showRelTypesModal, setShowRelTypes] = useState(false);
  var [relTypes, setRelTypes]     = useState(WB_DEFAULT_RELATION_TYPES.slice());
  var [toast, setToast]           = useState(null);
  var [badgeToast, setBadgeToast] = useState(null);
  var [checkBadges, setCheckBadges] = useState(false);
  var prevBadgesRef = useRef([]);
  var tabsRef = useRef(null);

  var T = WB_THEMES[themeMode];

  useEffect(function() {
    async function load() {
      var savedTheme = await storage.get(WB_THEME_KEY);
      if (savedTheme && WB_THEMES[savedTheme]) setThemeMode(savedTheme);
      var savedData = await storage.get(WB_KEY);
      if (savedData) {
        if (!savedData.goals) savedData.goals = Object.assign({}, DEFAULT_GOALS);
        setData(savedData);
      }
      var savedRelTypes = storage.get(WB_REL_TYPES_KEY);
      if (savedRelTypes && Array.isArray(savedRelTypes) && savedRelTypes.length > 0) {
        setRelTypes(savedRelTypes); WB_RELATION_TYPES = savedRelTypes;
      }
      setLoaded(true);
    }
    load();
  }, []);

  useEffect(function() { if (loaded) storage.set(WB_KEY, data); }, [data, loaded]);
  useEffect(function() { if (loaded) { storage.set(WB_REL_TYPES_KEY, relTypes); WB_RELATION_TYPES = relTypes; } }, [relTypes, loaded]);
  useEffect(function() { if (loaded) storage.set(WB_THEME_KEY, themeMode); }, [themeMode, loaded]);

  function showToast(msg) { setToast(msg); setTimeout(function() { setToast(null); }, 2200); }

  function addEntry(entryData) {
    setData(function(prev) {
      return Object.assign({}, prev, { entries: prev.entries.concat([Object.assign({}, entryData, { id: prev.nextId })]), nextId: prev.nextId + 1 });
    });
    setShowAdd(false);
    setCheckBadges(true);
    showToast("Fiche creee !");
  }

  function updateEntry(entryData) {
    setData(function(prev) {
      return Object.assign({}, prev, { entries: prev.entries.map(function(e) { return e.id === entryData.id ? entryData : e; }) });
    });
    setEditEntry(null);
    setDetail(entryData);
    setCheckBadges(true);
    showToast("Fiche mise a jour !");
  }

  function deleteEntry(id) {
    setData(function(prev) { return Object.assign({}, prev, { entries: prev.entries.filter(function(e) { return e.id !== id; }) }); });
    setDetail(null);
    showToast("Fiche supprimee.");
  }

  useEffect(function() {
    if (!checkBadges || !loaded) return;
    setCheckBadges(false);
    var current = calcBadges(data.entries, calcCompletion(data.entries, data.goals));
    var prev = prevBadgesRef.current;
    var newlyUnlocked = current.filter(function(b) {
      return b.unlocked && !prev.find(function(p) { return p.id === b.id && p.unlocked; });
    });
    if (newlyUnlocked.length > 0) {
      setBadgeToast(newlyUnlocked[0]);
      setTimeout(function() { setBadgeToast(null); }, 3500);
    }
    prevBadgesRef.current = current;
  }, [checkBadges, data, loaded]);

  function handleImport(importedData) {
    setData(importedData);
    setExportMod(false);
    showToast("Import reussi — " + importedData.entries.length + " fiches chargees !");
  }

  function renameWorld(name) { setData(function(prev) { return Object.assign({}, prev, { worldName: name }); }); setNameMod(false); }
  function updateGoals(newGoals) { setData(function(prev) { return Object.assign({}, prev, { goals: newGoals }); }); setGoalMod(false); showToast("Objectifs mis a jour !"); }

  var completion = calcCompletion(data.entries, data.goals);
  var badges     = calcBadges(data.entries, completion);

  var visibleEntries = activeSection === "overview" || activeSection === "timeline" || activeSection === "galerie"
    ? data.entries
    : data.entries.filter(function(e) { return e.section === activeSection; });
  if (searchQ.trim()) {
    var q = searchQ.toLowerCase();
    visibleEntries = visibleEntries.filter(function(e) {
      return e.name.toLowerCase().includes(q) || (e.description||"").toLowerCase().includes(q) || normalizeTags(e.tags).some(function(t){return t.label.toLowerCase().includes(q);});
    });
  }

  if (!loaded) {
    return (
      <div style={{minHeight:"100vh",background:T.bgGradient,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:18}}>
        <style>{`
          @keyframes wb-spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
          @keyframes wb-pulse{0%,100%{opacity:0.3;transform:scale(0.95)}50%{opacity:1;transform:scale(1.05)}}
          @keyframes wb-dot{0%,100%{transform:scale(1);opacity:0.3}50%{transform:scale(1.4);opacity:1}}
          @keyframes wb-toast{from{opacity:0;transform:translateX(-50%) translateY(14px) scale(0.93)}to{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}}
        `}</style>
        <div style={{position:"relative",width:64,height:64,display:"flex",alignItems:"center",justifyContent:"center"}}>
          <div style={{position:"absolute",inset:0,borderRadius:"50%",border:"2px solid "+T.accent+"20",borderTop:"2px solid "+T.accent,animation:"wb-spin 1.2s linear infinite"}}/>
          <div style={{fontSize:26,animation:"wb-pulse 2s ease-in-out infinite"}}>🌍</div>
        </div>
        <div style={{textAlign:"center"}}>
          <div style={{fontSize:15,fontWeight:700,color:T.text,fontFamily:"'Playfair Display',serif",letterSpacing:0.5,marginBottom:6}}>Worldbuilding</div>
          <div style={{display:"flex",gap:5,justifyContent:"center"}}>
            {[0,1,2].map(function(i){return <div key={i} style={{width:5,height:5,borderRadius:"50%",background:T.accent,animation:"wb-dot 1.2s ease-in-out infinite",animationDelay:i*0.2+"s"}}/>;  })}
          </div>
        </div>
      </div>
    );
  }

  var tabList = [
    { id:"overview",    label:"Vue d'ensemble", emoji:"🌐" },
    { id:"personnages", label:"Personnages",     emoji:"👤" },
    { id:"lieux",       label:"Lieux",           emoji:"🏔️" },
    { id:"creatures",   label:"Creatures",       emoji:"🐉" },
    { id:"factions",    label:"Factions",        emoji:"⚔️" },
    { id:"lore",        label:"Lore",            emoji:"📜" },
    { id:"timeline",    label:"Timeline",        emoji:"⏳" },
    { id:"galerie",     label:"Galerie",         emoji:"🖼️" },
  ];

  return (
    <ThemeCtx.Provider value={T}>
      <div style={{ minHeight:"100vh", background:T.bgGradient, color:T.text, fontFamily:"Inter,sans-serif" }}>
        <style>{`
          @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap');
          * { box-sizing:border-box; }
          ::-webkit-scrollbar { width:4px; height:0; }
          ::-webkit-scrollbar-thumb { background:${T.scrollThumb}; border-radius:4px; }
          .wb-tabs { display:flex; gap:6px; padding:10px 14px; overflow-x:auto; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
          .wb-tabs::-webkit-scrollbar { display:none; }
          @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
        `}</style>

        {/* Header */}
        <div style={{ background:T.surface, borderBottom:"1px solid "+T.border, padding:"12px 16px", display:"flex", alignItems:"center", gap:10, position:"sticky", top:0, zIndex:50, backdropFilter:"blur(12px)" }}>
          <button onClick={onHome} style={{ background:"none", border:"none", cursor:"pointer", color:T.textMuted, fontSize:20, padding:"0 4px" }}>‹</button>
          <div style={{ flex:1, minWidth:0 }}>
            <button onClick={function(){setNameMod(true);}} style={{ background:"none", border:"none", cursor:"pointer", padding:0, textAlign:"left", width:"100%" }}>
              <div style={{ fontSize:16, fontWeight:700, color:T.text, fontFamily:"Playfair Display,serif", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>
                🌍 {data.worldName} <span style={{ fontSize:12, color:T.textMuted }}>✏️</span>
              </div>
              <div style={{ fontSize:10, color:T.textMuted, letterSpacing:0.5 }}>WORLDBUILDING</div>
            </button>
          </div>
          <button onClick={function(){setGoalMod(true);}} style={{ background:T.surfaceLight, border:"1px solid "+T.border, borderRadius:20, padding:"6px 10px", fontSize:14, cursor:"pointer", color:T.textMuted, marginRight:2 }}>🎯</button>
          <button onClick={function(){setShowRelTypes(true);}} style={{ background:T.surfaceLight, border:"1px solid "+T.border, borderRadius:20, padding:"6px 10px", fontSize:14, cursor:"pointer", color:T.textMuted, marginRight:2 }} title="Types de relation">🔗</button>
          <button onClick={function(){setExportMod(true);}} style={{ background:T.surfaceLight, border:"1px solid "+T.border, borderRadius:20, padding:"6px 10px", fontSize:13, cursor:"pointer", color:T.textMuted, marginRight:2 }}>⤓</button>
          <button onClick={function(){setShowReset(true);}} style={{ background:T.surfaceLight, border:"1px solid "+T.border, borderRadius:20, padding:"6px 10px", fontSize:13, cursor:"pointer", color:T.textMuted, marginRight:2 }}>🔄</button>
          <button onClick={function(){setThemeMode(themeMode==="dark"?"light":"dark");}} style={{ background:T.surfaceLight, border:"1px solid "+T.border, borderRadius:20, padding:"5px 12px", fontSize:12, cursor:"pointer", color:T.textMuted, display:"flex", alignItems:"center", gap:5, transition:"all 0.2s" }}>
            <span style={{fontSize:16}}>{themeMode==="dark"?"☀️":"🌙"}</span>
          </button>
        </div>

        {/* Tabs avec flèches desktop */}
        <div style={{ position:"relative", background:T.surface, borderBottom:"1px solid "+T.border }}>
          <button onClick={function(){if(tabsRef.current) tabsRef.current.scrollLeft -= 160;}} style={{ position:"absolute", left:0, top:0, bottom:0, zIndex:10, width:32, background:"linear-gradient(to right,"+T.surface+" 70%,transparent)", border:"none", cursor:"pointer", color:T.textMuted, fontSize:18, display:"flex", alignItems:"center", paddingLeft:6 }}>&#8249;</button>
          <div ref={tabsRef} className="wb-tabs" style={{ background:"transparent", borderBottom:"none", paddingLeft:36, paddingRight:36 }}>
            {tabList.map(function(t) {
              var active = activeSection === t.id;
              var secInfo = SECTIONS.find(function(s){return s.id===t.id;});
              var cnt = secInfo ? (completion.bySec[t.id]||{count:0}).count : null;
              return (
                <button key={t.id} onClick={function(){setSection(t.id); setSearch("");}} style={{
                  flexShrink:0, padding:"7px 12px", borderRadius:20, fontSize:12, fontWeight:600, cursor:"pointer",
                  whiteSpace:"nowrap", transition:"all 0.2s",
                  border:"1px solid "+(active ? T.accent+"88" : T.border),
                  background: active ? T.accent+"22" : T.surfaceLight,
                  color: active ? T.accent : T.textMuted,
                }}>
                  {t.emoji} {t.label}{cnt !== null ? <span style={{marginLeft:5,opacity:0.7}}>{cnt}</span> : ""}
                </button>
              );
            })}
          </div>
          <button onClick={function(){if(tabsRef.current) tabsRef.current.scrollLeft += 160;}} style={{ position:"absolute", right:0, top:0, bottom:0, zIndex:10, width:32, background:"linear-gradient(to left,"+T.surface+" 70%,transparent)", border:"none", cursor:"pointer", color:T.textMuted, fontSize:18, display:"flex", alignItems:"center", justifyContent:"flex-end", paddingRight:6 }}>&#8250;</button>
        </div>

        {/* Corps */}
        <div style={{ padding:"14px 16px", maxWidth:560, margin:"0 auto", animation:"fadeUp 0.4s ease both" }}>

          {/* Recherche */}
          {activeSection !== "overview" && activeSection !== "timeline" && activeSection !== "galerie" && (
            <div style={{ marginBottom:12, position:"relative" }}>
              <input
                style={{ width:"100%", padding:"9px 12px 9px 36px", borderRadius:12, fontSize:13, background:T.surface, border:"1px solid "+T.border, color:T.text, outline:"none" }}
                placeholder={"Rechercher dans "+(tabList.find(function(t){return t.id===activeSection;})||{label:""}).label+"..."}
                value={searchQ} onChange={function(e){setSearch(e.target.value);}}
              />
              <span style={{ position:"absolute", left:12, top:"50%", transform:"translateY(-50%)", fontSize:14, opacity:0.5 }}>🔍</span>
            </div>
          )}

          {/* Vue d'ensemble */}
          {activeSection === "overview" && (
            <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
              <WorldProgressBanner worldName={data.worldName} globalPct={completion.global}/>
              <WorldGlobe globalPct={completion.global}/>
              <BadgesPanel badges={badges}/>
              <SectionProgress completion={completion}/>
              {data.entries.length > 0 && (
                <div>
                  <div style={{ fontSize:13, fontWeight:600, color:T.textMuted, letterSpacing:0.5, marginBottom:8 }}>RECEMMENT AJOUTE</div>
                  <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
                    {data.entries.slice(-4).reverse().map(function(e) { return <EntryCard key={e.id} entry={e} onClick={function(){setDetail(e); setDetailGoTo(null);}}/>; })}
                  </div>
                </div>
              )}
              {data.entries.length === 0 && (
                <div style={{ textAlign:"center", padding:"32px 20px", background:T.surface, borderRadius:16, border:"1px dashed "+T.border }}>
                  <div style={{ fontSize:36, marginBottom:10 }}>🌱</div>
                  <div style={{ fontSize:15, fontWeight:600, color:T.text, fontFamily:"Playfair Display,serif", marginBottom:6 }}>Commence a construire ton univers !</div>
                  <div style={{ fontSize:13, color:T.textMuted, lineHeight:1.6 }}>Clique sur une section pour ajouter ta premiere fiche.</div>
                </div>
              )}
            </div>
          )}

          {/* Timeline */}
          {activeSection === "timeline" && (
            <div>
              <TimelineTab entries={data.entries} onOpen={function(e){setDetail(e); setDetailGoTo(null);}}/>
              <div style={{ height:100 }}/>
            </div>
          )}

          {/* Galerie */}
          {activeSection === "galerie" && (
            <div>
              <WB_GalleryTab
                entries={data.entries}
                onOpen={function(e, goToFn) { setDetail(e); setDetailGoTo(goToFn ? function() { return function() { setDetail(null); setSection(e.section); }; }() : null); }}
                onGoToSource={function(e) { setDetail(null); setSection(e.section); }}
              />
              <div style={{ height:100 }}/>
            </div>
          )}

          {/* Sections normales */}
          {activeSection !== "overview" && activeSection !== "timeline" && activeSection !== "galerie" && (
            <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
              {(function() {
                var info = completion.bySec[activeSection];
                var sec = SECTIONS.find(function(s){return s.id===activeSection;});
                if (!info || !sec) return null;
                return (
                  <div style={{ background:T.surface, border:"1px solid "+T.border, borderRadius:12, padding:"10px 14px", marginBottom:4 }}>
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:5 }}>
                      <span style={{ fontSize:12, fontWeight:600, color:T.textMuted }}>{info.count} / {info.goal} fiches</span>
                      <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                        <span style={{ fontSize:12, fontWeight:700, color:sec.color }}>{info.pct}%</span>
                        <button onClick={function(){setGoalMod(true);}} style={{ fontSize:10, padding:"2px 8px", borderRadius:10, border:"1px solid "+T.border, background:T.surfaceLight, color:T.textMuted, cursor:"pointer" }}>Objectifs</button>
                      </div>
                    </div>
                    <div style={{ height:5, borderRadius:3, background:T.border }}>
                      <div style={{ height:"100%", width:info.pct+"%", borderRadius:3, background:sec.color, transition:"width 0.4s" }}/>
                    </div>
                  </div>
                );
              })()}
              {visibleEntries.length === 0 && !searchQ && (
                <div style={{ textAlign:"center", padding:"40px 20px", color:T.textMuted }}>
                  <div style={{ fontSize:32, marginBottom:10 }}>{(tabList.find(function(t){return t.id===activeSection;})||{emoji:"?"}).emoji}</div>
                  <div style={{ fontSize:14 }}>Aucune fiche pour l'instant.</div>
                  <div style={{ fontSize:12, marginTop:6 }}>Appuie sur + pour en creer une.</div>
                </div>
              )}
              {visibleEntries.length === 0 && searchQ && (
                <div style={{ textAlign:"center", padding:"40px 20px", color:T.textMuted }}>
                  <div style={{ fontSize:14 }}>Aucun resultat pour {searchQ}.</div>
                </div>
              )}
              {visibleEntries.map(function(e) { return <EntryCard key={e.id} entry={e} onClick={function(){setDetail(e); setDetailGoTo(null);}}/>; })}
              <div style={{ height:100 }}/>
            </div>
          )}
        </div>

        {/* FAB */}
        {activeSection !== "overview" && (
          <button onClick={function(){setAddSec(activeSection); setEditEntry(null); setShowAdd(true);}} style={{
            position:"fixed", bottom:90, right:20, width:56, height:56, borderRadius:"50%",
            background:"linear-gradient(135deg,"+T.accent+","+T.accentBlue+")",
            border:"none", color:"#fff", fontSize:26, fontWeight:700, cursor:"pointer",
            boxShadow:"0 4px 20px "+T.accent+"55", zIndex:100,
            display:"flex", alignItems:"center", justifyContent:"center",
          }}>+</button>
        )}

        {/* Modals */}
        {(showAdd || editEntry) && (
          <EntryModal entry={editEntry||null} sectionId={addSectionId} onClose={function(){setShowAdd(false); setEditEntry(null);}} onSave={editEntry ? updateEntry : addEntry} allEntries={data.entries} relTypes={relTypes}/>
        )}
        {detailEntry && !editEntry && (
          <EntryDetail
            entry={data.entries.find(function(e){return e.id===detailEntry.id;})||detailEntry}
            allEntries={data.entries}
            onClose={function(){setDetail(null); setDetailGoTo(null);}}
            onEdit={function(e){setEditEntry(e); setDetail(null);}}
            onDelete={deleteEntry}
            onGoToEntry={detailGoTo}
            onOpenEntry={function(e){setDetail(e); setDetailGoTo(null);}}
            relTypes={relTypes}
          />
        )}
        {showNameModal && <WorldNameModal current={data.worldName} onClose={function(){setNameMod(false);}} onSave={renameWorld}/>}
        {showGoalModal && <GoalModal goals={data.goals} onClose={function(){setGoalMod(false);}} onSave={updateGoals}/>}
        {showExportModal && <ExportImportModal data={data} onClose={function(){setExportMod(false);}} onImport={handleImport}/>}

        {/* Reset modal */}
      {showRelTypesModal && <RelTypesModal relTypes={relTypes} setRelTypes={setRelTypes} onClose={function(){setShowRelTypes(false);}} />}

        {showReset && (
          <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.55)", zIndex:300, display:"flex", alignItems:"center", justifyContent:"center", padding:"0 24px" }}>
            <div style={{ background:T.modalBg, borderRadius:20, padding:24, width:"100%", maxWidth:340, border:"1px solid "+T.border, display:"flex", flexDirection:"column", gap:16 }}>
              <div style={{ fontSize:16, fontWeight:700, color:T.text }}>🔄 Réinitialiser le monde</div>
              <div style={{ fontSize:13, color:T.textSub, lineHeight:1.6 }}>
                Cela supprimera <strong>toutes les fiches, l'XP, les badges et les notes</strong> du module Worldbuilding. Le nom du monde sera conservé.
              </div>
              <div style={{ fontSize:13, color:T.accentPink, fontWeight:600, background:T.accentPink+"10", border:"1px solid "+T.accentPink+"33", borderRadius:10, padding:"8px 12px" }}>
                ⚠️ Cette action est irréversible.
              </div>
              <div style={{ display:"flex", gap:8 }}>
                <button onClick={function() {
                  var fresh = WB_defaultData();
                  fresh.worldName = data.worldName;
                  setData(fresh);
                  storage.set(WB_KEY, fresh);
                  setShowReset(false);
                  showToast("Monde réinitialisé.");
                }} style={{ flex:1, padding:"11px", borderRadius:12, border:"none", background:"linear-gradient(135deg,"+T.accentPink+",#F87171)", color:"#fff", fontWeight:600, fontSize:13, cursor:"pointer" }}>
                  Réinitialiser
                </button>
                <button onClick={function() { setShowReset(false); }} style={{ flex:1, padding:"11px", borderRadius:12, border:"1px solid "+T.border, background:T.surfaceLight, color:T.textSub, fontSize:13, cursor:"pointer" }}>
                  Annuler
                </button>
              </div>
            </div>
          </div>
        )}

        {/* Toast */}
        {toast && (
          <div style={{ position:"fixed", bottom:24, left:"50%", transform:"translateX(-50%)", background:T.modalBg, backdropFilter:"blur(14px)", border:"1px solid "+T.accent+"44", borderRadius:22, padding:"10px 20px", fontSize:13, color:T.text, boxShadow:"0 8px 36px rgba(0,0,0,0.22)", whiteSpace:"nowrap", zIndex:400, animation:"wb-toast 0.3s cubic-bezier(0.34,1.56,0.64,1) both" }}>
            {toast}
          </div>
        )}

        {/* Badge toast */}
        {badgeToast && (
          <div style={{ position:"fixed", bottom:66, left:"50%", transform:"translateX(-50%)", background:T.modalBg, backdropFilter:"blur(16px)", border:"1px solid "+T.accentGold+"88", borderRadius:22, padding:"12px 22px", zIndex:401, boxShadow:"0 8px 40px "+T.accentGold+"33", display:"flex", alignItems:"center", gap:10, whiteSpace:"nowrap", animation:"wb-toast 0.3s cubic-bezier(0.34,1.56,0.64,1) both" }}>
            <span style={{ fontSize:24 }}>{badgeToast.icon}</span>
            <div>
              <div style={{ fontSize:12, color:T.accentGold, fontWeight:700, letterSpacing:0.5 }}>SUCCES DEBLOQUE</div>
              <div style={{ fontSize:14, color:T.text, fontWeight:600 }}>{badgeToast.label}</div>
              <div style={{ fontSize:11, color:T.textMuted }}>{badgeToast.desc}</div>
            </div>
          </div>
        )}
      </div>
    </ThemeCtx.Provider>
  );
}


// --- AUTH ---
async function authSignUp(email, password) {
  var res = await fetch(SUPA_URL + "/auth/v1/signup", {
    method: "POST",
    headers: { "Content-Type": "application/json", "apikey": SUPA_KEY },
    body: JSON.stringify({ email, password }),
  });
  return res.json();
}

async function authSignIn(email, password) {
  var res = await fetch(SUPA_URL + "/auth/v1/token?grant_type=password", {
    method: "POST",
    headers: { "Content-Type": "application/json", "apikey": SUPA_KEY },
    body: JSON.stringify({ email, password }),
  });
  return res.json();
}

async function authRefresh(refreshToken) {
  var res = await fetch(SUPA_URL + "/auth/v1/token?grant_type=refresh_token", {
    method: "POST",
    headers: { "Content-Type": "application/json", "apikey": SUPA_KEY },
    body: JSON.stringify({ refresh_token: refreshToken }),
  });
  return res.json();
}

async function authSignOut(token) {
  await fetch(SUPA_URL + "/auth/v1/logout", {
    method: "POST",
    headers: { "Content-Type": "application/json", "apikey": SUPA_KEY, "Authorization": "Bearer " + token },
  });
}

function LoginScreen({ onAuth }) {
  var [mode,     setMode]     = useState("login");
  var [email,    setEmail]    = useState("");
  var [password, setPassword] = useState("");
  var [error,    setError]    = useState("");
  var [loading,  setLoading]  = useState(false);

  var bg = "linear-gradient(160deg,#FAF7FF 0%,#EDE0FF 50%,#FCE7F3 100%)";

  async function submit() {
    if (!email.trim() || !password.trim()) { setError("Email et mot de passe requis."); return; }
    setLoading(true); setError("");
    try {
      var data = mode === "login" ? await authSignIn(email, password) : await authSignUp(email, password);
      if (data.error || data.error_description || data.msg) {
        setError(data.error_description || data.msg || data.error || "Erreur inconnue.");
      } else if (data.access_token) {
        onAuth({ token: data.access_token, refreshToken: data.refresh_token, userId: data.user.id, email: data.user.email });
      } else if (mode === "signup" && data.id) {
        setMode("login");
        setError("");
        setPassword("");
        alert("Compte créé ! Vérifie ton email puis connecte-toi.");
      } else {
        setError("Réponse inattendue, réessaie.");
      }
    } catch(e) { setError("Erreur réseau."); }
    setLoading(false);
  }

  var inp = { width:"100%", padding:"11px 14px", borderRadius:12, border:"1px solid #D8B4FE", fontSize:14, fontFamily:"'Inter',sans-serif", outline:"none", background:"rgba(255,255,255,0.7)", color:"#2D2440", boxSizing:"border-box" };

  return (
    <div style={{minHeight:"100vh",background:bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"2rem 1.2rem"}}>
      <style>{`@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}`}</style>
      <div style={{width:"100%",maxWidth:380,animation:"fadeUp 0.5s ease both"}}>
        <div style={{textAlign:"center",marginBottom:32}}>
          <div style={{fontSize:44,marginBottom:8}}>✦</div>
          <div style={{fontSize:24,fontWeight:700,color:"#2D2440",fontFamily:"'Playfair Display',serif"}}>Lilith's Creative Studio</div>
          <div style={{fontSize:13,color:"#7C5CBF",marginTop:6}}>{mode === "login" ? "Connecte-toi pour accéder à tes créations" : "Crée ton compte"}</div>
        </div>

        <div style={{background:"rgba(255,255,255,0.75)",backdropFilter:"blur(12px)",border:"1px solid #E9D5FF",borderRadius:20,padding:24,display:"flex",flexDirection:"column",gap:14,boxShadow:"0 8px 32px rgba(124,92,191,0.12)"}}>
          <input style={inp} type="email" placeholder="Email" value={email} onChange={function(e){setEmail(e.target.value);}} onKeyDown={function(e){if(e.key==="Enter")submit();}}/>
          <input style={inp} type="password" placeholder="Mot de passe" value={password} onChange={function(e){setPassword(e.target.value);}} onKeyDown={function(e){if(e.key==="Enter")submit();}}/>
          {error && <div style={{fontSize:12,color:"#DC2626",background:"#FEF2F2",border:"1px solid #FECACA",borderRadius:8,padding:"8px 12px"}}>{error}</div>}
          <button onClick={submit} disabled={loading} style={{padding:"12px",borderRadius:12,border:"none",background:"linear-gradient(135deg,#7C5CBF,#C4A8FF)",color:"#fff",fontSize:14,fontWeight:600,cursor:loading?"wait":"pointer",opacity:loading?0.7:1}}>
            {loading ? "..." : mode === "login" ? "Se connecter" : "Créer le compte"}
          </button>
          <button onClick={function(){setMode(mode==="login"?"signup":"login");setError("");}} style={{background:"none",border:"none",fontSize:12,color:"#7C5CBF",cursor:"pointer",textDecoration:"underline"}}>
            {mode === "login" ? "Pas encore de compte ? S'inscrire" : "Déjà un compte ? Se connecter"}
          </button>
        </div>

        <div style={{textAlign:"center",marginTop:16,fontSize:11,color:"#9CA3AF"}}>
          Tes données sont synchronisées en sécurité sur le cloud ☁️
        </div>
      </div>
    </div>
  );
}

// --- APP ROUTER ---
function App() {
  const [currentModule, setCurrentModule] = useState(function() {
    // Restaure le module actif depuis sessionStorage au refresh
    return sessionStorage.getItem("lilith_module") || null;
  });
  const [auth, setAuth] = useState(null);
  const [authChecked, setAuthChecked] = useState(false);

  // Gère le bouton retour du navigateur
  useEffect(function() {
    function handlePopState() {
      setCurrentModule(null);
      sessionStorage.removeItem("lilith_module");
    }
    window.addEventListener("popstate", handlePopState);
    return function() { window.removeEventListener("popstate", handlePopState); };
  }, []);

  function openModule(id) {
    sessionStorage.setItem("lilith_module", id);
    history.pushState({ module: id }, "", "#" + id);
    setCurrentModule(id);
  }

  function closeModule() {
    sessionStorage.removeItem("lilith_module");
    history.back();
  }

  // Restaure la session et rafraîchit le token au démarrage
  useEffect(function() {
    async function restoreSession() {
      try {
        var saved = localStorage.getItem("lilith_auth");
        if (saved) {
          var parsed = JSON.parse(saved);
          if (parsed.refreshToken) {
            try {
              var refreshed = await authRefresh(parsed.refreshToken);
              if (refreshed.access_token) {
                var newSession = {
                  token: refreshed.access_token,
                  refreshToken: refreshed.refresh_token,
                  userId: refreshed.user.id,
                  email: refreshed.user.email,
                };
                supaAuth.userId = newSession.userId;
                supaAuth.token  = newSession.token;
                localStorage.setItem("lilith_auth", JSON.stringify(newSession));
                setAuth(newSession);
                setAuthChecked(true);
                return;
              }
            } catch(e) {}
          }
          supaAuth.userId = parsed.userId;
          supaAuth.token  = parsed.token;
          setAuth(parsed);
        }
      } catch(e) {}
      setAuthChecked(true);
    }
    restoreSession();
  }, []);

  function handleAuth(session) {
    var fullSession = {
      token: session.token,
      refreshToken: session.refreshToken,
      userId: session.userId,
      email: session.email,
    };
    supaAuth.userId = fullSession.userId;
    supaAuth.token  = fullSession.token;
    localStorage.setItem("lilith_auth", JSON.stringify(fullSession));
    setAuth(fullSession);
  }

  function handleSignOut() {
    authSignOut(auth.token).catch(function(){});
    supaAuth.userId = null;
    supaAuth.token  = null;
    localStorage.removeItem("lilith_auth");
    sessionStorage.removeItem("lilith_module");
    setAuth(null);
    setCurrentModule(null);
  }

  if (!authChecked) return null;
  if (!auth) return <LoginScreen onAuth={handleAuth}/>;

  if (!currentModule) {
    return <HomeScreen onOpen={openModule} onSignOut={handleSignOut} userEmail={auth.email}/>;
  }
  if (currentModule === "tracker") {
    return <ArtTrackerApp onHome={closeModule}/>;
  }
  if (currentModule === "worldbuilding") {
    return <WorldbuildingModule onHome={closeModule}/>;
  }
  if (currentModule === "diy") {
    return <DiyTrackerApp onHome={closeModule}/>;
  }
  return <HomeScreen onOpen={openModule} onSignOut={handleSignOut} userEmail={auth.email}/>;
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));

if ("serviceWorker" in navigator) {
  window.addEventListener("load", function() {
    navigator.serviceWorker.register("/service-worker.js").catch(function(e) {
      console.log("SW non enregistré:", e);
    });
  });
}
  </script>
</body>
