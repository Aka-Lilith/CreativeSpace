function generateLocal(keyword, theme, difficulty, skillName) {
  var diff = difficulty || "Moyen";

  // 1. Trouver l'exercice de base
  var baseExercice = null;
  var sujet = null;

  if (skillName) {
    // Mode compétence : exercice spécifique
    var exercices = GEN_BANK.parCompetence[skillName];
    if (exercices && exercices.length > 0) {
      baseExercice = pick(exercices);
    }
  }

  if (!baseExercice) {
    // Mode style ou libre
    var styleKey = theme || "default";
    var sujetsStyle = GEN_BANK.parStyle[styleKey] || GEN_BANK.parStyle["default"];
    sujet = keyword && keyword.trim() ? keyword.trim() : pick(sujetsStyle);
  }

  // 2. Twist créatif (30% de chance)
  var twist = Math.random() < 0.3 ? pick(GEN_BANK.twists) : null;

  // 3. Contrainte (40% de chance sur Moyen, 70% sur Difficile, 20% sur Facile)
  var contrainteChance = diff === "Difficile" ? 0.7 : diff === "Moyen" ? 0.4 : 0.2;
  var contrainte = Math.random() < contrainteChance ? pick(GEN_BANK.contraintes[diff] || GEN_BANK.contraintes["Moyen"]) : null;

  // 4. Conseil adapté
  var conseilPool = GEN_BANK.conseils[skillName] || GEN_BANK.conseils["default"];
  var conseil = pick(conseilPool);

  // 5. Construire le résultat
  var name, description;

  if (baseExercice) {
    // Exercice de compétence
    name = baseExercice.name;
    if (twist) name += " — " + twist;
    description = baseExercice.desc;
    if (twist) description += " Twist : " + twist + ".";
    if (theme) description += " Habille l'exercice dans un univers " + theme + ".";
  } else {
    // Sujet + style
    var sujetFinal = sujet + (twist ? " " + twist : "");
    name = "Dessine : " + sujetFinal.charAt(0).toUpperCase() + sujetFinal.slice(1);
    if (name.length > 50) name = name.substring(0, 50) + "...";

    var styleDesc = theme ? " dans un univers " + theme : "";
    description = "Dessine " + sujetFinal + styleDesc + ". ";
    if (diff === "Facile") description += "Garde-toi de l'espace pour expérimenter sans pression.";
    else if (diff === "Moyen") description += "Soigne la composition et l'ambiance lumineuse.";
    else description += "Vise une illustration soignée, avec une composition réfléchie et une palette cohérente.";
  }

  if (contrainte) description += " Contrainte : " + contrainte + ".";

  return {
    name: name,
    description: description,
    tips: conseil,
    keyword: sujet || (baseExercice ? baseExercice.name.split("—")[0].trim() : ""),
    isSurprise: !keyword || !keyword.trim(),
    isLocal: true,
    hasConstraint: !!contrainte,
    hasTwist: !!twist,
  };
}

// --- GÉNÉRATEUR IA ---
function GenerateurIA(props) {
  const onAddTask = props.onAddTask;
  const themes = props.themes;
  const skills = props.skills;

  // Détection PWA / app installée
  var isPWA = window.matchMedia('(display-mode: standalone)').matches
    || window.navigator.standalone === true;

  const [keyword, setKeyword] = useState("");
  const [selectedTheme, setSelectedTheme] = useState("Dark Fairycore");
  const [selectedSkill, setSelectedSkill] = useState("");
  const [difficulty, setDifficulty] = useState("Moyen");
  const [loading, setLoading] = useState(false);
  const [result, setResult] = useState(null);
  const [error, setError] = useState(null);
  const [forceLocal, setForceLocal] = useState(false);

  var block = {background:THEME.surface,backdropFilter:"blur(12px)",border:"0.5px solid "+THEME.border,borderRadius:18,padding:"1.1rem 1.2rem"};
  var inp = {padding:"8px 12px",borderRadius:10,fontSize:13,border:"1px solid "+THEME.borderLight,background:THEME.inputBg,color:THEME.text};

  var SKILL_THEMES = ["Echauffement","Anatomie","Aquarelle/Peinture","Theorie couleur","Character Design","Lineart","Methode","Environnements","Personnages","3D Modeling","Narration visuelle","Illustration vectorielle","Animation","Pixel Art","Digital Art","Traditionnel Art"];
  var styleThemes = themes.filter(function(t) { return !SKILL_THEMES.includes(t); });
  if (styleThemes.length === 0) styleThemes = ["Dark Fairycore","Nature","Cartoon"];

  function generate() {
    setLoading(true);
    setResult(null);
    setError(null);

    // Mode local : PWA OU choix manuel
    if (isPWA || forceLocal) {
      try {
        var skillName = selectedSkill ? ((skills||[]).find(function(s){return s.id===Number(selectedSkill);})||{}).name : null;
        var res = generateLocal(keyword, selectedTheme, difficulty, skillName);
        setTimeout(function() {
          setResult(res);
          setLoading(false);
        }, 400);
      } catch(e) {
        setError("Erreur de génération.");
        setLoading(false);
      }
      return;
    }

    // Mode Claude.ai : appel API avec promises
    var isSurprise = !keyword.trim();
    var surpriseType = ["une créature fantastique","un environnement mystérieux","une plante impossible","un personnage avec une émotion forte","un objet magique","une scène de nuit","une texture naturelle","un animal stylisé","un décor fairycore","une composition abstraite"][Math.floor(Math.random()*10)];
    var skillObj = selectedSkill ? (skills||[]).find(function(s){return s.id===Number(selectedSkill);}) : null;
    var skillContext = skillObj ? "Compétence ciblée : "+skillObj.name+" (l'exercice doit travailler spécifiquement cette compétence)" : "";
    var themeContext = selectedTheme ? "Style/Univers visuel : "+selectedTheme : "Style/Univers : libre, choisis ce qui convient le mieux";
    var isSurpriseCopy = isSurprise;

    var prompt = isSurprise
      ? "Tu es un assistant créatif pour artistes. Génère une idée d'exercice de dessin originale.\n\n"
        + themeContext + "\n" + skillContext + "\nDifficulté : " + difficulty + "\nType de sujet : " + surpriseType + "\n\n"
        + "Réponds UNIQUEMENT en JSON valide :\n{\"name\":\"Titre court\",\"description\":\"Description 2-3 phrases\",\"tips\":\"Un conseil\",\"keyword\":\"mot-clé\"}"
      : "Tu es un assistant créatif pour artistes. Génère une idée d'exercice.\n\nMot-clé : \"" + keyword + "\"\n"
        + themeContext + "\n" + skillContext + "\nDifficulté : " + difficulty + "\n\n"
        + "Réponds UNIQUEMENT en JSON valide :\n{\"name\":\"Titre court\",\"description\":\"Description 2-3 phrases\",\"tips\":\"Un conseil\",\"keyword\":\"" + keyword + "\"}";

    fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        messages: [{role:"user", content:prompt}]
      })
    }).then(function(response) {
      return response.json();
    }).then(function(data) {
      var text = data.content.map(function(i) { return i.text || ""; }).join("");
      var clean = text.replace(/```json|```/g, "").trim();
      var parsed = JSON.parse(clean);
      setResult(Object.assign({}, parsed, {isSurprise:isSurpriseCopy}));
      setLoading(false);
    }).catch(function() {
      setError("Erreur lors de la génération. Réessaie !");
      setLoading(false);
    });
  }

  function addToTracker() {
    if (!result) return;
    var xpAmount = difficulty==="Facile"?10:difficulty==="Moyen"?15:20;
    var rewardSkillId = selectedSkill ? Number(selectedSkill) : (skills&&skills[0]?skills[0].id:3);
    var newTask = {
      id: Date.now(),
      name: result.name,
      theme: selectedTheme||"Methode",
      rewards: [{skillId:rewardSkillId, xp:xpAmount, optional:false}]
    };
    if (result.description) DESCS[newTask.id] = result.description + (result.tips ? " Conseil : "+result.tips : "");
    onAddTask(newTask);
    setResult(null);
    setKeyword("");
  }

  return (
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      {/* Bannière mode PWA */}
      {isPWA && (
        <div style={{...block,background:THEME.accent+"10",border:"1px solid "+THEME.accent+"33",display:"flex",alignItems:"flex-start",gap:10}}>
          <span style={{fontSize:20,flexShrink:0}}>🎲</span>
          <div>
            <div style={{fontSize:13,fontWeight:600,color:THEME.accent,marginBottom:3}}>Générateur local</div>
            <div style={{fontSize:11,color:THEME.textSub,lineHeight:1.5}}>
              Dans l'app tu utilises le générateur de combinaisons. Pour le générateur IA complet, ouvre l'app dans{" "}
              <a href="https://claude.ai" target="_blank" rel="noopener noreferrer" style={{fontWeight:600,color:THEME.accent,textDecoration:"underline",textUnderlineOffset:2}}>Claude.ai</a>.
            </div>
          </div>
        </div>
      )}

      <div style={block}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:2,gap:8}}>
          <div style={{fontSize:13,fontWeight:600,color:THEME.text}}>
            {(isPWA||forceLocal)?"🎲 Générateur de combinaisons":"✨ Générateur d'idées IA"}
          </div>
          {/* Toggle mode — seulement si pas en PWA (en PWA c'est forcément local) */}
          {!isPWA && (
            <div style={{display:"flex",gap:0,borderRadius:20,border:"1px solid "+THEME.border,overflow:"hidden",flexShrink:0}}>
              <button onClick={function(){setForceLocal(false);}} style={{padding:"4px 10px",fontSize:10,cursor:"pointer",border:"none",background:!forceLocal?THEME.accent:"transparent",color:!forceLocal?"#fff":THEME.textMuted,fontWeight:!forceLocal?600:400}}>
                ✨ IA
              </button>
              <button onClick={function(){setForceLocal(true);}} style={{padding:"4px 10px",fontSize:10,cursor:"pointer",border:"none",background:forceLocal?THEME.accent:"transparent",color:forceLocal?"#fff":THEME.textMuted,fontWeight:forceLocal?600:400}}>
                🎲 Local
              </button>
            </div>
          )}
        </div>
        <div style={{fontSize:11,color:THEME.textMuted,marginBottom:12}}>{(isPWA||forceLocal)?"Pioche une idée structurée depuis la banque d'exercices !":"Tape un mot-clé ou laisse vide pour une idée surprise !"}</div>

        <div style={{display:"flex",gap:8,marginBottom:12}}>
          <div style={{flex:1,position:"relative"}}>
            <input
              value={keyword}
              onChange={function(e) { setKeyword(e.target.value); }}
              onKeyDown={function(e) { if(e.key==="Enter") generate(); }}
              placeholder={isPWA?"Mot-clé optionnel... (ex: champignon)":"Mot-clé... ou laisse vide pour une surprise 🎲"}
              style={{...inp, width:"100%", boxSizing:"border-box", paddingRight: keyword?"32px":"12px"}}
            />
            {keyword && <button onClick={function(){setKeyword("");}} style={{position:"absolute",right:8,top:"50%",transform:"translateY(-50%)",border:"none",background:"none",cursor:"pointer",fontSize:13,color:THEME.textMuted}}>✕</button>}
          </div>
          <button onClick={generate} disabled={loading} style={{padding:"8px 16px",borderRadius:10,fontSize:13,cursor:loading?"default":"pointer",border:"1px solid "+THEME.accent+"44",background:loading?THEME.surfaceLight:THEME.accent,color:loading?THEME.textMuted:"#fff",fontWeight:600,whiteSpace:"nowrap"}}>
            {loading ? "..." : (isPWA||forceLocal) ? "🎲 Piocher" : (keyword.trim() ? "✨ Générer" : "🎲 Surprise")}
          </button>
        </div>

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
          <div>
            <div style={{fontSize:11,color:THEME.textMuted,marginBottom:3}}>🎯 Compétence ciblée</div>
            <CustomSelect
              value={selectedSkill}
              onChange={setSelectedSkill}
              options={[{value:"",label:"Aucune (libre)"}].concat((skills||[]).map(function(sk){return {value:String(sk.id),label:(sk.emoji||"")+sk.name};}))}
              placeholder="Aucune (libre)"
            />
          </div>
          <div>
            <div style={{fontSize:11,color:THEME.textMuted,marginBottom:3}}>🌙 Style / Univers</div>
            <CustomSelect
              value={selectedTheme}
              onChange={setSelectedTheme}
              options={[{value:"",label:"Aucun (libre)"}].concat(styleThemes.map(function(t){return {value:t,label:t};}))}
              placeholder="Aucun (libre)"
            />
          </div>
        </div>

        <div>
          <div style={{fontSize:11,color:THEME.textMuted,marginBottom:5}}>Difficulté</div>
          <div style={{display:"flex",gap:4}}>
            {["Facile","Moyen","Difficile"].map(function(d) {
              var dc = DIFF_COLOR[d]||THEME.accent;
              return <button key={d} onClick={function(){setDifficulty(d);}} style={{flex:1,padding:"7px 0",borderRadius:10,fontSize:11,cursor:"pointer",border:difficulty===d?"1px solid "+dc:THEME.border,background:difficulty===d?dc+"18":THEME.surfaceLight,color:difficulty===d?dc:THEME.textMuted,fontWeight:difficulty===d?600:400,transition:"all 0.15s"}}>{d}</button>;
            })}
          </div>
        </div>
      </div>

      {error && (
        <div style={{...block,background:THEME.danger+"08",border:"1px solid "+THEME.danger+"33"}}>
          <div style={{fontSize:13,color:THEME.danger}}>{error}</div>
        </div>
      )}

      {loading && (
        <div style={{...block,textAlign:"center",padding:"2rem"}}>
          <div style={{fontSize:24,marginBottom:8}}>{(isPWA||forceLocal)?"🎲":"✨"}</div>
          <div style={{fontSize:13,color:THEME.accent,fontWeight:500}}>{(isPWA||forceLocal)?"Pioche une idée...":"Claude crée ton exercice..."}</div>
        </div>
      )}

      {result && (
        <div style={{...block,border:"1px solid "+THEME.accent+"33",background:THEME.accent+"05"}}>
          <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:10,flexWrap:"wrap"}}>
            {result.isSurprise && <span style={{fontSize:10,color:THEME.accentGold,background:THEME.accentGold+"15",borderRadius:20,padding:"2px 10px",fontWeight:600}}>🎲 {isPWA?"Aléatoire":"Surprise"}</span>}

            {result.hasConstraint && <span style={{fontSize:10,color:THEME.danger,background:THEME.danger+"15",borderRadius:20,padding:"2px 10px",fontWeight:500}}>⏱ Contrainte</span>}

            })()}

            <span style={{fontSize:10,color:(DIFF_COLOR[difficulty]||THEME.textMuted),background:(DIFF_COLOR[difficulty]||THEME.accent)+"15",borderRadius:20,padding:"2px 8px",fontWeight:500}}>{difficulty}</span>
            {result.keyword && <span style={{fontSize:10,color:THEME.textMuted,background:THEME.surfaceLight,borderRadius:20,padding:"2px 8px"}}>#{result.keyword}</span>}
          </div>
          <div style={{fontSize:15,fontWeight:600,color:THEME.text,marginBottom:8}}>🎨 {result.name}</div>

          {result.tips && (
            <div style={{background:THEME.accent+"08",borderRadius:10,padding:"8px 10px",marginBottom:14,border:"0.5px solid "+THEME.accent+"22"}}>
              <span style={{fontSize:11,color:THEME.accent,fontWeight:600}}>💡 Conseil : </span>

          <div style={{display:"flex",gap:8}}>
            <button onClick={addToTracker} style={{flex:1,padding:"8px",borderRadius:10,cursor:"pointer",border:"1px solid "+THEME.accentGreen+"44",background:THEME.accentGreen+"12",color:THEME.accentGreen,fontSize:13,fontWeight:600}}>+ Ajouter au tracker</button>

          </div>
        </div>
      )}
    </div>
  );
}

  {id:"coloriage", label:"Coloriage",           emoji:"🎨"},

function SessionLibreModal(props) {

  const onClose = props.onClose;

  const [desc, setDesc] = useState("");
  const [note, setNote] = useState("");
  const [selectedSkills, setSelectedSkills] = useState([]);
  const [xpMap, setXpMap] = useState({});

  var inp = {padding:"7px 10px",borderRadius:10,fontSize:13,border:"1px solid "+THEME.borderLight,background:THEME.inputBg,color:THEME.text,width:"100%",boxSizing:"border-box"};

  function toggleSkill(id) {
    setSelectedSkills(function(p) {
      return p.includes(id) ? p.filter(function(s) { return s!==id; }) : [...p,id];
    });
    setXpMap(function(p) { return {...p,[id]:p[id]||10}; });
  }

  function submit() {
    if (!desc.trim()) return;
    var gains = selectedSkills.map(function(sid) { return {skillId:sid, xp:xpMap[sid]||10}; });
    var typeObj = SESSION_LIBRE_TYPES.find(function(t) { return t.id===type; }) || SESSION_LIBRE_TYPES[0];
    onSave({desc:desc.trim(), type:type, typeLabel:typeObj.label, typeEmoji:typeObj.emoji, note:note.trim(), gains:gains});
  }

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.35)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100}} onClick={onClose}>
      <div onClick={function(e){e.stopPropagation();}} style={{background:THEME.modalBg,border:"0.5px solid "+THEME.borderLight,borderRadius:18,padding:"1.5rem",width:"min(500px,93vw)",maxHeight:"85vh",overflowY:"auto"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"1rem"}}>
          <div style={{fontSize:15,fontWeight:600,color:THEME.text,fontFamily:"'Playfair Display',serif"}}>🌟 Session libre</div>
          <button onClick={onClose} style={{border:"none",background:"none",fontSize:18,cursor:"pointer",color:THEME.textMuted}}>✕</button>
        </div>

        {/* Type */}
        <div style={{fontSize:11,color:THEME.textMuted,marginBottom:6}}>Type de session</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:12}}>
          {SESSION_LIBRE_TYPES.map(function(t) {
            return (
              <button key={t.id} onClick={function(){setType(t.id);}} style={{padding:"5px 10px",borderRadius:20,fontSize:12,cursor:"pointer",border:type===t.id?"1px solid "+THEME.accentPink:THEME.border,background:type===t.id?THEME.accentPink+"15":THEME.surfaceLight,color:type===t.id?THEME.accentPink:THEME.textSub,fontWeight:type===t.id?600:400}}>
                {t.emoji} {t.label}
              </button>
            );
          })}

        {/* Description */}

        <input value={desc} onChange={function(e){setDesc(e.target.value);}} placeholder="ex : dessin d'une fée inspirée de Pinterest, encrage d'un ancien croquis..." style={{...inp,marginBottom:10}}/>

        {/* Compétences */}
        <div style={{fontSize:11,color:THEME.textMuted,marginBottom:6}}>Compétences travaillées <span style={{color:THEME.textMuted}}>(optionnel)</span></div>
        <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:selectedSkills.length>0?8:12}}>

          <div style={{display:"flex",flexDirection:"column",gap:5,padding:"8px 10px",borderRadius:10,background:THEME.accentPink+"08",border:"1px solid "+THEME.accentPink+"22",marginBottom:12}}>

                <div key={sid} style={{display:"flex",alignItems:"center",gap:8}}>

                  <span style={{fontSize:11,color:THEME.textMuted}}>XP</span>

        <button onClick={submit} disabled={!desc.trim()} style={{width:"100%",padding:"9px",borderRadius:10,cursor:desc.trim()?"pointer":"default",border:"1px solid "+THEME.accentPink+"44",background:desc.trim()?THEME.accentPink:THEME.surfaceLight,color:desc.trim()?"#fff":THEME.textMuted,fontSize:14,fontWeight:600}}>

    </div>
  );
}

// GALERIE TRACKER
// ════════════════════════════════════════════════════════════════
function GalerieTracker({ gallery, setGallery, skills, tasks, history, initialLightbox }) {
  var block = {background:THEME.surface,backdropFilter:"blur(12px)",border:"0.5px solid "+THEME.border,borderRadius:18,padding:"1rem 1.2rem"};
  var inp   = {padding:"7px 10px",borderRadius:10,fontSize:13,border:"1px solid "+THEME.borderLight,background:THEME.inputBg,color:THEME.text,width:"100%",boxSizing:"border-box"};

  var [uploading,    setUploading]    = useState(false);
  var [showAdd,      setShowAdd]      = useState(false);
  var [caption,      setCaption]      = useState("");
  var [tag,          setTag]          = useState("dessin");
  var [linkedTask,   setLinkedTask]   = useState("");
  var [linkedSkills, setLinkedSkills] = useState([]);
  var [filterTag,    setFilterTag]    = useState("tous");
  var [filterSkill,  setFilterSkill]  = useState(null);
  var [lightbox,     setLightbox]     = useState(initialLightbox||null);
  var fileInputRef = useRef(null);

  var doneTasks = React.useMemo(function() {
    var seen = {};
    return (history||[]).filter(function(h) {
      if (!h.taskId || seen[h.taskId]) return false;
      seen[h.taskId] = true; return true;
    }).map(function(h) { return {id:h.taskId, name:h.taskName, theme:h.theme}; });
  }, [history]);

  async function handleUpload(e) {
    var file = e.target.files && e.target.files[0];
    if (!file) return;
    setUploading(true);
    try {
      var formData = new FormData();
      formData.append("file", file);
      formData.append("upload_preset", "Studio");
      formData.append("cloud_name", "dt5wa6tqm");
      var res = await fetch("https://api.cloudinary.com/v1_1/dt5wa6tqm/image/upload", {method:"POST",body:formData});
      var data = await res.json();
      if (data.secure_url) {
        var task = linkedTask ? doneTasks.find(function(t){return String(t.id)===linkedTask;}) : null;
        var img = {
          id: Date.now(), url: data.secure_url,
          date: new Date().toLocaleDateString("fr-FR"),
          tag: tag, caption: caption.trim(),
          taskId: task ? task.id : null,
          taskName: task ? task.name : null,
          skillIds: linkedSkills.slice(),
        };
        setGallery(function(prev) { return [img].concat(prev); });
        setCaption(""); setLinkedTask(""); setLinkedSkills([]); setShowAdd(false);
      }
    } catch(err) { alert("Erreur upload, reessaie."); }
    setUploading(false);
    if (fileInputRef.current) fileInputRef.current.value = "";
  }

  function deleteImage(id) {
    setGallery(function(prev) { return prev.filter(function(img){return img.id!==id;}); });
    if (lightbox && lightbox.id === id) setLightbox(null);
  }

  function toggleSkill(skillId) {
    setLinkedSkills(function(prev) {
      return prev.includes(skillId) ? prev.filter(function(s){return s!==skillId;}) : [...prev, skillId];
    });
  }

  var filtered = (gallery||[]).filter(function(img) {
    if (filterTag !== "tous" && img.tag !== filterTag) return false;
    if (filterSkill && !(img.skillIds||[]).includes(filterSkill)) return false;
    return true;
  });

  return (
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <div style={{display:"flex",gap:7,flexWrap:"wrap",alignItems:"center"}}>
        {[{id:"tous",label:"Tous"},{id:"dessin",label:"Dessins"},{id:"reference",label:"Refs"}].map(function(f) {
          var active = filterTag===f.id;
          return (
            <button key={f.id} onClick={function(){setFilterTag(f.id);}} style={{padding:"4px 12px",borderRadius:20,fontSize:12,cursor:"pointer",border:active?"1px solid "+THEME.accent+"66":THEME.border,background:active?THEME.filterActive:THEME.surfaceLight,color:active?THEME.accent:THEME.textSub,fontWeight:active?600:400}}>
              {f.label} {f.id!=="tous"?("("+((gallery||[]).filter(function(i){return i.tag===f.id;}).length)+")"):"("+((gallery||[]).length)+")"}
            </button>
          );
        })}
        {(skills||[]).slice(0,5).map(function(sk) {
          var active = filterSkill===sk.id;
          return (
            <button key={sk.id} onClick={function(){setFilterSkill(active?null:sk.id);}} style={{padding:"3px 9px",borderRadius:20,fontSize:10,cursor:"pointer",border:active?"1px solid "+sk.color+"66":"1px solid "+THEME.border,background:active?sk.color+"18":THEME.surfaceLight,color:active?sk.color:THEME.textMuted,fontWeight:active?600:400}}>
              {sk.name}
            </button>
          );
        })}
      </div>

      {filtered.length > 0 ? (
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          {filtered.map(function(img) {
            var tagColor = img.tag==="dessin" ? THEME.accent : THEME.accentGold;
            var tagLabel = img.tag==="dessin" ? "Dessin" : "Ref.";
            return (
              <div key={img.id} id={"gallery-img-"+img.id} onClick={function(){setLightbox(img);}} style={{borderRadius:14,overflow:"hidden",border:"1px solid "+THEME.border,cursor:"pointer",background:THEME.surfaceCard}}>
                <div style={{aspectRatio:"1",overflow:"hidden",position:"relative"}}>
                  <img src={img.url} alt={img.caption||img.tag} style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}}/>
                  <span style={{position:"absolute",top:6,left:6,fontSize:9,padding:"2px 7px",borderRadius:20,background:"rgba(0,0,0,0.55)",color:tagColor,fontWeight:700}}>{tagLabel}</span>
                </div>
                <div style={{padding:"8px 10px"}}>
                  {img.caption && <div style={{fontSize:12,color:THEME.text,marginBottom:3,fontWeight:500,overflow:"hidden",display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical"}}>{img.caption}</div>}
                  <div style={{fontSize:10,color:THEME.textMuted}}>{img.date}</div>
                  {img.taskName && <div style={{fontSize:10,color:THEME.accent,marginTop:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>🎨 {img.taskName}</div>}
                  {(img.skillIds||[]).length > 0 && (
                    <div style={{display:"flex",flexWrap:"wrap",gap:3,marginTop:4}}>
                      {(img.skillIds||[]).map(function(sid) {
                        var sk = (skills||[]).find(function(s){return s.id===sid;});
                        if (!sk) return null;
                        return <span key={sid} style={{fontSize:9,padding:"1px 6px",borderRadius:20,background:sk.color+"18",color:sk.color,border:"1px solid "+sk.color+"33"}}>{sk.name}</span>;
                      })}
                    </div>
                  )}
                </div>
              </div>
            );
          })}
        </div>
      ) : (
        <div style={{...block,textAlign:"center",padding:"3rem 1rem"}}>
          <div style={{fontSize:36,marginBottom:12}}>🖼️</div>
          <div style={{fontSize:14,fontWeight:600,color:THEME.text,marginBottom:6}}>
            {filterTag!=="tous"||filterSkill ? "Aucune image dans ce filtre" : "Ta galerie est vide"}
          </div>
          <div style={{fontSize:12,color:THEME.textMuted}}>
            {filterTag!=="tous"||filterSkill ? "Essaie un autre filtre" : "Ajoute ta premiere illustration ou reference !"}
          </div>
        </div>
      )}

      {!showAdd ? (
        <button onClick={function(){setShowAdd(true);}} style={{width:"100%",padding:"11px",borderRadius:14,cursor:"pointer",border:"1px dashed "+THEME.borderLight,background:"transparent",color:THEME.textMuted,fontSize:13}}>+ Ajouter une image</button>
      ) : (
        <div style={{...block,display:"flex",flexDirection:"column",gap:10}}>
          <div style={{fontSize:14,fontWeight:600,color:THEME.text}}>Nouvelle image</div>
          <div style={{display:"flex",gap:8}}>
            {[{v:"dessin",label:"Mon dessin"},{v:"reference",label:"Reference"}].map(function(t) {
              var active = tag===t.v;
              var col = t.v==="dessin" ? THEME.accent : THEME.accentGold;
              return (
                <button key={t.v} onClick={function(){setTag(t.v);}} style={{flex:1,padding:"8px",borderRadius:10,cursor:"pointer",border:active?"1px solid "+col+"66":"1px solid "+THEME.border,background:active?col+"14":THEME.surfaceLight,color:active?col:THEME.textMuted,fontSize:12,fontWeight:active?600:400}}>
                  {t.label}
                </button>
              );
            })}
          </div>
          <input value={caption} onChange={function(e){setCaption(e.target.value);}} placeholder="Legende (optionnel)..." style={inp}/>
          <div>
            <div style={{fontSize:11,color:THEME.textMuted,marginBottom:5}}>Lier a une tache (optionnel)</div>
            <select value={linkedTask} onChange={function(e){setLinkedTask(e.target.value);}} style={{...inp,appearance:"none"}}>
              <option value="">-- Aucune tache --</option>
              {doneTasks.slice(0,50).map(function(t) {
                return <option key={t.id} value={String(t.id)}>{t.name} ({t.theme})</option>;
              })}
            </select>
          </div>
          <div>
            <div style={{fontSize:11,color:THEME.textMuted,marginBottom:6}}>Competences liees (optionnel)</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
              {(skills||[]).map(function(sk) {
                var active = linkedSkills.includes(sk.id);
                return (
                  <button key={sk.id} onClick={function(){toggleSkill(sk.id);}} style={{padding:"3px 10px",borderRadius:20,fontSize:11,cursor:"pointer",border:active?"1px solid "+sk.color+"66":"1px solid "+THEME.border,background:active?sk.color+"18":THEME.surfaceLight,color:active?sk.color:THEME.textMuted,fontWeight:active?600:400}}>
                    {active?"OK ":""}{sk.name}
                  </button>
                );
              })}
            </div>
          </div>
          <button onClick={function(){if(!uploading) fileInputRef.current&&fileInputRef.current.click();}} style={{width:"100%",padding:"12px",borderRadius:12,cursor:uploading?"wait":"pointer",border:"1px dashed "+THEME.accent+"66",background:THEME.filterActive,color:THEME.accent,fontSize:13,fontWeight:600,display:"flex",alignItems:"center",justifyContent:"center",gap:8,opacity:uploading?0.7:1}}>
            {uploading ? "Upload en cours..." : "Choisir une image depuis la galerie"}
          </button>
          <input ref={fileInputRef} type="file" accept="image/*" style={{display:"none"}} onChange={handleUpload}/>
          <button onClick={function(){setShowAdd(false);setCaption("");setLinkedTask("");setLinkedSkills([]);}} style={{padding:"7px",borderRadius:10,cursor:"pointer",border:"1px solid "+THEME.border,background:"transparent",color:THEME.textMuted,fontSize:12}}>Annuler</button>
        </div>
      )}

      {lightbox && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.9)",zIndex:300,display:"flex",flexDirection:"column"}} onClick={function(e){if(e.target===e.currentTarget)setLightbox(null);}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 16px",flexShrink:0}}>
            <span style={{fontSize:11,padding:"3px 10px",borderRadius:20,background:lightbox.tag==="dessin"?THEME.accent+"33":THEME.accentGold+"33",color:lightbox.tag==="dessin"?THEME.accent:THEME.accentGold,fontWeight:700}}>
              {lightbox.tag==="dessin"?"Dessin":"Reference"} — {lightbox.date}
            </span>
            <div style={{display:"flex",gap:10}}>
              <button onClick={function(){deleteImage(lightbox.id);}} style={{border:"none",background:"none",cursor:"pointer",fontSize:18,color:"rgba(255,255,255,0.45)",padding:"4px"}}>🗑</button>
              <button onClick={function(){setLightbox(null);}} style={{border:"none",background:"none",cursor:"pointer",fontSize:22,color:"rgba(255,255,255,0.7)",padding:"4px",lineHeight:1}}>✕</button>
            </div>
          </div>
          <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden",padding:"0 16px"}}>
            <img src={lightbox.url} alt={lightbox.caption||""} style={{maxWidth:"100%",maxHeight:"100%",objectFit:"contain",borderRadius:12}}/>
          </div>
          {(lightbox.caption||lightbox.taskName||(lightbox.skillIds||[]).length>0) && (
            <div style={{padding:"12px 16px 28px",flexShrink:0}}>
              {lightbox.caption && <div style={{fontSize:14,color:"#fff",fontWeight:500,marginBottom:6}}>{lightbox.caption}</div>}
              {lightbox.taskName && <div style={{fontSize:12,color:THEME.accent,marginBottom:6}}>Tache : {lightbox.taskName}</div>}
              {(lightbox.skillIds||[]).length > 0 && (
                <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                  {(lightbox.skillIds||[]).map(function(sid) {
                    var sk = (skills||[]).find(function(s){return s.id===sid;});
                    if (!sk) return null;
                    return <span key={sid} style={{fontSize:11,padding:"3px 10px",borderRadius:20,background:sk.color+"22",color:sk.color,border:"1px solid "+sk.color+"44"}}>{sk.name}</span>;
                  })}
                </div>
              )}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function ArtTrackerApp(props) {
  const onHome = props.onHome;
  const [themeMode, setThemeMode] = useState("light");
  // Applique le thème au global THEME au render
  Object.assign(THEME, THEMES[themeMode]);
  const [skills,         setSkills]         = useState(null);
  const [tasks,          setTasks]          = useState(null);
  const [themes,         setThemes]         = useState(DEFAULT_THEMES);
  const [history,        setHistory]        = useState([]);
  const [completionCount,setCC]             = useState({});
  const [loaded,         setLoaded]         = useState(false);
  const [filterTheme,    setFilterTheme]    = useState("Tous");
  const [diffFilter,     setDiffFilter]     = useState("Tous");
  const [taskPage,       setTaskPage]       = useState(0);
  const [favorites,      setFavorites]      = useState({});
  const [sessionMode,    setSessionMode]    = useState(false);
  const [sessionTasks,   setSessionTasks]   = useState(null);
  const [challenges,     setChallenges]     = useState({dtiys:[],thirty:[]});
  const [formations,     setFormations]     = useState([]);
  const [timerData,      setTimerData]      = useState({totalSeconds:0,sessions:[]});
  const [projects,       setProjects]       = useState([]);
  const [decayState,     setDecayState]     = useState(null);
  const [gallery,        setGallery]        = useState([]);
  const [galleryOpenImg,  setGalleryOpenImg]  = useState(null);
  const [globalXp,       setGlobalXp]       = useState(0);
  const [editingTask,    setEditingTask]    = useState(null);
  const [showNewTask,    setShowNewTask]    = useState(false);
  const [showSkillPanel, setShowSkillPanel] = useState(false);
  const [showReset,      setShowReset]      = useState(false);
  // État édition projet — remonté ici pour que la modale soit au niveau racine (fix Android fixed)
  const [editingProject, setEditingProject] = useState(null);
  const [editingForm,    setEditingForm]    = useState(null);
  const [editStepInputR, setEditStepInputR] = useState("");
  const [showSettings,   setShowSettings]   = useState(false);
  const importRef = useRef(null);
  const [showSessionLibre, setShowSessionLibre] = useState(false);
  const [showAllThemes,  setShowAllThemes]  = useState(false);
  const [toast,          setToast]          = useState(null);
  const [page,           setPage]           = useState("tracker");

  // Migration : ajoute les compétences par défaut manquantes sans toucher aux données existantes
  function migrateSkills(savedSkills) {
    var result = savedSkills ? savedSkills.slice() : [];
    DEFAULT_SKILLS.forEach(function(def) {
      var exists = result.find(function(s) { return s.id === def.id; });
      if (!exists) result.push({...def});
    });
    return result;
  }

  // Migration : ajoute les thèmes par défaut manquants
  function migrateThemes(savedThemes) {
    var result = savedThemes ? savedThemes.slice() : [];
    DEFAULT_THEMES.forEach(function(t) {
      if (!result.includes(t)) result.push(t);
    });
    return result;
  }

  // Migration : ajoute les tâches par défaut manquantes
  function migrateTasks(savedTasks) {
    var result = savedTasks ? savedTasks.slice() : [];
    var freshDefaults = injectMedium(DEFAULT_TASKS);
    freshDefaults.forEach(function(def) {
      var exists = result.find(function(t) { return t.id === def.id; });
      if (!exists) result.push(def);
    });
    return result;
  }

  // Chargement initial
  useEffect(function() {
    storage.get(STORAGE_KEY).then(function(d) {
      if (d) {
        var migratedSkills = migrateSkills(d.skills);
        var migratedTasks = migrateTasks(d.tasks);
        setSkills(migratedSkills);
        setTasks(migratedTasks);
        setHistory(d.history||[]);
        setCC(d.completionCount||{});
      }
      else { setSkills(DEFAULT_SKILLS); setTasks(injectMedium(DEFAULT_TASKS)); setHistory([]); setCC({}); }
      storage.get(THEMES_KEY).then(function(t) {
        var migrated = migrateThemes(t || []);
        setThemes(migrated);
        if (!t || migrated.length > t.length) {
          storage.set(THEMES_KEY, migrated);
        }
      });
      storage.get("art_tracker_theme_v1").then(function(th) { if (th) setThemeMode(th); });
      storage.get(FAV_KEY).then(function(f) { if(f) setFavorites(f); });
      storage.get(CHALLENGES_KEY).then(function(c) { if(c) setChallenges(c); });
      storage.get(FORMATIONS_KEY).then(function(f) { if(f) setFormations(f); });
      storage.get(TIMER_KEY).then(function(t) { if(t) setTimerData(t); });
      storage.get(GALLERY_KEY).then(function(g) { if(g) setGallery(g); });
      storage.get(PROJECTS_KEY).then(function(p) { if(p) setProjects(p); });
      storage.get(DECAY_KEY).then(function(d) { if(d) setDecayState(d); });
      storage.get(GLOBAL_XP_KEY).then(function(v) {
        // On ignore la valeur stockée et on recalcule depuis les skills
        // (sera mis à jour une fois les skills chargés via useEffect)
        setLoaded(true);
      });
    });
  }, []);

  // Sauvegarde automatique
  useEffect(function() { if (loaded&&skills&&tasks) storage.set(STORAGE_KEY,{skills,tasks,history,completionCount}); }, [skills,tasks,history,completionCount,loaded]);
  // Recalcule le globalXp depuis les skills a chaque changement
  useEffect(function() {
    if (loaded && skills) {
      var total = skills.reduce(function(a,s) { return a + (s.level-1)*XP_PER_LEVEL + s.xp; }, 0);
      setGlobalXp(total);
    }
  }, [skills, loaded]);
  useEffect(function() { if (loaded) storage.set(THEMES_KEY,themes); }, [themes,loaded]);
  useEffect(function() { if (loaded) storage.set(FAV_KEY,favorites); }, [favorites,loaded]);
  useEffect(function() { if (loaded) storage.set(CHALLENGES_KEY,challenges); }, [challenges,loaded]);
  useEffect(function() { if (loaded) storage.set(FORMATIONS_KEY,formations); }, [formations,loaded]);
  useEffect(function() { if (loaded) storage.set(TIMER_KEY,timerData); }, [timerData,loaded]);
  useEffect(function() { if (loaded) storage.set(GALLERY_KEY,gallery); }, [gallery,loaded]);
  useEffect(function() { if (loaded) storage.set(PROJECTS_KEY,projects); }, [projects,loaded]);

  function showToast(msg, isBadge) {

  // Vérifie et applique les pénalités de déclin au chargement
  useEffect(function() {
    if (!loaded || !skills || history === null) return;
    // Collecter TOUTES les dates d'activité (chaque gain XP = activité)
    var allActivityDates = [];

    // Tâches — déjà dans history
    history.forEach(function(h) { if (h.date) allActivityDates.push(h.date.split(" ")[0]); });

    // DTIYS complétés
    (challenges.dtiys||[]).filter(function(d){return d.done && d.date;}).forEach(function(d){
      allActivityDates.push(d.date);
    });

    // 30 Days — chaque jour coché = une activité, on prend la date du challenge comme proxy
    (challenges.thirty||[]).forEach(function(c){
      if (c.checked && c.checked.length>0 && c.date) {
        allActivityDates.push(c.date);
      }
    });

    // Projets — chaque étape cochée = une activité (date du projet)
    (projects||[]).forEach(function(p){
      var hasDoneSteps = (p.steps||[]).some(function(s){return s.done;});
      if (hasDoneSteps && p.startDate) allActivityDates.push(p.startDate);
    });

    // Formations — complétion = activité
    (formations||[]).filter(function(f){return f.completed && f.completedDate;}).forEach(function(f){
      allActivityDates.push(f.completedDate);
    });

    var result = calcDecayPenalties(history, decayState, allActivityDates);
    if (result.penalties > 0) {
      var totalXpLoss = result.penalties * DECAY_XP_PER_WEEK;
      setSkills(function(prev) {
        return prev.map(function(sk) {
          var newXp = Math.max(0, sk.xp - totalXpLoss);
          return {...sk, xp: newXp};
        });
      });
      setDecayState(result.newState);
      showToast("📉 -"+totalXpLoss+" XP (inactivité "+result.penalties+" sem.)");
    } else if (result.newState && result.penalties === 0 && result.newState.appliedWeeks !== (decayState ? decayState.appliedWeeks : -1)) {
      setDecayState(result.newState);
    }
  }, [loaded]);

  // --- Vérification globale des badges ---

  useEffect(function() { showToastRef.current = showToast; });

  useEffect(function() {

  useEffect(function() {
    if (!loaded || !badgeDatesLoaded || !skills) return;

    var newlyUnlocked = [];

      if (!next[b.id] && b.check(history,completionCount,skills,tasks||[],timerData,projects,challenges,formations)) {
        next[b.id] = new Date().toLocaleDateString("fr-FR",{day:"2-digit",month:"2-digit",year:"numeric"});
        newlyUnlocked.push(b);
      }
    });
    if (newlyUnlocked.length > 0) {
      setEarnedBadgeDates(next);
      storage.set("badge_dates", next);

  function generateSession() {
    var all = tasks||[];
    var warmups = all.filter(function(t) { return t.theme==="Echauffement"; });
    var mains = all.filter(function(t) { return t.theme!=="Echauffement"; });

    // Priorité aux tâches jamais faites
    var undoneMains = mains.filter(function(t) { return !(completionCount[t.id]>0); });
    var undoneWarmups = warmups.filter(function(t) { return !(completionCount[t.id]>0); });

    // Compétence la moins avancée pour orienter le choix
    var sortedSkills = (skills||[]).slice().sort(function(a,b) { return ((a.level-1)*100+a.xp)-((b.level-1)*100+b.xp); });
    var weakestSkillId = sortedSkills.length>0 ? sortedSkills[0].id : null;

    // Favoriser les tâches liées à la compétence la plus faible
    var priorityMains = weakestSkillId
      ? undoneMains.filter(function(t) { return t.rewards.some(function(r) { return r.skillId===weakestSkillId && !r.optional; }); })
      : [];

    function pick(arr, fallback) {
      var pool = arr.length>0 ? arr : (fallback||[]);
      return pool.length>0 ? pool[Math.floor(Math.random()*pool.length)] : null;
    }

    var w = pick(undoneWarmups, warmups);
    var m = pick(priorityMains.length>0 ? priorityMains : undoneMains, mains.filter(function(t) { return t.id!==(w?w.id:null); }));
    setSessionTasks([w,m].filter(Boolean));
    setSessionMode(true);
  }

  function applyXp(gains) {
    var totalGained = gains.reduce(function(s, g) { return s + (g.xp || 0); }, 0);
    setGlobalXp(function(prev) { return prev + totalGained; });
    setSkills(function(prev) {
      return prev.map(function(sk) {
        var g = gains.find(function(g) { return g.skillId===sk.id; });
        if (!g) return sk;
        var nx = sk.xp+g.xp;
        return {...sk,xp:nx%XP_PER_LEVEL,level:sk.level+Math.floor(nx/XP_PER_LEVEL)};
      });
    });
  }

  function removeXp(gains) {
    var totalRemoved = gains.reduce(function(s, g) { return s + (g.xp || 0); }, 0);
    setGlobalXp(function(prev) { return Math.max(0, prev - totalRemoved); });
    setSkills(function(prev) {
      return prev.map(function(sk) {
        var g = gains.find(function(g) { return g.skillId===sk.id; });
        if (!g) return sk;
        var totalXp = (sk.level-1)*XP_PER_LEVEL + sk.xp;
        var newTotal = Math.max(0, totalXp - g.xp);
        return {...sk, level:Math.floor(newTotal/XP_PER_LEVEL)+1, xp:newTotal%XP_PER_LEVEL};
      });
    });
    showToast("↩ XP retiré");
  }

  function completeTask(task, checkedOpts, note) {
    var optional = task.rewards.filter(function(r) { return r.optional; });
    var gains = [];
    var claimed = [];
    task.rewards.filter(function(r) { return !r.optional; }).forEach(function(r) { gains.push({skillId:r.skillId,xp:r.xp}); });
    optional.forEach(function(r,i) { if(checkedOpts[i]) { gains.push({skillId:r.skillId,xp:r.xp}); claimed.push(task.rewards.indexOf(r)); } });
    applyXp(gains);
    var gl = gains.map(function(g) { var sk=skills.find(function(s) { return s.id===g.skillId; }); return sk?{name:sk.name,xp:g.xp,color:sk.color}:null; }).filter(Boolean);
    var entry = {id:Date.now(),taskId:task.id,taskName:task.name,theme:task.theme,date:new Date().toLocaleString("fr-FR",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"}),gains:gl,claimedOptionals:claimed,note:note||""};
    setHistory(function(prev) { return [entry,...prev]; });
    setCC(function(prev) { return {...prev,[task.id]:(prev[task.id]||0)+1}; });
    showToast("✓ "+gl.map(function(g) { return "+"+g.xp+" "+g.name; }).join(" / "));
  }

  function removeHistoryEntry(entryId) {
    var entry = history.find(function(e) { return e.id===entryId; });
    if (!entry) return;
    // Retirer l'XP des gains de cette entrée
    if (entry.gains && entry.gains.length>0) {
      var gains = entry.gains.map(function(g) {
        var sk = skills.find(function(s) { return s.name===g.name; });
        return sk ? {skillId:sk.id, xp:g.xp} : null;
      }).filter(Boolean);
      if (gains.length>0) removeXp(gains);
    }
    setHistory(function(prev) { return prev.filter(function(e) { return e.id!==entryId; }); });
    if (entry.taskId) setCC(function(prev) { return {...prev,[entry.taskId]:Math.max(0,(prev[entry.taskId]||1)-1)}; });
    showToast("↩ Session annulée — XP retiré");
  }

  function addBonusToHistory(entryId, toAdd) {

        return {...e,gains:ng,claimedOptionals:[...(e.claimedOptionals||[]),...toAdd.map(function(a) { return a.rewardIndex; })]};

        }
      `}</style>

      {/* Header */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",paddingTop:4}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          {onHome && (
            <button onClick={onHome} style={{border:"1px solid "+THEME.border,background:THEME.surfaceLight,cursor:"pointer",fontSize:12,color:THEME.textMuted,borderRadius:20,padding:"4px 12px"}}>← Accueil</button>
          )}
          <div>
            <h2 className="playfair" style={{fontSize:20,fontWeight:700,color:THEME.text,margin:0,fontFamily:"'Playfair Display',serif"}}>🎨 Skill Tracker</h2>
            <div style={{fontSize:11,color:THEME.textMuted,marginTop:1}}>Dessin & Arts visuels</div>
          </div>
        </div>
        <div style={{display:"flex",gap:6,alignItems:"center"}}>
          <button onClick={function() { setThemeMode(function(m) { return m === "light" ? "dark" : "light"; }); }} style={{
            background: THEME.surfaceLight, border: "1px solid " + THEME.border,
            borderRadius: 10, padding: "5px 10px", fontSize: 13, cursor: "pointer",
            display:"flex", alignItems:"center", gap:5, color:THEME.textSub,
            transition:"all 0.2s",
          }}>
            <span style={{fontSize:16}}>{themeMode === "light" ? "🌙" : "☀️"}</span>
          </button>
          <button onClick={function() { setShowSettings(function(v) { return !v; }); }} style={{
            background: showSettings ? THEME.filterActive : THEME.surfaceLight,
            border: "1px solid " + (showSettings ? THEME.accent+"55" : THEME.border),

        </div>

      {showSettings && (
        <div style={{background:THEME.surfaceCard,border:"1px solid "+THEME.borderLight,borderRadius:16,padding:16,display:"flex",flexDirection:"column",gap:10}}>

          <button onClick={function() { setShowSettings(false); setShowSkillPanel(true); }} style={{width:"100%",padding:"10px 14px",borderRadius:12,cursor:"pointer",border:"1px solid "+THEME.accent+"44",background:THEME.accent+"10",color:THEME.accent,fontSize:13,fontWeight:500,textAlign:"left"}}>
            🎯 Gérer les compétences
          </button>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            <button onClick={function() {
              setShowSettings(false);
              var data = {
                skills:skills, tasks:tasks, history:history,
                completionCount:completionCount, themes:themes,
                favorites:favorites, challenges:challenges,
                projects:projects, timerData:timerData,
                exportDate:new Date().toLocaleDateString("fr-FR"), version:"v1"
              };
              var filename = "lilith-art-"+new Date().toISOString().slice(0,10)+".json";
              exportJSON(data, filename, function() { showToast("📦 Sauvegarde exportée !"); });
            }} style={{padding:"10px",borderRadius:12,cursor:"pointer",border:"1px solid "+THEME.accentGreen+"44",background:THEME.accentGreen+"10",color:THEME.accentGreen,fontSize:13,fontWeight:500}}>
              📦 Exporter
            </button>
            <label style={{padding:"10px",borderRadius:12,cursor:"pointer",border:"1px solid "+THEME.accent+"44",background:THEME.accent+"10",color:THEME.accent,fontSize:13,fontWeight:500,textAlign:"center",display:"flex",alignItems:"center",justifyContent:"center"}}>
              📥 Importer
              <input ref={importRef} type="file" accept=".json" style={{display:"none"}} onChange={function(e) {
                setShowSettings(false);
                var file = e.target.files && e.target.files[0];
                if (!file) return;
                var reader = new FileReader();
                reader.onload = function(ev) {
                  try {
                    var d = JSON.parse(ev.target.result);
                    if (d.skills) setSkills(migrateSkills(d.skills));
                    if (d.tasks) setTasks(migrateTasks(d.tasks));
                    if (d.themes) { var mt = migrateThemes(d.themes); setThemes(mt); storage.set(THEMES_KEY, mt); }
                    if (d.history) setHistory(d.history);
                    if (d.completionCount) setCC(d.completionCount);
                    if (d.favorites) setFavorites(d.favorites);
                    if (d.challenges) setChallenges(d.challenges);
                    if (d.projects) setProjects(d.projects);
                    if (d.timerData) setTimerData(d.timerData);
                    showToast("✅ Données importées !");
                  } catch(err) { showToast("❌ Fichier invalide"); }
                };
                reader.readAsText(file);
                e.target.value = "";
              }}/>
            </label>
          </div>
          <button onClick={function() { setShowSettings(false); setShowReset(true); }} style={{width:"100%",padding:"10px",borderRadius:12,cursor:"pointer",border:"1px solid "+THEME.accentPink+"44",background:THEME.accentPink+"10",color:THEME.accentPink,fontSize:13,fontWeight:500}}>
            🔄 Réinitialiser la progression...
          </button>
        </div>
      )}

      {/* Bannière niveau global */}
      {(function() {
        var lv   = Math.floor(globalXp / XP_PER_LEVEL) + 1;
        var xpIn = globalXp % XP_PER_LEVEL;
        var info = getArtLevelInfo(lv);
        return (
          <ArtLevelBanner level={lv} title={info.title} tier={info.tier} xpIn={xpIn} xpTotal={XP_PER_LEVEL}/>
        );
      })()}

      {/* Navigation */}
      <div style={{display:"flex",gap:5,flexWrap:"wrap",paddingBottom:2}}>
        {navItems.map(function(item) {
          var isActive = page===item.id;

          return (
            <button key={item.id} onClick={function() { setPage(item.id); }} style={{padding:"6px 12px",borderRadius:20,fontSize:12,cursor:"pointer",border:isActive?"1px solid "+itemAccent+"66":"1px solid "+THEME.border,background:isActive?itemAccent+"18":THEME.surfaceLight,color:isActive?itemAccent:THEME.textMuted,fontWeight:isActive?600:400,whiteSpace:"nowrap",flexShrink:0,transition:"all 0.2s",position:"relative",boxShadow:isActive?"0 2px 10px "+itemAccent+"30":"none"}}>
              {item.label}
            </button>
          );
        })}
      </div>

      {/* Page : Challenges */}
      {page==="challenges" && <ChallengesPage challenges={challenges} onChange={setChallenges} skills={skills} onXpGain={applyProjectXp} onXpRemove={removeXp} formations={formations} onFormationsChange={setFormations} onFormationUpdate={updateFormation} onFormationDelete={deleteFormation} onFormationComplete={completeFormation}/>}

      {page==="stats" && <StatsBlock skills={skills} history={history} completionCount={completionCount} tasks={tasks||[]} timerData={timerData} onSaveTimer={setTimerData} decayState={decayState} projects={projects} challenges={challenges}/>}

      {/* Page : Projets */}
      {page==="projects" && <ProjectsPage projects={projects} skills={skills} onChange={setProjects} onXpGain={applyProjectXp} onXpRemove={removeXp} onEdit={openProjectEdit}/>}

      {/* Page : Générateur */}
      {page==="galerie" && <GalerieTracker gallery={gallery} setGallery={setGallery} skills={skills} tasks={tasks||[]} history={history} initialLightbox={galleryOpenImg} key={galleryOpenImg?galleryOpenImg.id:0}/>}
      {page==="generateur" && <GenerateurIA onAddTask={addGeneratedTask} themes={themes} skills={skills}/>}

      {/* Page : Tracker */}
      {page==="tracker" && (
        <div style={{display:"flex",flexDirection:"column",gap:14}}>

          {/* Skills grid */}
          <div style={block}>
            <div style={{fontSize:12,fontWeight:600,color:THEME.textMuted,textTransform:"uppercase",letterSpacing:0.6,marginBottom:12}}>Compétences</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(150px,1fr))",gap:10}}>
              {skills.map(function(sk) {
                return (
                  <div key={sk.id} className="skill-card" style={{background:THEME.surfaceCard,borderRadius:12,padding:"10px 11px",border:"1px solid "+sk.color+"22"}}>
                    <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:7}}>
                      <div style={{width:28,height:28,borderRadius:"50%",background:sk.color+"18",border:"1px solid "+sk.color+"33",display:"flex",alignItems:"center",justifyContent:"center",color:sk.color,flexShrink:0}}>
                        <SkillIcon id={sk.id} emoji={sk.emoji} size={14}/>
                      </div>
                      <div>
                        <div style={{fontSize:12,fontWeight:500,color:THEME.text,lineHeight:1.2}}>{sk.name}</div>
                        <div style={{fontSize:10,color:THEME.textMuted}}>Niv. {sk.level}</div>
                      </div>
                    </div>
                    <XpBar xp={sk.xp} color={sk.color}/>
                    <div style={{fontSize:10,color:THEME.textMuted,marginTop:3,textAlign:"right"}}>{sk.xp}/100 XP</div>
                  </div>
                );
              })}
            </div>
          </div>

          {/* Tâches */}
          <div style={block}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>

                {sessionMode?"Session du jour":"Tâches"}
              </div>
              <div style={{display:"flex",gap:6}}>
                <button onClick={function(){setShowSessionLibre(true);}} style={{padding:"4px 10px",borderRadius:20,fontSize:11,cursor:"pointer",border:"1px solid "+THEME.accentPink+"44",background:THEME.accentPink+"12",color:THEME.accentPink,fontWeight:500}}>
                  🌟 Libre
                </button>
                <button onClick={function() { if(sessionMode){setSessionMode(false);setSessionTasks(null);}else generateSession(); }} style={{padding:"4px 10px",borderRadius:20,fontSize:11,cursor:"pointer",border:"1px solid "+(sessionMode?THEME.accent+"66":THEME.border),background:sessionMode?THEME.filterActive:THEME.surfaceLight,color:sessionMode?THEME.accent:THEME.textSub}}>
                  {sessionMode?"Quitter":"🎲 Session"}
                </button>
                {!sessionMode && (
                  <button onClick={function() { setShowNewTask(true); }} style={{padding:"4px 12px",borderRadius:20,fontSize:12,cursor:"pointer",border:"1px solid "+THEME.border,background:THEME.surfaceLight,color:THEME.textSub}}>+ Nouvelle</button>
                )}
              </div>
            </div>

            {sessionMode ? (
              <div style={{marginBottom:10}}>

              </div>
            ) : (
              <div>

                  <input
                    value={searchQuery}
                    onChange={function(e) { setSearchQuery(e.target.value); setTaskPage(0); }}
                    placeholder="Rechercher une tâche..."
                    style={{width:"100%",padding:"7px 10px 7px 30px",borderRadius:10,fontSize:13,border:"1px solid "+THEME.border,background:THEME.inputBg,color:THEME.text,boxSizing:"border-box",outline:"none"}}
                  />
                  {searchQuery && <button onClick={function(){setSearchQuery("");}} style={{position:"absolute",right:8,top:"50%",transform:"translateY(-50%)",border:"none",background:"none",cursor:"pointer",fontSize:13,color:THEME.textMuted}}>✕</button>}
                </div>
                <div style={{display:"flex",gap:8,marginBottom:10}}>
                  {[{label:"Total",value:totalTasks,color:THEME.textSub},{label:"Faites",value:doneTasks,color:THEME.accentGreen},{label:"Restantes",value:totalTasks-doneTasks,color:THEME.accentPink}].map(function(s) {
                    return (
                      <div key={s.label} style={{flex:1,background:THEME.surfaceLight,borderRadius:10,padding:"6px 10px",textAlign:"center"}}>
                        <div style={{fontSize:16,fontWeight:600,color:s.color}}>{s.value}</div>
                        <div style={{fontSize:10,color:THEME.textMuted}}>{s.label}</div>
                      </div>

                  })}
                </div>

                {/* Filtres catégories avec collapse */}
                {(function() {
                  var ALWAYS_VISIBLE = ["Tous","Favoris","✦ Perso","Echauffement"];
                  var extras = themes_all.filter(function(t) { return !ALWAYS_VISIBLE.includes(t); });
                  var visibleExtras = showAllThemes ? extras : extras.slice(0,5);
                  var shown = ALWAYS_VISIBLE.concat(visibleExtras);
                  return (
                    <div style={{marginBottom:7}}>
                      <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                        {shown.map(function(t) {
                          var stat = catStats.find(function(c) { return c.theme===t; });
                          var active = filterTheme===t;
                          var label = t;
                          if (t==="✦ Perso") {
                            var persoCount = (tasks||[]).filter(function(tk){return !DEFAULT_TASKS.find(function(dt){return dt.id===tk.id;});}).length;
                            label = "✦ Perso "+persoCount;
                          } else if (stat) {
                            label = t+" "+stat.done+"/"+stat.total;
                          }
                          return (
                            <button key={t} className={"filter-btn"+(active?" active":"")} onClick={function() { setFilterTheme(t); setTaskPage(0); }}>

                        {extras.length > 5 && (
                          <button onClick={function(){setShowAllThemes(function(v){return !v;});}} className="filter-btn" style={{fontWeight:600,letterSpacing:1}}>

                        {d}
                      </button>
                    );
                  })}
                </div>
              </div>
            )}

            <div style={{display:"flex",flexDirection:"column",gap:9}}>
              {displayedTasks.length===0 && <div style={{color:THEME.textMuted,fontSize:13}}>Aucune tâche.</div>}

                return <TaskCard key={task.id} task={task} skills={skills} completions={completionCount[task.id]||0} onComplete={completeTask} onEdit={setEditingTask} isFav={!!favorites[task.id]} onToggleFav={toggleFav}/>;
              })}
            </div>

            {!sessionMode && totalPages>1 && (

                <button onClick={function() { setTaskPage(function(p) { return Math.max(0,p-1); }); }} disabled={taskPage===0} style={{width:32,height:32,borderRadius:"50%",border:"1px solid "+THEME.border,background:taskPage===0?THEME.surfaceLight:THEME.surface,color:taskPage===0?THEME.textMuted:THEME.text,fontSize:16,cursor:taskPage===0?"default":"pointer",display:"flex",alignItems:"center",justifyContent:"center",opacity:taskPage===0?0.4:1,transition:"all 0.15s"}}>{"‹"}</button>
                <span style={{fontSize:12,color:THEME.textMuted}}>{taskPage+1} / {totalPages}</span>
                <button onClick={function() { setTaskPage(function(p) { return Math.min(totalPages-1,p+1); }); }} disabled={taskPage===totalPages-1} style={{width:32,height:32,borderRadius:"50%",border:"1px solid "+THEME.border,background:taskPage===totalPages-1?THEME.surfaceLight:THEME.surface,color:taskPage===totalPages-1?THEME.textMuted:THEME.text,fontSize:16,cursor:taskPage===totalPages-1?"default":"pointer",display:"flex",alignItems:"center",justifyContent:"center",opacity:taskPage===totalPages-1?0.4:1,transition:"all 0.15s"}}>{"›"}</button>
              </div>
            )}
          </div>

          {/* Historique */}
          <div style={block}>
            <div style={{fontSize:12,fontWeight:600,color:THEME.textMuted,textTransform:"uppercase",letterSpacing:0.6,marginBottom:10}}>

            </div>
            <div style={{maxHeight:300,overflowY:"auto",display:"flex",flexDirection:"column",gap:7,paddingRight:2}}>
              {history.length===0 && <div style={{color:THEME.textMuted,fontSize:13}}>Aucune tâche complétée.</div>}
              {history.map(function(entry) {
                var task = (tasks||[]).find(function(t) { return t.id===entry.taskId; });
                return <HistoryEntry key={entry.id} entry={entry} task={task} skills={skills} onAddBonus={addBonusToHistory} onEditDate={editHistoryDate} onRemove={removeHistoryEntry} gallery={gallery} onGoToGallery={function(img){setGalleryOpenImg(img);setPage("galerie");}}/>;
              })}
            </div>
          </div>


        </div>
      )}

      {/* Modales */}
      {(editingTask||showNewTask) && (
        <TaskEditor task={editingTask||null} skills={skills} themes={themes} onSave={saveTask} onDelete={deleteTask} onClose={function() { setEditingTask(null); setShowNewTask(false); }} onAddTheme={addTheme}/>
      )}
      {showSkillPanel && (
        <SkillPanel skills={skills} onAddSkill={function(sk) { setSkills(function(p) { return [...p,sk]; }); }} onDeleteSkill={function(id) { setSkills(function(p) { return p.filter(function(s) { return s.id!==id; }); }); }} onClose={function() { setShowSkillPanel(false); }}/>
      )}
      {showSessionLibre && (
        <SessionLibreModal skills={skills} onSave={saveSessionLibre} onClose={function(){setShowSessionLibre(false);}}/>
      )}
      {showReset && (
        <ResetModal skills={skills} onClose={function() { setShowReset(false); }} onReset={function(opts) {
          if (opts.type==="all") {
            var freshTasks = injectMedium(DEFAULT_TASKS);
            setSkills(DEFAULT_SKILLS.slice());
            setTasks(freshTasks);
            setHistory([]);
            setCC({});
            setGlobalXp(0);
            storage.set(STORAGE_KEY, {skills:DEFAULT_SKILLS, tasks:freshTasks, history:[], completionCount:{}});
            storage.set(GLOBAL_XP_KEY, 0);
          }
          if (opts.type==="tasks") {
            var freshTasks2 = injectMedium(DEFAULT_TASKS);
            setTasks(freshTasks2);
            setHistory([]);
            setCC({});
            setGlobalXp(0);
            storage.set(STORAGE_KEY, {skills:skills, tasks:freshTasks2, history:[], completionCount:{}});
            storage.set(GLOBAL_XP_KEY, 0);
          }
          if (opts.type==="skills") {
            setSkills(function(prev) {
              var reset = prev.map(function(sk) { return opts.skillIds.includes(sk.id)?{...sk,level:1,xp:0}:sk; });
              return migrateSkills(reset);
            });
            setGlobalXp(0);
            storage.set(GLOBAL_XP_KEY, 0);
          }
          setShowReset(false);
          showToast("Réinitialisation effectuée.");
        }}/>
      )}

      {/* Modale édition projet — au niveau racine pour fix position:fixed Android */}
      {editingProject && editingForm && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.45)",backdropFilter:"blur(6px)",zIndex:300,display:"flex",alignItems:"flex-end",justifyContent:"center",touchAction:"none"}} onClick={function(e){if(e.target===e.currentTarget)closeProjectEdit();}}>
          <div style={{background:THEME.surface,borderRadius:"22px 22px 0 0",padding:"1.4rem 1.2rem 2rem",width:"100%",maxWidth:480,maxHeight:"88vh",overflowY:"auto",boxShadow:"0 -8px 40px rgba(0,0,0,0.25)"}}>

              <button onClick={closeProjectEdit} style={{border:"none",background:"none",cursor:"pointer",fontSize:18,color:THEME.textMuted,lineHeight:1}}>✕</button>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              <input value={editingForm.name} onChange={function(e){setEditingForm(function(f){return {...f,name:e.target.value};});}} placeholder="Nom du projet..." style={{padding:"7px 10px",borderRadius:10,fontSize:13,border:"1px solid "+THEME.borderLight,background:THEME.inputBg,color:THEME.text,width:"100%",boxSizing:"border-box"}}/>
              <textarea value={editingForm.description} onChange={function(e){setEditingForm(function(f){return {...f,description:e.target.value};});}} placeholder="Description (optionnel)..." rows={2} style={{padding:"7px 10px",borderRadius:10,fontSize:13,border:"1px solid "+THEME.borderLight,background:THEME.inputBg,color:THEME.text,width:"100%",boxSizing:"border-box",resize:"vertical",fontFamily:"inherit"}}/>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
                <div>
                  <div style={{fontSize:11,color:THEME.textMuted,marginBottom:3}}>Priorité</div>
                  <input type="number" min={1} max={9} value={editingForm.priority} onChange={function(e){setEditingForm(function(f){return {...f,priority:Number(e.target.value)};});}} style={{padding:"7px 10px",borderRadius:10,fontSize:13,border:"1px solid "+THEME.borderLight,background:THEME.inputBg,color:THEME.text,width:"100%",boxSizing:"border-box",textAlign:"center"}}/>
                </div>
                <div>
                  <div style={{fontSize:11,color:THEME.textMuted,marginBottom:3}}>Date début</div>
                  <input type="date" value={editingForm.startDate} onChange={function(e){setEditingForm(function(f){return {...f,startDate:e.target.value};});}} style={{padding:"7px 10px",borderRadius:10,fontSize:13,border:"1px solid "+THEME.borderLight,background:THEME.inputBg,color:THEME.text,width:"100%",boxSizing:"border-box"}}/>
                </div>
                <div>
                  <div style={{fontSize:11,color:THEME.textMuted,marginBottom:3}}>Date limite</div>
                  <input type="date" value={editingForm.deadline} onChange={function(e){setEditingForm(function(f){return {...f,deadline:e.target.value};});}} style={{padding:"7px 10px",borderRadius:10,fontSize:13,border:"1px solid "+THEME.borderLight,background:THEME.inputBg,color:THEME.text,width:"100%",boxSizing:"border-box"}}/>
                </div>
              </div>
              <div>
                <div style={{fontSize:11,color:THEME.textMuted,marginBottom:6}}>Compétences liées</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                  {(skills||[]).map(function(sk) {
                    var active = !!editingForm.linkedSkills.find(function(ls){return ls.skillId===sk.id;});
                    return (
                      <button key={sk.id} onClick={function(){toggleEditingSkill(sk.id);}} style={{padding:"3px 10px",borderRadius:20,fontSize:11,cursor:"pointer",border:active?"1px solid "+sk.color:"1px solid "+THEME.border,background:active?sk.color+"18":THEME.surfaceCard,color:active?sk.color:THEME.textMuted,fontWeight:active?600:400}}>
                        {active?"✓ ":""}{sk.name}
                      </button>
                    );
                  })}
                </div>
              </div>
              {editingForm.linkedSkills.length > 0 && (
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,padding:"10px",borderRadius:10,background:"rgba(127,119,221,0.06)",border:"1px solid #7F77DD22"}}>
                  <div>
                    <div style={{fontSize:11,color:"#7F77DD",marginBottom:3}}>XP par étape</div>
                    <input type="number" min={1} max={50} value={editingForm.xpPerStep} onChange={function(e){setEditingForm(function(f){return {...f,xpPerStep:Number(e.target.value)};});}} style={{padding:"7px 10px",borderRadius:10,fontSize:13,border:"1px solid "+THEME.borderLight,background:THEME.inputBg,color:THEME.text,width:"100%",boxSizing:"border-box",textAlign:"center"}}/>
                  </div>
                  <div>
                    <div style={{fontSize:11,color:"#1D9E75",marginBottom:3}}>Bonus XP fin</div>
                    <input type="number" min={0} max={200} value={editingForm.xpBonus} onChange={function(e){setEditingForm(function(f){return {...f,xpBonus:Number(e.target.value)};});}} style={{padding:"7px 10px",borderRadius:10,fontSize:13,border:"1px solid "+THEME.borderLight,background:THEME.inputBg,color:THEME.text,width:"100%",boxSizing:"border-box",textAlign:"center"}}/>
                  </div>
                </div>
              )}
              <div>
                <div style={{fontSize:11,color:THEME.textMuted,marginBottom:5}}>Étapes</div>
                <div style={{display:"flex",flexDirection:"column",gap:4,marginBottom:6}}>
                  {editingForm.steps.map(function(s,idx) {
                    return (
                      <div key={s.id} style={{display:"flex",alignItems:"center",gap:6,padding:"5px 8px",borderRadius:8,background:s.done?"rgba(200,240,210,0.3)":THEME.surfaceCard,border:"0.5px solid "+THEME.border}}>
                        <span style={{fontSize:10,color:s.done?THEME.accentGreen:THEME.textMuted,width:16}}>{s.done?"✓":idx+1+"."}</span>
                        <span style={{flex:1,fontSize:12,color:s.done?THEME.textMuted:THEME.text,textDecoration:s.done?"line-through":"none"}}>{s.label}</span>
                        <button onClick={function(){removeEditingStep(s.id);}} style={{border:"none",background:"none",cursor:"pointer",fontSize:11,color:THEME.textMuted,padding:"0 2px",opacity:0.6}}>✕</button>
                      </div>
                    );
                  })}
                </div>
                <div style={{display:"flex",gap:6}}>
                  <input value={editStepInputR} onChange={function(e){setEditStepInputR(e.target.value);}} onKeyDown={function(e){if(e.key==="Enter")addEditingStep();}} placeholder="Ajouter une étape..." style={{flex:1,padding:"6px 10px",borderRadius:10,fontSize:12,border:"1px solid "+THEME.borderLight,background:THEME.inputBg,color:THEME.text}}/>
                  <button onClick={addEditingStep} style={{padding:"6px 12px",borderRadius:10,fontSize:12,cursor:"pointer",border:"1px solid #7F77DD44",background:"#7F77DD12",color:"#7F77DD",whiteSpace:"nowrap"}}>+ Ajouter</button>
                </div>
              </div>
              <div style={{display:"flex",gap:8,marginTop:4}}>
                <button onClick={saveProjectEdit} style={{flex:1,padding:"9px",borderRadius:10,cursor:"pointer",border:"1px solid #7F77DD44",background:"#7F77DD",color:"#fff",fontSize:13,fontWeight:600}}>Enregistrer</button>
                <button onClick={closeProjectEdit} style={{padding:"9px 14px",borderRadius:10,cursor:"pointer",border:"1px solid "+THEME.border,background:"transparent",color:THEME.textMuted,fontSize:13}}>Annuler</button>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* Toast */}
      {toast && (
        <div style={{position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",background:(toast.isBadge||false)?"linear-gradient(135deg,"+THEME.surface+","+THEME.filterActive+")":THEME.modalBg,backdropFilter:"blur(14px)",border:"1px solid "+((toast.isBadge||false)?THEME.accent+"88":THEME.accent+"44"),borderRadius:22,padding:(toast.isBadge||false)?"12px 22px":"10px 20px",fontSize:13,color:THEME.text,boxShadow:"0 8px 36px rgba(0,0,0,0.22)",whiteSpace:"nowrap",zIndex:200,fontWeight:(toast.isBadge||false)?600:400,animation:"toastIn 0.3s cubic-bezier(0.34,1.56,0.64,1) both"}}>
          {toast && toast.msg ? toast.msg : (toast || "")}
        </div>
      )}
      </div>{/* end inner content zIndex:1 */}
    </div>
  );
}

    gradient: "linear-gradient(135deg,#e8fdf0,#e8f4fd)",
